<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1f8a4c">
  <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(function(){});}</script>
  <script src="./palette.js"></script>
  <title>League Invitation | EARLY ACCESSS</title>
  <style>
    :root {
      --bg:#d6ece0; --panel:#fff; --card:rgba(248,255,251,.92);
      --text:#0e2c1d; --muted:#4d6f60; --accent:#1f8a4c; --danger:#b42318; --line:rgba(14,44,29,.16);
      --bg-a:#f3fbf6; --bg-b:#def0e6;
    }
    [data-theme="dark"] {
      --bg:#0f1f16; --panel:#1a2e22; --card:rgba(30,48,37,.92);
      --text:#d4edda; --muted:#7faa8e; --accent:#2ab561; --danger:#f87171; --line:rgba(180,220,195,.18);
      --bg-a:#101b17; --bg-b:#0b1411;
    }
    body { margin:0; font-family:"Roboto","Segoe UI",sans-serif; background:linear-gradient(135deg,var(--bg-a),var(--bg-b)); color:var(--text); min-height:100vh; }
    .wrap { max-width:900px; margin:24px auto; padding:0 16px; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:space-between; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:14px; }
    h1,h2,h3 { margin:0; }
    .muted { color:var(--muted); }
    .btn { border:none; border-radius:9px; padding:9px 14px; font:inherit; font-weight:700; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; }
    .btn.primary { background:var(--accent); color:#fff; }
    .btn.ghost { border:1px solid var(--line); background:var(--card); color:var(--text); }
    .meta-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; margin-top:10px; }
    .meta-card { border:1px solid var(--line); border-radius:10px; padding:10px; background:var(--card); }
    .meta-card .label { font-size:.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
    .meta-card .value { margin-top:2px; font-weight:700; }
    .status { min-height:20px; margin-top:10px; color:var(--muted); }
    .status.error { color:var(--danger); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row" style="margin-bottom:14px;">
      <div>
        <h1>League Invitation</h1>
        <div class="muted" id="heroText">Loading invitation...</div>
      </div>
      <a class="btn ghost" href="./lobby.html">Go to Lobby</a>
    </div>

    <div class="card">
      <h2 style="margin-bottom:8px;">Invitation details</h2>
      <p class="muted" id="inviteSummary">Please wait while we verify this invite.</p>
      <div class="meta-grid" id="inviteMeta"></div>
      <div class="row" style="margin-top:14px;">
        <button class="btn primary" id="acceptBtn" type="button" style="display:none;">Accept invitation</button>
        <a class="btn ghost" id="loginBtn" href="./index.html" style="display:none;">Log in to accept</a>
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
    (function(){
      if (localStorage.getItem("rs_theme") !== "light") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();

    const params = new URLSearchParams(window.location.search);
    const inviteToken = params.get("token") || "";
    const TOKEN_KEY = "rs_access_token";
    const API_BASE_KEY = "rs_api_base_override";
    const DEFAULT_API_BASE = "https://rstrating-accounts-api.onrender.com";

    const heroText = document.getElementById("heroText");
    const inviteSummary = document.getElementById("inviteSummary");
    const inviteMeta = document.getElementById("inviteMeta");
    const acceptBtn = document.getElementById("acceptBtn");
    const loginBtn = document.getElementById("loginBtn");
    const statusEl = document.getElementById("status");

    function esc(v){ return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
    function getApiBase(){ return (localStorage.getItem(API_BASE_KEY) || DEFAULT_API_BASE).trim(); }
    function getToken(){ return localStorage.getItem(TOKEN_KEY) || ""; }
    function show(msg, kind){ statusEl.textContent = msg; statusEl.className = kind ? `status ${kind}` : "status"; }
    function fmt(iso){ if (!iso) return "-"; const d = new Date(iso); return Number.isNaN(d.getTime()) ? iso : d.toLocaleString(); }

    async function publicFetch(path) {
      const res = await fetch(getApiBase() + path);
      let body = null; try { body = await res.json(); } catch {}
      if (!res.ok) throw new Error(body?.detail || "Request failed");
      return body;
    }

    async function apiFetch(path, options) {
      const headers = Object.assign({}, options?.headers || {});
      const token = getToken();
      if (token) headers.Authorization = "Bearer " + token;
      const res = await fetch(getApiBase() + path, Object.assign({}, options || {}, { headers }));
      let body = null; try { body = await res.json(); } catch {}
      if (!res.ok) throw new Error(body?.detail || "Request failed");
      return body;
    }

    function renderInvite(invite) {
      heroText.textContent = invite && !invite.error
        ? `You were invited to join ${invite.league_name}.`
        : "Invitation link information.";
      inviteSummary.textContent = invite && !invite.error
        ? "To accept this invitation, log into your account."
        : (invite?.error || "Invalid invitation link.");

      inviteMeta.innerHTML = invite && !invite.error ? `
        <div class="meta-card"><div class="label">League</div><div class="value">${esc(invite.league_name)}</div></div>
        <div class="meta-card"><div class="label">Type</div><div class="value">${esc(invite.football_type)}</div></div>
        <div class="meta-card"><div class="label">Goal Size</div><div class="value">${esc(invite.goal_size)}</div></div>
        <div class="meta-card"><div class="label">Owner</div><div class="value">${esc(invite.owner_username)}</div></div>
        <div class="meta-card"><div class="label">Uses Left</div><div class="value">${esc(invite.remaining_uses)}</div></div>
        <div class="meta-card"><div class="label">Expires</div><div class="value">${esc(fmt(invite.expires_at))}</div></div>
      ` : "";
    }

    async function acceptInvite() {
      try {
        const league = await apiFetch("/league-invites/accept", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: inviteToken }),
        });
        show("Invite accepted. Redirecting...", "");
        window.location.href = `./league.html?id=${league.id}`;
      } catch (err) {
        show(err.message || "Could not accept invitation.", "error");
      }
    }

    async function init() {
      if (!inviteToken) {
        renderInvite({ error: "Missing invitation token in URL." });
        show("Open a valid invite link.", "error");
        return;
      }
      loginBtn.href = `./index.html?invite=${encodeURIComponent(inviteToken)}`;

      let invite = null;
      try {
        invite = await publicFetch(`/league-invites/${encodeURIComponent(inviteToken)}`);
      } catch (err) {
        invite = { error: err.message || "Invite could not be loaded." };
      }
      renderInvite(invite);

      if (!invite.error && getToken()) {
        acceptBtn.style.display = "inline-flex";
      } else if (!invite.error) {
        loginBtn.style.display = "inline-flex";
      }
    }

    acceptBtn.addEventListener("click", acceptInvite);
    init();
  </script>
</body>
</html>
