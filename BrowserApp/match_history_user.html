<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1f8a4c">
  <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(function(){});}</script>
  <script src="./palette.js"></script>
  <title>Matches Overview</title>
  <style>
    :root{--text:#0e2c1d;--muted:#4d6f60;--accent:#1f8a4c;--line:rgba(14,44,29,.16);--panel:#fff;--soft:#f3faf6;--bg:#dff0e7;--danger:#b42318;}
    [data-theme="dark"]{--text:#e7f5ee;--muted:#9dc4b2;--accent:#2fa765;--line:rgba(231,245,238,.2);--panel:#16241f;--soft:#1b2d27;--bg:#101b17;--danger:#ef6f66;}
    body{margin:0;background:var(--bg);color:var(--text);font-family:"Roboto","Segoe UI",sans-serif;}
    .wrap{max-width:960px;margin:24px auto;padding:0 16px;}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:10px;}
    .row{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap;}
    .btn{border:1px solid var(--line);background:var(--soft);color:var(--text);border-radius:9px;padding:7px 12px;font:inherit;font-weight:700;text-decoration:none;cursor:pointer;}
    .pill{display:inline-flex;padding:2px 8px;border-radius:999px;border:1px solid var(--line);font-size:.78rem;}
    .muted{color:var(--muted);}
    .list{display:flex;flex-direction:column;gap:8px;}
    .item{border:1px solid var(--line);border-radius:10px;padding:10px;cursor:pointer;}
    .status{min-height:20px;color:var(--muted);}
    .status.error{color:var(--danger);}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
    .tab-btn{border:1px solid var(--line);background:var(--soft);color:var(--text);border-radius:999px;padding:6px 11px;font:inherit;font-weight:700;cursor:pointer;}
    .tab-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row" style="margin-bottom:10px;">
      <div>
        <h1 style="margin:0;">Matches Overview</h1>
        <div class="muted">Your personal matches across leagues.</div>
      </div>
      <div class="row">
        <button class="btn ghost" id="darkModeToggle" type="button">🌙</button>
        <button class="btn ghost" id="topNotifLink" title="Notifications" type="button">🔔</button>
        <a class="btn ghost" href="./player.html" title="My profile">👤</a>
        <a class="btn ghost" href="./account.html" title="Account settings">⚙</a>
        <a class="btn ghost" href="./lobby.html" title="Lobby">🏠</a>
        <button class="btn danger" id="logoutButton" type="button" title="Sign out">🚪</button>
      </div>
    </div>

    <div class="card">
      <div class="tabs" id="tabs">
        <button class="tab-btn active" type="button" data-tab="upcoming">Upcoming</button>
        <button class="tab-btn" type="button" data-tab="live">Live</button>
        <button class="tab-btn" type="button" data-tab="history">History</button>
      </div>
      <div class="list" id="list"><div class="muted">Loading…</div></div>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    (function(){ if(localStorage.getItem("rs_theme") !== "light"){ document.documentElement.setAttribute("data-theme","dark"); }})();
    (function(){
      const btn = document.getElementById("darkModeToggle");
      const sync = function(){ btn.textContent = document.documentElement.getAttribute("data-theme") === "dark" ? "☀️" : "🌙"; };
      sync();
      const notifBtn = document.getElementById("topNotifLink");
      if (notifBtn) {
        notifBtn.setAttribute("data-rs-notif-bound", "1");
        notifBtn.addEventListener("click", function(e) {
          e.preventDefault();
          if (window.RSPalette && typeof window.RSPalette.openNotifMenu === "function") window.RSPalette.openNotifMenu();
        });
      }
      const logoutBtn = document.getElementById("logoutButton");
      if (logoutBtn && !logoutBtn.getAttribute("data-rs-logout-bound-page")) {
        logoutBtn.setAttribute("data-rs-logout-bound-page", "1");
        logoutBtn.addEventListener("click", function () {
          localStorage.removeItem("rs_access_token");
          window.location.href = "./index.html";
        });
      }
      btn.addEventListener("click", function(){
        const dark = document.documentElement.getAttribute("data-theme") === "dark";
        if(dark){ document.documentElement.removeAttribute("data-theme"); localStorage.setItem("rs_theme","light"); }
        else{ document.documentElement.setAttribute("data-theme","dark"); localStorage.setItem("rs_theme","dark"); }
        sync();
      });
    })();

    const TOKEN_KEY = "rs_access_token";
    const API_BASE_KEY = "rs_api_base_override";
    const DEFAULT_API_BASE = "https://rstrating-accounts-api.onrender.com";
    const listEl = document.getElementById("list");
    const statusEl = document.getElementById("status");
    const tabsEl = document.getElementById("tabs");
    let activeTab = "upcoming";
    let allRows = [];

    function esc(v){ return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
    function apiBase(){ return (localStorage.getItem(API_BASE_KEY) || DEFAULT_API_BASE).trim(); }
    function token(){ return localStorage.getItem(TOKEN_KEY) || ""; }
    function show(msg, kind){ statusEl.textContent = msg; statusEl.className = kind ? "status " + kind : "status"; }

    async function apiFetch(path){
      const headers = {};
      const t = token();
      if(t) headers.Authorization = "Bearer " + t;
      const res = await fetch(apiBase() + path, { headers });
      let body = null; try { body = await res.json(); } catch {}
      if(!res.ok) throw new Error(body && body.detail ? body.detail : "Request failed");
      return body;
    }

    function tabForStatus(status){
      const s = String(status || "").toLowerCase();
      if(["live","in_progress","ongoing"].includes(s)) return "live";
      if(["upcoming","registration_open","registration_closed","scheduled","pending"].includes(s)) return "upcoming";
      return "history";
    }

    function emptyMessage(){
      return activeTab === "live"
        ? "No live matches right now."
        : activeTab === "upcoming"
          ? "No upcoming matches."
          : "No match history yet.";
    }

    function render(rows){
      if(!rows.length){ listEl.innerHTML = '<div class="muted">' + esc(emptyMessage()) + '</div>'; return; }
      listEl.innerHTML = rows.map(function(entry){
        const m = entry.match || {};
        const when = m.scheduled_at ? new Date(m.scheduled_at).toLocaleString() : "Unknown time";
        return '<div class="item" data-id="' + Number(m.id || 0) + '">' +
          '<div class="row"><strong>' + esc(m.title || "Match") + '</strong><span class="pill">' + esc(m.status || "-") + '</span></div>' +
          '<div class="muted">League: ' + esc(entry.league_name || "-") + '</div>' +
          '<div class="muted">' + esc(when) + (m.location ? ' · ' + esc(m.location) : '') + '</div>' +
          '</div>';
      }).join("");
      listEl.querySelectorAll(".item").forEach(function(el){
        el.addEventListener("click", function(){
          const id = Number(el.dataset.id || 0);
          if(id) window.location.href = "./match.html?id=" + id;
        });
      });
    }

    function renderActiveTab(){
      if(tabsEl){
        tabsEl.querySelectorAll(".tab-btn").forEach(function(btn){
          btn.classList.toggle("active", btn.dataset.tab === activeTab);
        });
      }
      const filtered = allRows.filter(function(entry){
        const m = entry && entry.match ? entry.match : {};
        return tabForStatus(m.status) === activeTab;
      });
      render(filtered);
      show("Loaded " + allRows.length + " matches · " + filtered.length + " in " + activeTab + ".");
    }

    async function load(){
      if(!token()){ show("Please log in from lobby first.", "error"); return; }
      try{
        const rows = await apiFetch("/matches/history/me");
        allRows = Array.isArray(rows) ? rows : [];
        renderActiveTab();
      }catch(err){
        show(err.message || "Failed to load history.", "error");
      }
    }

    if(tabsEl){
      tabsEl.addEventListener("click", function(e){
        const btn = e.target.closest(".tab-btn");
        if(!btn) return;
        activeTab = btn.dataset.tab || "upcoming";
        renderActiveTab();
      });
    }

    load();
  </script>
</body>
</html>
