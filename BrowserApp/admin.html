<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1f8a4c">
  <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(function(){});}</script>
  <script src="./palette.js"></script>
  <script src="./toast.js"></script>
  <title>Admin Console</title>
  <style>
    :root {
      --bg:#edf3ee;
      --panel:#ffffff;
      --text:#102419;
      --muted:#5f7468;
      --line:rgba(16,36,25,.14);
      --accent:#1d7c47;
      --danger:#b42318;
      --warn:#a16207;
    }
    [data-theme="dark"] {
      --bg:#0f1713;
      --panel:#18231d;
      --text:#e0efe6;
      --muted:#8aa193;
      --line:rgba(224,239,230,.12);
      --accent:#37b36c;
      --danger:#f87171;
      --warn:#fbbf24;
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Segoe UI",system-ui,sans-serif; background:var(--bg); color:var(--text); }
    .wrap { max-width:1200px; margin:0 auto; padding:24px 16px 40px; }
    .top { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    .btn, a.btn { appearance:none; border:1px solid var(--line); background:var(--panel); color:var(--text); padding:9px 14px; border-radius:10px; font:inherit; text-decoration:none; cursor:pointer; }
    .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
    .btn.danger { background:var(--danger); border-color:var(--danger); color:#fff; }
    .btn.warn { color:var(--warn); }
    .btn:disabled { opacity:.45; cursor:default; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px; }
    .stats { display:grid; grid-template-columns:repeat(5, minmax(0,1fr)); gap:10px; margin-bottom:16px; }
    @media (max-width:900px) { .stats { grid-template-columns:repeat(2, minmax(0,1fr)); } }
    .stat { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:12px; }
    .stat .label { color:var(--muted); font-size:.75rem; text-transform:uppercase; letter-spacing:.08em; }
    .stat .value { margin-top:6px; font-size:1.4rem; font-weight:700; }
    .tabs { display:flex; gap:4px; border-bottom:2px solid var(--line); margin-bottom:16px; }
    .tab { appearance:none; background:none; border:none; border-bottom:3px solid transparent; padding:10px 20px; font:inherit; font-weight:600; color:var(--muted); cursor:pointer; margin-bottom:-2px; border-radius:10px 10px 0 0; }
    .tab:hover { color:var(--text); background:var(--panel); }
    .tab.active { color:var(--accent); border-bottom-color:var(--accent); background:var(--panel); }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }
    .list { display:flex; flex-direction:column; gap:10px; max-height:70vh; overflow:auto; }
    .row { border:1px solid var(--line); border-radius:12px; padding:12px; }
    .row.clickable { cursor:pointer; }
    .row-top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .title { font-weight:700; }
    .meta { color:var(--muted); font-size:.84rem; margin-top:4px; }
    .pill { display:inline-flex; border:1px solid var(--line); border-radius:999px; padding:3px 8px; font-size:.75rem; margin-left:6px; }
    .pill.pending { color:var(--warn); }
    .pill.rejected { color:var(--danger); }
    .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .section-head { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
    .pager { display:none; gap:8px; justify-content:center; align-items:center; padding:10px 0; }
    .pager.show { display:flex; }
    .status { min-height:20px; color:var(--muted); margin-top:12px; }
    .status.error { color:var(--danger); }
    .status.ok { color:var(--accent); }
    input { width:100%; padding:8px 10px; border-radius:10px; border:1px solid var(--line); background:var(--bg); color:var(--text); font:inherit; }
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.52); z-index:900; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:24px; max-width:460px; width:calc(100% - 32px); }
    .modal-title { margin:0 0 12px; font-size:1.05rem; font-weight:700; }
    .modal-msg { color:var(--muted); margin-bottom:12px; line-height:1.5; font-size:.92rem; }
    .modal-fields { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
    .modal-field label { display:block; font-size:.83rem; font-weight:700; color:var(--muted); margin-bottom:4px; }
    .modal-footer { display:flex; gap:8px; justify-content:flex-end; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <h1 style="margin:0;">Admin Console</h1>
        <div style="color:var(--muted);margin-top:4px;">Manage platform users, approvals, league termination, account blocking, and password resets.</div>
      </div>
      <div class="actions">
        <button class="btn" id="darkModeToggle" type="button">🌙</button>
        <a class="btn" href="./lobby.html">← Lobby</a>
        <button class="btn danger" id="hardResetBtn" type="button">Hard Reset</button>
        <button class="btn primary" id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>

    <div class="stats" id="statsGrid"></div>

    <div class="tabs">
      <button class="tab active" data-tab="leagues" type="button">Leagues</button>
      <button class="tab" data-tab="matches" type="button">Matches</button>
      <button class="tab" data-tab="users" type="button">Users</button>
    </div>

    <div id="tab-leagues" class="tab-panel active">
      <div class="card">
        <div class="section-head">
          <h2 style="margin:0;">Leagues</h2>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <button class="btn" id="autoApproveToggleBtn" type="button">Auto approve: off</button>
            <input id="leagueSearch" type="text" placeholder="Search leagues or owners" style="max-width:280px;">
          </div>
        </div>
        <div class="list" id="leagueList"><p class="meta">Loading...</p></div>
        <div class="pager" id="leaguePager">
          <button class="btn" id="leaguePrevBtn" type="button">&#8592; Prev</button>
          <span id="leaguePageInfo" class="meta" style="min-width:70px;text-align:center;">Page 1</span>
          <button class="btn" id="leagueNextBtn" type="button">Next &#8594;</button>
        </div>
      </div>
    </div>

    <div id="tab-matches" class="tab-panel">
      <div class="card">
        <div class="section-head">
          <h2 style="margin:0;">Matches</h2>
          <input id="matchSearch" type="text" placeholder="Search by title or league" style="max-width:280px;">
        </div>
        <div class="list" id="matchList"><p class="meta">Loading...</p></div>
        <div class="pager" id="matchPager">
          <button class="btn" id="matchPrevBtn" type="button">&#8592; Prev</button>
          <span id="matchPageInfo" class="meta" style="min-width:70px;text-align:center;">Page 1</span>
          <button class="btn" id="matchNextBtn" type="button">Next &#8594;</button>
        </div>
      </div>
    </div>

    <div id="tab-users" class="tab-panel">
      <div class="card">
        <div class="section-head">
          <h2 style="margin:0;">Users</h2>
          <input id="userSearch" type="text" placeholder="Search users or emails" style="max-width:280px;">
        </div>
        <div class="list" id="userList"><p class="meta">Loading...</p></div>
        <div class="pager" id="userPager">
          <button class="btn" id="userPrevBtn" type="button">&#8592; Prev</button>
          <span id="userPageInfo" class="meta" style="min-width:70px;text-align:center;">Page 1</span>
          <button class="btn" id="userNextBtn" type="button">Next &#8594;</button>
        </div>
      </div>
    </div>

    <div class="status" id="status"></div>
  </div>

  <div class="modal-overlay" id="adminModal" role="dialog" aria-modal="true">
    <div class="modal-box">
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-msg" id="modalMsg"></div>
      <div class="modal-fields" id="modalFields"></div>
      <div class="modal-footer">
        <button class="btn" id="modalCancelBtn" type="button">Cancel</button>
        <button class="btn primary" id="modalConfirmBtn" type="button">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    (function(){ if(localStorage.getItem("rs_theme") !== "light") document.documentElement.setAttribute("data-theme", "dark"); })();
    document.getElementById("darkModeToggle").addEventListener("click", function(){
      var dark = document.documentElement.getAttribute("data-theme") === "dark";
      if (dark) { document.documentElement.removeAttribute("data-theme"); localStorage.setItem("rs_theme", "light"); this.textContent = "🌙"; }
      else { document.documentElement.setAttribute("data-theme", "dark"); localStorage.setItem("rs_theme", "dark"); this.textContent = "☀️"; }
    });
    if (document.documentElement.getAttribute("data-theme") === "dark") document.getElementById("darkModeToggle").textContent = "☀️";

    var _modalResolve = null;
    function _openModal(opts) {
      var overlay = document.getElementById('adminModal');
      document.getElementById('modalTitle').textContent = opts.title || '';
      var msgEl = document.getElementById('modalMsg');
      msgEl.textContent = opts.message || '';
      msgEl.style.display = opts.message ? '' : 'none';
      var fieldsEl = document.getElementById('modalFields');
      fieldsEl.innerHTML = '';
      var fieldNames = [];
      (opts.fields || []).forEach(function(f) {
        var div = document.createElement('div');
        div.className = 'modal-field';
        var lbl = document.createElement('label');
        lbl.textContent = f.label;
        div.appendChild(lbl);
        var inp = document.createElement('input');
        inp.type = f.inputType || 'text';
        inp.id = 'modalField_' + f.name;
        inp.placeholder = f.placeholder || '';
        inp.value = f['default'] || '';
        inp.style.width = '100%';
        div.appendChild(inp);
        fieldsEl.appendChild(div);
        fieldNames.push(f.name);
      });
      var cancelBtn = document.getElementById('modalCancelBtn');
      var confirmBtn = document.getElementById('modalConfirmBtn');
      cancelBtn.textContent = opts.cancelText || 'Cancel';
      cancelBtn.style.display = opts.cancelText === '' ? 'none' : '';
      confirmBtn.textContent = opts.confirmText || 'Confirm';
      confirmBtn.className = 'btn ' + (opts.confirmClass || 'primary');
      overlay.classList.add('open');
      var focusEl = fieldsEl.querySelector('input') || confirmBtn;
      setTimeout(function(){ focusEl.focus(); }, 20);
      return new Promise(function(resolve) {
        _modalResolve = function(confirmed) {
          overlay.classList.remove('open');
          _modalResolve = null;
          if (!confirmed) { resolve(null); return; }
          if (!fieldNames.length) { resolve(true); return; }
          var result = {};
          fieldNames.forEach(function(n) {
            var el = document.getElementById('modalField_' + n);
            result[n] = el ? el.value : '';
          });
          resolve(result);
        };
      });
    }
    document.getElementById('modalCancelBtn').addEventListener('click', function(){ if(_modalResolve) _modalResolve(false); });
    document.getElementById('modalConfirmBtn').addEventListener('click', function(){ if(_modalResolve) _modalResolve(true); });
    document.getElementById('adminModal').addEventListener('click', function(e){ if(e.target === this && _modalResolve) _modalResolve(false); });

    document.querySelectorAll('.tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
        document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });


    var TOKEN_KEY = "rs_access_token", API_BASE_KEY = "rs_api_base_override";
    var DEFAULT_API_BASE = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") ? "http://127.0.0.1:8000" : "https://rstrating-accounts-api.onrender.com";
    var HOSTED_API_BASE = "https://rstrating-accounts-api.onrender.com";
    var users = [], leagues = [], matches = [];
    var adminSettings = { auto_approve_leagues: false };

    function esc(v){ return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"', '&quot;'); }
    function getApiBase(){ return (localStorage.getItem(API_BASE_KEY) || DEFAULT_API_BASE).trim(); }
    function getToken(){ return localStorage.getItem(TOKEN_KEY) || ""; }
    function show(msg, kind){
      var el = document.getElementById("status");
      el.textContent = msg;
      el.className = kind ? "status " + kind : "status";
      if (msg && window.showToast) {
        var toastKind = kind === "error" ? "error" : (kind === "ok" ? "ok" : "info");
        window.showToast(msg, toastKind);
      }
    }
    async function _doFetch(base, path, options) {
      var headers = Object.assign({}, options && options.headers || {});
      var token = getToken();
      if (token) headers.Authorization = "Bearer " + token;
      var res = await fetch(base + path, Object.assign({}, options || {}, { headers: headers }));
      var body = null; try { body = await res.json(); } catch(e) {}
      if (!res.ok) {
        var detail = body && body.detail;
        if (Array.isArray(detail)) detail = detail.map(function(e){ return e.msg || JSON.stringify(e); }).join("; ");
        else if (detail && typeof detail === "object") detail = detail.msg || detail.message || JSON.stringify(detail);
        throw new Error(typeof detail === "string" && detail ? detail : "Request failed");
      }
      return body;
    }

    async function apiFetch(path, options){
      var base = getApiBase();
      try {
        return await _doFetch(base, path, options);
      } catch (err) {
        // Auto-recover from stale/broken API override or unreachable local server by retrying against hosted backend.
        var networkFailure = /failed to fetch|networkerror|load failed/i.test(String(err && err.message || ""));
        if (networkFailure) {
          var fallbackBase = (base !== HOSTED_API_BASE) ? HOSTED_API_BASE : null;
          if (fallbackBase) {
            localStorage.removeItem(API_BASE_KEY);
            show("Local backend unreachable, retrying with hosted backend...", "");
            // Let the fallback error propagate — if hosted returns 401/403 that's a real error
            return await _doFetch(fallbackBase, path, options);
          }
        }
        throw err;
      }
    }

    function renderStats(data){
      var grid = document.getElementById("statsGrid");
      var items = [
        ["Users", data.users_total],
        ["Active users", data.users_active],
        ["Leagues", data.leagues_total],
        ["Pending", data.leagues_pending],
        ["Matches", matches.length]
      ];
      grid.innerHTML = items.map(function(item){ return '<div class="stat"><div class="label">' + esc(item[0]) + '</div><div class="value">' + esc(item[1]) + '</div></div>'; }).join("");
    }

    function renderAdminSettings(){
      var btn = document.getElementById("autoApproveToggleBtn");
      if (!btn) return;
      var on = !!adminSettings.auto_approve_leagues;
      btn.textContent = on ? "Auto approve: on" : "Auto approve: off";
      btn.className = on ? "btn primary" : "btn";
      btn.title = on ? "New leagues are approved automatically." : "New leagues require manual approval.";
    }

    var ITEMS_PER_PAGE = 20;
    var leaguePage = 1;
    var matchPage = 1;
    var userPage = 1;

    function renderMatches(){
      var q = (document.getElementById("matchSearch").value || "").toLowerCase();
      var list = document.getElementById("matchList");
      var filtered = matches.filter(function(m){ return !q || String(m.title).toLowerCase().includes(q) || String(m.league_name).toLowerCase().includes(q); });
      var totalPages = Math.max(1, Math.ceil(filtered.length / ITEMS_PER_PAGE));
      matchPage = Math.min(Math.max(1, matchPage), totalPages);
      var paged = filtered.slice((matchPage - 1) * ITEMS_PER_PAGE, matchPage * ITEMS_PER_PAGE);
      list.innerHTML = paged.map(function(m){
        var sc = m.status === 'completed' ? m.score_a + ' - ' + m.score_b : '-';
        var scPill = m.status === 'completed' ? 'pill' : m.status === 'cancelled' ? 'pill rejected' : 'pill pending';
        return '<div class="row"><div class="row-top"><div>'
          + '<div class="title">' + esc(m.title) + '<span class="' + scPill + '">' + esc(m.status) + '</span></div>'
          + '<div class="meta">League: ' + esc(m.league_name) + ' &middot; Participants: ' + esc(m.participant_count) + ' &middot; Score: ' + sc + '</div>'
          + '<div class="meta">' + esc(new Date(m.scheduled_at).toLocaleString()) + ' &middot; Created by ' + esc(m.created_by_username) + '</div>'
          + '</div></div><div class="toolbar">'
          + '<button class="btn danger" data-match-delete="' + m.id + '" data-match-title="' + esc(m.title) + '">Delete match</button>'
          + '</div></div>';
      }).join("") || '<p class="meta">No matches found.</p>';
      var pagerEl = document.getElementById("matchPager");
      pagerEl.className = filtered.length > ITEMS_PER_PAGE ? "pager show" : "pager";
      document.getElementById("matchPageInfo").textContent = "Page " + matchPage + " / " + totalPages;
      document.getElementById("matchPrevBtn").disabled = matchPage <= 1;
      document.getElementById("matchNextBtn").disabled = matchPage >= totalPages;
    }


    function renderLeagues(){
      var q = (document.getElementById("leagueSearch").value || "").toLowerCase();
      var list = document.getElementById("leagueList");
      var filtered = leagues.filter(function(l){ return !q || String(l.name).toLowerCase().includes(q) || String(l.owner_username).toLowerCase().includes(q); });
      var totalPages = Math.max(1, Math.ceil(filtered.length / ITEMS_PER_PAGE));
      leaguePage = Math.min(leaguePage, totalPages);
      var paged = filtered.slice((leaguePage - 1) * ITEMS_PER_PAGE, leaguePage * ITEMS_PER_PAGE);
      list.innerHTML = paged.map(function(l){
        var pillClass = l.approval_status === "pending" ? "pill pending" : l.approval_status === "rejected" ? "pill rejected" : "pill";
        var terminatedPill = l.is_terminated ? '<span class="pill rejected">terminated</span>' : '';
        var actionHtml = '';
        if (l.approval_status !== 'approved') actionHtml += '<button class="btn primary" data-league-action="approved" data-league-id="' + l.id + '">Approve</button>';
        if (l.approval_status === 'pending') actionHtml += '<button class="btn warn" data-league-action="rejected" data-league-id="' + l.id + '">Reject</button>';
        if (!l.is_terminated) actionHtml += '<button class="btn warn" data-league-temp-terminate="' + l.id + '">Temp terminate</button>';
        if (l.is_terminated) actionHtml += '<button class="btn primary" data-league-unterminate="' + l.id + '">Unterminate</button>';
        actionHtml += '<button class="btn danger" data-league-delete="' + l.id + '" data-league-name="' + esc(l.name) + '">Delete</button>';
        return '<div class="row clickable" data-open-league="' + l.id + '"><div class="row-top"><div><div class="title">' + esc(l.name) + '<span class="' + pillClass + '">' + esc(l.approval_status) + '</span>' + terminatedPill + '</div><div class="meta">Owner: ' + esc(l.owner_username) + ' · ' + esc(l.region) + ' · ' + esc(l.football_type) + '/' + esc(l.goal_size) + ' · Members ' + esc(l.member_count) + '</div><div class="meta">Created ' + esc(new Date(l.created_at).toLocaleString()) + (l.approval_note ? ' · Note: ' + esc(l.approval_note) : '') + (l.terminated_until ? ' · Terminated until: ' + esc(new Date(l.terminated_until).toLocaleString()) : '') + '</div></div></div><div class="toolbar">' + actionHtml + '</div></div>';
      }).join("") || '<p class="meta">No leagues found.</p>';
      var pager = document.getElementById("leaguePager");
      var totalLeaguePages = Math.max(1, Math.ceil(filtered.length / ITEMS_PER_PAGE));
      pager.className = filtered.length > ITEMS_PER_PAGE ? "pager show" : "pager";
      document.getElementById("leaguePageInfo").textContent = "Page " + leaguePage + " / " + totalLeaguePages;
      document.getElementById("leaguePrevBtn").disabled = leaguePage <= 1;
      document.getElementById("leagueNextBtn").disabled = leaguePage >= totalLeaguePages;
    }

    function renderUsers(){
      var q = (document.getElementById("userSearch").value || "").toLowerCase();
      var list = document.getElementById("userList");
      var filtered = users.filter(function(u){ return !q || String(u.username).toLowerCase().includes(q) || String(u.email).toLowerCase().includes(q); });
      var totalPages = Math.max(1, Math.ceil(filtered.length / ITEMS_PER_PAGE));
      userPage = Math.min(userPage, totalPages);
      var paged = filtered.slice((userPage - 1) * ITEMS_PER_PAGE, userPage * ITEMS_PER_PAGE);
      list.innerHTML = paged.map(function(u){
        var pill = u.is_active ? '<span class="pill">active</span>' : '<span class="pill rejected">blocked</span>';
        var resetBtn = u.is_active ? '<button class="btn" data-user-reset="' + u.id + '">Reset password</button>' : '';
        var promoteBtn = (u.role !== 'admin') ? '<button class="btn primary" data-user-promote="' + u.id + '" data-user-name="' + esc(u.username) + '">Promote to admin</button>' : '';
        var blockBtn = (u.is_active && u.role !== 'admin') ? '<button class="btn warn" data-user-block="' + u.id + '">Block</button>' : '';
        var deleteUserBtn = (u.role !== 'admin') ? '<button class="btn danger" data-user-delete="' + u.id + '" data-user-name="' + esc(u.username) + '">Delete user</button>' : '';
        var unblockBtn = (!u.is_active) ? '<button class="btn primary" data-user-unblock="' + u.id + '">Unblock</button>' : '';
        return '<div class="row clickable" data-open-player="' + u.id + '"><div class="row-top"><div><div class="title">' + esc(u.username) + pill + '</div><div class="meta">' + esc(u.email || '-') + ' · role ' + esc(u.role) + ' · recovery token ' + esc(u.recovery_token || u.recovery_id || '-') + '</div><div class="meta">Leagues ' + esc(u.league_count) + ' · Owns ' + esc(u.owned_league_count) + ' · Rating ' + esc(Number(u.global_rating || 0).toFixed(1)) + '</div></div></div><div class="toolbar">' + resetBtn + promoteBtn + blockBtn + unblockBtn + deleteUserBtn + '</div></div>';
      }).join("") || '<p class="meta">No users found.</p>';
      var pager = document.getElementById("userPager");
      var totalUserPages = Math.max(1, Math.ceil(filtered.length / ITEMS_PER_PAGE));
      pager.className = filtered.length > ITEMS_PER_PAGE ? "pager show" : "pager";
      document.getElementById("userPageInfo").textContent = "Page " + userPage + " / " + totalUserPages;
      document.getElementById("userPrevBtn").disabled = userPage <= 1;
      document.getElementById("userNextBtn").disabled = userPage >= totalUserPages;
    }

    async function load(){
      try {
        var me = await apiFetch('/auth/me');
        if (!me || me.role !== 'admin') { show('Admin access required.', 'error'); return; }
        var results = await Promise.all([
          apiFetch('/admin/overview'),
          apiFetch('/admin/settings'),
          apiFetch('/admin/users'),
          apiFetch('/admin/leagues'),
          apiFetch('/admin/matches')
        ]);
        adminSettings = results[1] && typeof results[1] === 'object' ? results[1] : { auto_approve_leagues: false };
        users   = Array.isArray(results[2]) ? results[2] : [];
        leagues = Array.isArray(results[3]) ? results[3] : [];
        matches = Array.isArray(results[4]) ? results[4] : [];
        renderStats(results[0]);
        renderAdminSettings();
        renderLeagues();
        renderMatches();
        renderUsers();
        show('');
      } catch (err) {
        show(err.message || 'Failed to load admin console.', 'error');
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', load);
    document.getElementById('autoApproveToggleBtn').addEventListener('click', async function(){
      var nextValue = !adminSettings.auto_approve_leagues;
      try {
        var updated = await apiFetch('/admin/settings', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ auto_approve_leagues: nextValue })
        });
        adminSettings = updated && typeof updated === 'object' ? updated : { auto_approve_leagues: nextValue };
        renderAdminSettings();
        show(adminSettings.auto_approve_leagues ? 'Auto-approve leagues enabled.' : 'Auto-approve leagues disabled.', 'ok');
      } catch (err) {
        show(err.message || 'Failed to update setting.', 'error');
      }
    });
    document.getElementById('leagueSearch').addEventListener('input', function(){ leaguePage = 1; renderLeagues(); });
    document.getElementById('matchSearch').addEventListener('input', function(){ matchPage = 1; renderMatches(); });
    document.getElementById('userSearch').addEventListener('input', function(){ userPage = 1; renderUsers(); });
    document.getElementById('leaguePrevBtn').addEventListener('click', function(){ if(leaguePage > 1){ leaguePage--; renderLeagues(); } });
    document.getElementById('leagueNextBtn').addEventListener('click', function(){ leaguePage++; renderLeagues(); });
    document.getElementById('matchPrevBtn').addEventListener('click', function(){ if(matchPage > 1){ matchPage--; renderMatches(); } });
    document.getElementById('matchNextBtn').addEventListener('click', function(){ matchPage++; renderMatches(); });
    document.getElementById('userPrevBtn').addEventListener('click', function(){ if(userPage > 1){ userPage--; renderUsers(); } });
    document.getElementById('userNextBtn').addEventListener('click', function(){ userPage++; renderUsers(); });
    document.getElementById('leagueList').addEventListener('click', async function(e){
      var openLeague = e.target.closest('[data-open-league]');
      if (openLeague && !e.target.closest('button')) {
        window.location.href = './league.html?id=' + openLeague.dataset.openLeague;
        return;
      }
      var btn = e.target.closest('[data-league-action]');
      if (btn) {
        var status = btn.dataset.leagueAction;
        var note = null;
        if (status === 'approved') {
          var approveResult = await _openModal({ title: 'Approve League', fields: [{ name: 'note', label: 'Optional approval note (leave blank if none)', placeholder: '' }], confirmText: 'Approve', cancelText: 'Cancel' });
          if (approveResult === null) return;
          note = approveResult.note || null;
        }
        try {
          await apiFetch('/admin/leagues/' + btn.dataset.leagueId + '/approval', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: status, note: note || null })
          });
          await load();
          show('League updated.');
        } catch (err) { show(err.message || 'Failed.', 'error'); }
        return;
      }

      var tempTerminateBtn = e.target.closest('[data-league-temp-terminate]');
      if (tempTerminateBtn) {
        var termResult = await _openModal({ title: 'Temporary Termination', fields: [
          { name: 'until', label: 'Terminate until', inputType: 'datetime-local', placeholder: '' },
          { name: 'note', label: 'Optional reason / note (leave blank if none)', placeholder: '' }
        ], confirmText: 'Terminate', cancelText: 'Cancel', confirmClass: 'warn' });
        if (termResult === null) return;
        var untilText = termResult.until;
        if (!untilText) { show('Please specify a date/time.', 'error'); return; }
        var noteText = termResult.note || null;
        try {
          await apiFetch('/admin/leagues/' + tempTerminateBtn.dataset.leagueTempTerminate + '/terminate-temporary', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ until: untilText, note: noteText })
          });
          await load();
          show('League temporarily terminated.');
        } catch (err) { show(err.message || 'Failed.', 'error'); }
        return;
      }

      var unterminateBtn = e.target.closest('[data-league-unterminate]');
      if (unterminateBtn) {
        try {
          await apiFetch('/admin/leagues/' + unterminateBtn.dataset.leagueUnterminate + '/unterminate', { method: 'POST' });
          await load();
          show('League unterminated.');
        } catch (err) { show(err.message || 'Failed.', 'error'); }
        return;
      }

      var deleteLeagueBtn = e.target.closest('[data-league-delete]');
      if (deleteLeagueBtn) {
        var delLeagueName = deleteLeagueBtn.dataset.leagueName || '';
        var delResult = await _openModal({ title: 'Permanently Delete League', message: 'This deletes the league and all related data and cannot be undone. Type the league name exactly to confirm.', fields: [{ name: 'confirm', label: 'League name', placeholder: delLeagueName }], confirmText: 'Delete permanently', cancelText: 'Cancel', confirmClass: 'danger' });
        if (delResult === null) return;
        if (delResult.confirm !== delLeagueName) { show('League name did not match — operation cancelled.', 'error'); return; }
        try {
          await apiFetch('/admin/leagues/' + deleteLeagueBtn.dataset.leagueDelete + '/terminate-permanent', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ confirm: true })
          });
          await load();
          show('League permanently terminated.');
        } catch (err) { show(err.message || 'Failed.', 'error'); }
      }
    });
    document.getElementById('matchList').addEventListener('click', async function(e){
      var delBtn = e.target.closest('[data-match-delete]');
      if (!delBtn) return;
      var title = delBtn.dataset.matchTitle || 'this match';
      var confirmed = await _openModal({ title: 'Delete Match', message: 'Delete "' + title + '"? Removes all events and registrations. Cannot be undone.', fields: [], confirmText: 'Delete match', cancelText: 'Cancel', confirmClass: 'danger' });
      if (!confirmed) return;
      try {
        var resp = await apiFetch('/admin/matches/' + delBtn.dataset.matchDelete, { method: 'DELETE' });
        await load();
        show(resp && resp.detail ? resp.detail : 'Match deleted.', 'ok');
      } catch (err) { show(err.message || 'Failed.', 'error'); }
    });
    document.getElementById('userList').addEventListener('click', async function(e){
      var openPlayer = e.target.closest('[data-open-player]');
      if (openPlayer && !e.target.closest('button')) {
        window.location.href = './player.html?id=' + openPlayer.dataset.openPlayer;
        return;
      }
      var resetBtn = e.target.closest('[data-user-reset]');
      if (resetBtn) {
        var resetResult = await _openModal({ title: 'Reset User Password', fields: [{ name: 'password', label: 'New password (leave blank to auto-generate)', placeholder: 'Auto-generate' }], confirmText: 'Reset password', cancelText: 'Cancel' });
        if (resetResult === null) return;
        var chosen = resetResult.password || null;
        try {
          var response = await apiFetch('/admin/users/' + resetBtn.dataset.userReset + '/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ new_password: chosen || null })
          });
          await _openModal({ title: 'Password Reset', message: 'New password: ' + (response.password || '(auto-generated, check server)'), fields: [], confirmText: 'Done', cancelText: '' });
          show(response.detail || 'Password reset.');
        } catch (err) { show(err.message || 'Failed.', 'error'); }
        return;
      }
      var blockBtn = e.target.closest('[data-user-block]');
      var promoteBtn = e.target.closest('[data-user-promote]');
      if (promoteBtn) {
        var promoteName = promoteBtn.dataset.userName || 'this user';
        var promoteResult = await _openModal({ title: 'Promote User', message: 'Promote "' + promoteName + '" to admin? They will get full admin panel access.', fields: [], confirmText: 'Promote', cancelText: 'Cancel', confirmClass: 'primary' });
        if (!promoteResult) return;
        try {
          var promoteResponse = await apiFetch('/admin/users/' + promoteBtn.dataset.userPromote + '/promote', { method: 'POST' });
          await load();
          show(promoteResponse.detail || 'User promoted to admin.', 'ok');
        } catch (err) { show(err.message || 'Failed.', 'error'); }
        return;
      }
      if (blockBtn) {
        var blockResult = await _openModal({ title: 'Block Account', message: 'Temporarily block this account? The user will no longer be able to sign in until unblocked.', fields: [], confirmText: 'Block account', cancelText: 'Cancel', confirmClass: 'danger' });
        if (!blockResult) return;
        try {
          var response2 = await apiFetch('/admin/users/' + blockBtn.dataset.userBlock + '/block', { method: 'POST' });
          await load();
          show(response2.detail || 'Account blocked.');
        } catch (err) { show(err.message || 'Failed.', 'error'); }
        return;
      }
      var unblockBtn = e.target.closest('[data-user-unblock]');
      if (unblockBtn) {
        try {
          var response3 = await apiFetch('/admin/users/' + unblockBtn.dataset.userUnblock + '/unblock', { method: 'POST' });
          await load();
          show(response3.detail || 'Account unblocked.');
        } catch (err) { show(err.message || 'Failed.', 'error'); }
        return;
      }
      var deleteUserBtn = e.target.closest('[data-user-delete]');
      if (deleteUserBtn) {
        var uname = deleteUserBtn.dataset.userName || '';
        var delUserResult = await _openModal({ title: 'Delete User', message: 'Permanently delete "' + uname + '"? All leagues they own will also be deleted. Cannot be undone. Type the username to confirm.', fields: [{ name: 'confirm', label: 'Username', placeholder: uname }], confirmText: 'Delete user', cancelText: 'Cancel', confirmClass: 'danger' });
        if (delUserResult === null) return;
        if (delUserResult.confirm !== uname) { show('Username did not match.', 'error'); return; }
        try {
          var response4 = await apiFetch('/admin/users/' + deleteUserBtn.dataset.userDelete, { method: 'DELETE' });
          await load();
          show(response4 && response4.detail ? response4.detail : 'User deleted.', 'ok');
        } catch (err) { show(err.message || 'Failed.', 'error'); }
      }
    });

    document.getElementById('hardResetBtn').addEventListener('click', async function() {
      var confirm1 = await _openModal({ title: 'Hard Reset — are you sure?', message: 'This will delete ALL match data, clear all player stats to defaults (rating 1000), and wipe all notifications and social connections. This cannot be undone.', fields: [], confirmText: 'Yes, reset everything', cancelText: 'Cancel', confirmClass: 'danger' });
      if (!confirm1) return;
      var confirm2 = await _openModal({ title: 'Final confirmation', message: 'Type RESET to confirm the hard reset.', fields: [{ name: 'confirm', label: 'Confirmation', placeholder: 'RESET' }], confirmText: 'Reset now', cancelText: 'Cancel', confirmClass: 'danger' });
      if (!confirm2 || confirm2.confirm !== 'RESET') { show('Cancelled — type RESET exactly to confirm.', 'error'); return; }
      try {
        var result = await apiFetch('/admin/hard-reset', { method: 'POST' });
        await load();
        show(result.detail || 'Hard reset complete.', 'ok');
      } catch (err) {
        show((err && err.message) || 'Hard reset failed.', 'error');
      }
    });

    load();
  </script>
</body>
</html>
