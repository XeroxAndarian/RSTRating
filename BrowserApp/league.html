<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>League | EARLY ACCESSS</title>
  <style>
    :root {
      --bg:#d6ece0; --panel:#fff; --card:rgba(248,255,251,.92);
      --text:#0e2c1d; --muted:#4d6f60; --accent:#1f8a4c; --accent-dark:#166337;
      --success:#15803d; --danger:#b42318; --line:rgba(14,44,29,.16);
      --surface:#ffffff; --border:rgba(14,44,29,.18);
    }
    [data-theme="dark"] {
      --bg:#0f1f16; --panel:#1a2e22; --card:rgba(30,48,37,.92);
      --text:#d4edda; --muted:#7faa8e; --accent:#2ab561; --accent-dark:#1d8748;
      --success:#22c55e; --danger:#f87171; --line:rgba(180,220,195,.14);
      --surface:#1a2e22; --border:rgba(180,220,195,.18);
    }
    body { margin:0; font-family:"Roboto","Segoe UI",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    select { padding-right: 2.2em; }
    .wrap { max-width:1100px; margin:24px auto; padding:0 16px; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:18px; margin-bottom:14px; }
    .grid { display:grid; grid-template-columns:2fr 1fr; gap:14px; }
    @media (max-width:860px){ .grid { grid-template-columns:1fr; } }
    h1,h2,h3 { margin:0; }
    .muted { color:var(--muted); }
    .btn { border:none; border-radius:9px; padding:8px 13px; font:inherit; font-size:.88rem; font-weight:700; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:5px; transition:opacity .12s; }
    .btn:hover { opacity:.85; }
    .btn.primary { background:var(--accent); color:#fff; }
    .btn.confirm { background:var(--success); color:#fff; }
    .btn.danger-btn { background:var(--danger); color:#fff; }
    .btn.ghost { border:1px solid var(--line); background:var(--card); color:var(--text); }
    .btn.sm { padding:5px 9px; font-size:.78rem; }
    .pill { display:inline-flex; padding:3px 9px; border-radius:999px; background:rgba(31,138,76,.1); border:1px solid var(--line); font-size:.8rem; color:var(--accent-dark); font-weight:700; }
    .item { border:1px solid var(--line); border-radius:10px; padding:10px 12px; background:var(--card); }
    .list { display:flex; flex-direction:column; gap:6px; }
    .member-table { width:100%; border-collapse:collapse; font-size:.85rem; }
    .member-table th { text-align:left; padding:6px 8px; color:var(--muted); font-size:.78rem; font-weight:700; border-bottom:1px solid var(--line); cursor:pointer; user-select:none; white-space:nowrap; }
    .member-table th:hover { color:var(--accent); }
    .member-table th.sorted { color:var(--accent); }
    .member-table td { padding:7px 8px; border-bottom:1px solid var(--line); }
    .member-table tr:last-child td { border-bottom:none; }
    .member-table tr:hover td { background:rgba(31,138,76,.05); }
    .mt-role { font-size:1.1rem; }
    .mt-name { font-weight:700; }
    .match-item { border:1px solid var(--line); border-radius:10px; padding:10px 12px; background:var(--card); margin-bottom:6px; }
    .announce-item { padding:8px 10px; border-left:3px solid var(--accent); margin-bottom:6px; background:var(--card); border-radius:0 8px 8px 0; }
    .announce-item.unread { border-left-color:var(--danger); }
    .announce-title { font-weight:700; font-size:.88rem; }
    .announce-msg { font-size:.82rem; color:var(--muted); margin-top:2px; }
    .announce-time { font-size:.72rem; color:var(--muted); margin-top:3px; }
    .status { min-height:20px; color:var(--muted); margin-top:8px; font-size:.9rem; }
    .status.error { color:var(--danger); }
    .reg-open { background:var(--accent); color:#fff; }
    .reg-opens-label { font-size:.78rem; color:var(--muted); }
    .preset-quick { display:flex; flex-wrap:wrap; gap:6px; margin:0 0 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row" style="justify-content:space-between; margin-bottom:10px;">
      <div>
        <h1 id="title">League</h1>
        <div class="muted" id="subtitle">Loading...</div>
      </div>
      <div class="row">
        <button class="btn ghost sm" id="darkModeToggle" title="Toggle dark mode">&#x1F319;</button>
        <a class="btn ghost" href="./lobby.html">&#x2190; Lobby</a>
        <a class="btn ghost" id="settingsBtn" href="#" style="display:none;" title="Manager settings">&#x1F4CB; Settings</a>
      </div>
    </div>

    <div class="grid">
      <!-- LEFT -->
      <div>
        <div class="card">
          <div class="row" style="justify-content:space-between;margin-bottom:10px;">
            <h2 style="margin:0;">Matches</h2>
            <a class="btn primary" id="addMatchBtn" href="#" style="display:none;">+ Match</a>
          </div>
          <div id="presetQuick" class="preset-quick" style="display:none;"></div>
          <div id="lastMatchSection" style="display:none; margin-bottom:14px;">
            <div style="font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Last played</div>
            <div id="lastMatch"></div>
          </div>
          <div>
            <div style="font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;">Scheduled</div>
            <div id="upcomingMatches"><p class="muted">No upcoming matches.</p></div>
          </div>
        </div>

        <div class="card">
          <div class="row" style="justify-content:space-between;margin-bottom:10px;">
            <h2>Members</h2>
            <span id="memberCount" class="muted" style="font-size:.85rem;"></span>
          </div>
          <div style="overflow-x:auto;">
            <table class="member-table" id="memberTable">
              <thead>
                <tr>
                  <th></th>
                  <th data-col="name">Name</th>
                  <th data-col="goals">G</th>
                  <th data-col="assists">A</th>
                  <th data-col="winrate">Win%</th>
                  <th data-col="mmr">MMR</th>
                  <th data-col="rating" class="sorted">Rating &#x25BC;</th>
                </tr>
              </thead>
              <tbody id="memberTbody"></tbody>
            </table>
          </div>
        </div>

        <div class="card" id="joinReqCard" style="display:none;">
          <h3 style="margin-bottom:8px;">Join Requests</h3>
          <div id="joinReqList" class="list"></div>
        </div>
      </div>

      <!-- RIGHT -->
      <div>
        <div class="card">
          <h3 style="margin-bottom:8px;">League info</h3>
          <div id="meta" class="muted" style="font-size:.88rem;line-height:1.9;"></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:8px;">&#x1F4E2; Announcements</h3>
          <div id="announcements"><p class="muted" style="font-size:.85rem;">No announcements.</p></div>
        </div>
      </div>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script>
    (function(){
      if(localStorage.getItem("rs_theme") !== "light") document.documentElement.setAttribute("data-theme","dark");
    })();
    document.addEventListener("DOMContentLoaded",function(){
      var btn=document.getElementById("darkModeToggle");
      function upd(){ btn.textContent=document.documentElement.getAttribute("data-theme")==="dark"?"\u2600\uFE0F":"\uD83C\uDF19"; }
      upd();
      btn.addEventListener("click",function(){
        var d=document.documentElement.getAttribute("data-theme")==="dark";
        if(d){document.documentElement.removeAttribute("data-theme");localStorage.setItem("rs_theme","light");}
        else{document.documentElement.setAttribute("data-theme","dark");localStorage.setItem("rs_theme","dark");}
        upd();
      });
    });

    var params=new URLSearchParams(window.location.search);
    var leagueId=Number(params.get("id")||0);
    var TOKEN_KEY="rs_access_token", API_BASE_KEY="rs_api_base_override";
    var DEFAULT_API_BASE="https://rstrating-accounts-api.onrender.com";
    var statusEl=document.getElementById("status");
    var titleEl=document.getElementById("title");
    var subtitleEl=document.getElementById("subtitle");
    var addMatchBtn=document.getElementById("addMatchBtn");
    var settingsBtn=document.getElementById("settingsBtn");

    var detail=null, matches=[], joinRequests=[];
    var sortCol="rating", sortDir=-1;

    function esc(v){return String(v??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");}
    function getToken(){return localStorage.getItem(TOKEN_KEY)||"";}
    function getApiBase(){return(localStorage.getItem(API_BASE_KEY)||DEFAULT_API_BASE).trim();}
    function show(msg,kind){statusEl.textContent=msg;statusEl.className=kind?"status "+kind:"status";}
    function roleIcon(r){return r==="owner"?"\uD83E\uDD35":r==="admin"?"\uD83D\uDC6E":"\uD83D\uDC55";}
    function roleLabel(r){return r==="owner"?"Manager":r==="admin"?"Referee":"Member";}
    function fmtDate(iso){if(!iso)return"-";return new Date(iso).toLocaleString();}
    function fmtShort(iso){if(!iso)return"-";var d=new Date(iso);return d.toLocaleDateString(undefined,{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});}
    function relTime(iso){if(!iso)return"";var diff=Date.now()-new Date(iso).getTime();if(diff<60000)return"just now";if(diff<3600000)return Math.floor(diff/60000)+"m ago";if(diff<86400000)return Math.floor(diff/3600000)+"h ago";return Math.floor(diff/86400000)+"d ago";}

    async function apiFetch(path,options){
      var headers=Object.assign({},options&&options.headers||{});
      var token=getToken();
      if(token)headers.Authorization="Bearer "+token;
      var res=await fetch(getApiBase()+path,Object.assign({},options||{},{headers}));
      var body=null;try{body=await res.json();}catch(e){}
      if(!res.ok)throw new Error((body&&body.detail)||"Request failed");
      return body;
    }

    function canManage(){var r=detail&&detail.league&&detail.league.member_role;return r==="owner"||r==="admin";}

    function renderMeta(){
      var lg=detail.league;
      document.getElementById("meta").innerHTML=
        "<div><strong>Manager:</strong> "+esc(lg.owner_username)+"</div>"+
        "<div><strong>Region:</strong> "+esc(lg.region||"-")+"</div>"+
        "<div><strong>Type:</strong> "+esc(lg.football_type)+" / "+esc(lg.goal_size)+"</div>"+
        "<div><strong>Join:</strong> "+(lg.auto_accept_members?"Auto-accept":"Request only")+"</div>"+
        "<div><strong>Members:</strong> "+esc(lg.member_count)+"</div>"+
        "<div><strong>Created:</strong> "+esc((lg.created_at||"").slice(0,10))+"</div>";
    }

    function renderMatches(){
      var now=Date.now();
      var completed=matches.filter(function(m){return m.status==="completed"||m.status==="finished";})
        .sort(function(a,b){return new Date(b.scheduled_at)-new Date(a.scheduled_at);});
      var upcoming=matches.filter(function(m){return ["upcoming","registration_open","registration_closed","live"].includes(m.status);})
        .sort(function(a,b){return new Date(a.scheduled_at)-new Date(b.scheduled_at);});

      var presetQuick=document.getElementById("presetQuick");
      var presets=(detail&&detail.league&&Array.isArray(detail.league.match_presets))?detail.league.match_presets:[];
      if(canManage()&&presets.length){
        presetQuick.style.display="flex";
        presetQuick.innerHTML=presets.map(function(p,i){
          var nm=esc((p&&p.name)||("Preset "+(i+1)));
          return "<a class=\"btn ghost sm\" href=\"./create_match.html?league_id="+leagueId+"&preset="+i+"\">+ "+nm+"</a>";
        }).join("");
      }else{
        presetQuick.style.display="none";
        presetQuick.innerHTML="";
      }

      var lastSec=document.getElementById("lastMatchSection");
      var lastEl=document.getElementById("lastMatch");
      if(completed.length){
        var mt=completed[0];
        lastSec.style.display="block";
        lastEl.innerHTML="<div class=\"match-item\"><div class=\"row\" style=\"justify-content:space-between;\"><strong>"+esc(mt.title)+"</strong><span class=\"pill\">"+esc(mt.score_a ?? "?")+" \u2013 "+esc(mt.score_b ?? "?")+"</span></div><div class=\"muted\" style=\"font-size:.82rem;\">"+esc(fmtDate(mt.scheduled_at))+(mt.location?" \u00B7 "+esc(mt.location):"")+"</div><div class=\"row\" style=\"margin-top:6px;\"><a class=\"btn ghost sm\" href=\"./match.html?id="+mt.id+"\">Details</a></div></div>";
      } else {
        lastSec.style.display="none";
      }

      var upEl=document.getElementById("upcomingMatches");
      if(!upcoming.length){upEl.innerHTML="<p class=\"muted\">No scheduled matches.</p>";return;}
      upEl.innerHTML=upcoming.map(function(mt){
        var regOpens=mt.registration_opens_at?new Date(mt.registration_opens_at):null;
        var regIsOpen=!regOpens||regOpens.getTime()<=now;
        var regCount=(mt.registered_count!=null?mt.registered_count:(mt.registration_count!=null?mt.registration_count:"?"));
        var regBtn="";
        if(regIsOpen){
          if(mt.is_registered){regBtn="<button class=\"btn ghost sm unregBtn\" data-match=\""+mt.id+"\">Unregister</button>";}
          else{regBtn="<button class=\"btn sm reg-open regBtn\" data-match=\""+mt.id+"\">Register</button>";}
        }else{
          regBtn="<span class=\"reg-opens-label\">Opens "+fmtShort(mt.registration_opens_at)+"</span>";
        }
        return "<div class=\"match-item\"><div class=\"row\" style=\"justify-content:space-between;\"><strong>"+esc(mt.title)+"</strong><span class=\"pill\">\uD83D\uDC65 "+regCount+"/"+esc(mt.max_participants)+"</span></div><div class=\"muted\" style=\"font-size:.82rem;\">"+esc(fmtDate(mt.scheduled_at))+(mt.location?" \u00B7 "+esc(mt.location):"")+"</div><div class=\"row\" style=\"margin-top:6px;\"><a class=\"btn ghost sm\" href=\"./match.html?id="+mt.id+"\">Details</a>"+regBtn+"</div></div>";
      }).join("");
    }

    function renderMembers(){
      var members=(detail.members||[]).slice();
      members.sort(function(a,b){
        var va,vb;
        if(sortCol==="name"){va=(a.display_name||a.username||"").toLowerCase();vb=(b.display_name||b.username||"").toLowerCase();}
        else if(sortCol==="goals"){va=Number(a.goals||0);vb=Number(b.goals||0);}
        else if(sortCol==="assists"){va=Number(a.assists||0);vb=Number(b.assists||0);}
        else if(sortCol==="winrate"){va=a.attendance>0?a.wins/a.attendance:0;vb=b.attendance>0?b.wins/b.attendance:0;}
        else if(sortCol==="mmr"){va=Number(a.mmr||a.rating||0);vb=Number(b.mmr||b.rating||0);}
        else{va=Number(a.rating||0);vb=Number(b.rating||0);}
        if(va<vb)return sortDir;if(va>vb)return -sortDir;return 0;
      });
      document.getElementById("memberTbody").innerHTML=members.map(function(m){
        var wr=m.attendance>0?Math.round(100*m.wins/m.attendance):0;
        return "<tr><td class=\"mt-role\" title=\""+esc(roleLabel(m.role))+"\">"+roleIcon(m.role)+"</td><td class=\"mt-name\">"+esc(m.display_name||m.username)+"</td><td>"+esc(m.goals||0)+"</td><td>"+esc(m.assists||0)+"</td><td>"+wr+"%</td><td>"+esc(m.mmr?Math.round(m.mmr):"-")+"</td><td>"+esc(m.rating?Math.round(m.rating):"-")+"</td></tr>";
      }).join("");
      document.getElementById("memberCount").textContent=members.length+" member"+(members.length!==1?"s":"");
      var labels={name:"Name",goals:"G",assists:"A",winrate:"Win%",mmr:"MMR",rating:"Rating"};
      document.querySelectorAll(".member-table th[data-col]").forEach(function(th){
        var lbl=labels[th.dataset.col]||th.dataset.col;
        if(th.dataset.col===sortCol){th.classList.add("sorted");th.textContent=lbl+(sortDir===-1?" \u25BC":" \u25B2");}
        else{th.classList.remove("sorted");th.textContent=lbl;}
      });
    }

    function renderJoinRequests(){
      var card=document.getElementById("joinReqCard");
      var list=document.getElementById("joinReqList");
      if(!canManage()||!joinRequests.length){card.style.display="none";return;}
      card.style.display="block";
      list.innerHTML=joinRequests.map(function(r){
        return "<div class=\"item\"><div class=\"row\" style=\"justify-content:space-between;\"><strong>"+esc(r.display_name||r.username)+"</strong><span class=\"pill\">pending</span></div><div class=\"muted\" style=\"font-size:.82rem;\">@"+esc(r.username)+" &middot; "+esc(new Date(r.requested_at).toLocaleString())+"</div>"+(r.message?"<div class=\"muted\">"+esc(r.message)+"</div>":"")+"<div class=\"row\" style=\"margin-top:6px;\"><button class=\"btn confirm sm joinReqDecision\" data-id=\""+r.id+"\" data-decision=\"accept\">Accept</button><button class=\"btn danger-btn sm joinReqDecision\" data-id=\""+r.id+"\" data-decision=\"reject\">Reject</button></div></div>";
      }).join("");
    }

    function renderAnnouncements(notifs){
      var el=document.getElementById("announcements");
      if(!notifs||!notifs.length){el.innerHTML="<p class=\"muted\" style=\"font-size:.85rem;\">No announcements.</p>";return;}
      el.innerHTML=notifs.slice(0,10).map(function(n){
        var matchId=(n && n.data && n.data.match_id)?Number(n.data.match_id):0;
        var open=matchId?"onclick=\"window.location.href='./match.html?id="+matchId+"'\" style=\"cursor:pointer;\"":"";
        return "<div class=\"announce-item "+(n.read?"":"unread")+"\" "+open+"><div class=\"announce-title\">"+esc(n.title)+"</div><div class=\"announce-msg\">"+esc(n.message)+"</div><div class=\"announce-time\">"+relTime(n.created_at)+"</div></div>";
      }).join("");
    }

    function render(){
      if(!detail)return;
      var lg=detail.league;
      titleEl.textContent=lg.name;
      subtitleEl.textContent=lg.football_type+" \u00B7 "+lg.goal_size+" \u00B7 "+roleLabel(lg.member_role)+" "+roleIcon(lg.member_role);
      addMatchBtn.style.display=canManage()?"inline-flex":"none";
      addMatchBtn.href="./create_match.html?league_id="+lg.id;
      settingsBtn.style.display=canManage()?"inline-flex":"none";
      settingsBtn.href="./league_settings.html?id="+lg.id;
      renderMeta();renderMatches();renderMembers();renderJoinRequests();
    }

    document.getElementById("memberTable").addEventListener("click",function(e){
      var th=e.target.closest("th[data-col]");
      if(!th)return;
      var col=th.dataset.col;
      if(sortCol===col)sortDir=-sortDir;
      else{sortCol=col;sortDir=col==="name"?1:-1;}
      renderMembers();
    });

    document.body.addEventListener("click",async function(e){
      var regBtn=e.target.closest(".regBtn");
      if(regBtn){try{await apiFetch("/matches/"+regBtn.dataset.match+"/register",{method:"POST"});await load();show("Registered!");}catch(err){show(err.message||"Failed.","error");}return;}
      var unregBtn=e.target.closest(".unregBtn");
      if(unregBtn){try{await apiFetch("/matches/"+unregBtn.dataset.match+"/unregister",{method:"DELETE"});await load();show("Unregistered.");}catch(err){show(err.message||"Failed.","error");}return;}
      var reqBtn=e.target.closest(".joinReqDecision");
      if(reqBtn){try{await apiFetch("/leagues/"+leagueId+"/join-requests/"+Number(reqBtn.dataset.id),{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({decision:reqBtn.dataset.decision})});await load();show("Request "+reqBtn.dataset.decision+"ed.");}catch(err){show(err.message||"Failed.","error");}return;}
    });

    async function load(){
      if(!leagueId){show("Missing league id.","error");return;}
      if(!getToken()){show("Please log in from lobby first.","error");return;}
      try{
        var results=await Promise.all([
          apiFetch("/leagues/"+leagueId),
          apiFetch("/leagues/"+leagueId+"/matches"),
          apiFetch("/leagues/"+leagueId+"/join-requests").catch(function(){return[];}),
          apiFetch("/notifications?league_id="+leagueId).catch(function(){return[];}),
        ]);
        detail=results[0];
        matches=Array.isArray(results[1])?results[1]:[];
        joinRequests=Array.isArray(results[2])?results[2]:[];
        render();
        var notifs=Array.isArray(results[3])?results[3]:(results[3]&&results[3].items||[]);
        renderAnnouncements(notifs);
      }catch(err){
        show(err.message||"Failed loading league.","error");
      }
    }

    load();
  </script>
</body>
</html>
