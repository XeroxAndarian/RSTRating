<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1f8a4c">
  <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(function(){});}</script>
  <script src="./palette.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <title>League Manager</title>
  <style>
    :root { --bg:#e9f7ef; --panel:#ffffff; --panel-soft:#f5f9ff; --text:#0e2c1d; --muted:#4d6f60; --accent:#1f8a4c; --danger:#b42318; --line:rgba(14,44,29,.15); --bg-a:#f3fbf6; --bg-b:#def0e6; }
    [data-theme="dark"] { --bg:#0e1714; --panel:#16241f; --panel-soft:#1b2d27; --text:#e7f5ee; --muted:#9dc4b2; --accent:#2fa765; --danger:#ef6f66; --line:rgba(231,245,238,.2); --bg-a:#101b17; --bg-b:#0b1411; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Roboto", "Segoe UI", sans-serif; background:linear-gradient(135deg,var(--bg-a),var(--bg-b)); color:var(--text); }
    .wrap { max-width:720px; margin:32px auto; padding:0 16px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:24px; }
    h1 { margin:0 0 6px; }
    .sub { color:var(--muted); margin:0 0 20px; }
    label { display:block; font-weight:700; margin:12px 0 6px; }
    input, select, textarea { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:10px; font:inherit; background:var(--panel-soft); color:var(--text); }
    select { padding-right: 2.2em; }
    textarea { min-height:90px; resize:vertical; }
    .row { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
    .btn { border:none; border-radius:9px; padding:11px 16px; font:inherit; font-weight:700; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .btn.primary { background:var(--accent); color:#fff; }
    .btn.ghost { background:var(--panel-soft); color:var(--text); border:1px solid var(--line); }
    .topbar { display:flex; justify-content:flex-end; margin-bottom:10px; }
    .status { margin-top:14px; min-height:20px; color:var(--muted); }
    .status.error { color:var(--danger); }
    .stack { display:flex; flex-direction:column; }
    .sub-card { margin-top:6px; border:1px solid var(--line); border-radius:12px; padding:14px; background:var(--panel-soft); }
    .subtle { color:var(--muted); }
    .location-pill { display:inline-flex; align-items:center; padding:4px 10px; border-radius:999px; border:1px solid var(--line); background:var(--panel-soft); font-size:.8rem; color:var(--muted); }
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }
    .modal-card { width:min(760px,100%); background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; box-shadow:0 18px 40px rgba(0,0,0,.28); }
    .map-wrap { width:100%; height:360px; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
    #leaguePickMap { width:100%; height:100%; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button class="btn ghost" id="darkModeToggle" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
    </div>
    <div class="card">
      <h1>Create League</h1>
      <p class="sub">Set up a new league. You become owner automatically.</p>
      <form id="form">
        <label for="name">League name</label>
        <input id="name" name="name" minlength="3" maxlength="80" required>

        <label for="football_type">Football type</label>
        <select id="football_type" name="football_type" required>
          <option value="outdoor" selected>Outdoor</option>
          <option value="indoor">Indoor</option>
        </select>

        <label for="goal_size">Goal size</label>
        <select id="goal_size" name="goal_size" required>
          <option value="small">Small</option>
          <option value="medium" selected>Medium</option>
          <option value="large">Large</option>
        </select>

        <label for="region">Region</label>
        <input id="region" name="region" maxlength="64" placeholder="e.g. Ljubljana" required>

        <label>League location (for discover by distance)</label>
        <div class="sub-card stack" style="gap:8px;">
          <div class="row" style="margin-top:0;">
            <button class="btn ghost" id="pickLeagueLocationBtn" type="button">Pick on map</button>
            <button class="btn ghost" id="useMyLeagueLocationBtn" type="button">Use my location</button>
            <button class="btn ghost" id="clearLeagueLocationBtn" type="button">Clear location</button>
            <span class="location-pill" id="leagueLocationState">Location not set</span>
          </div>
          <div class="row" style="margin-top:0;">
            <div style="flex:1;min-width:160px;">
              <label for="leagueLatitude" style="margin:0 0 6px;">Latitude</label>
              <input id="leagueLatitude" type="number" step="0.000001" min="-90" max="90" placeholder="46.0569" readonly>
            </div>
            <div style="flex:1;min-width:160px;">
              <label for="leagueLongitude" style="margin:0 0 6px;">Longitude</label>
              <input id="leagueLongitude" type="number" step="0.000001" min="-180" max="180" placeholder="14.5058" readonly>
            </div>
          </div>
        </div>

        <label for="description">Description</label>
        <textarea id="description" name="description" maxlength="300" placeholder="Friday five-a-side..."></textarea>

        <label for="fee_type">League fee type</label>
        <select id="fee_type" name="fee_type">
          <option value="none" selected>No fee</option>
          <option value="yearly">Yearly</option>
          <option value="monthly">Monthly</option>
          <option value="per_attendance">Price per attendance</option>
        </select>

        <label for="fee_value">Fee value</label>
        <input id="fee_value" name="fee_value" type="number" min="0" step="0.01" value="0" placeholder="0.00">

        <div class="row" style="justify-content:space-between;align-items:center;margin-top:12px;">
          <label style="margin:0;">Advanced options</label>
          <button class="btn ghost" id="toggleAdvancedBtn" type="button">Show</button>
        </div>
        <div id="advancedOptions" class="sub-card stack" style="display:none;gap:8px;">
          <label for="sr_start_points">SR start points</label>
          <input id="sr_start_points" type="number" step="0.01" value="1000">
          <label for="sr_goal_points">SR goal points</label>
          <input id="sr_goal_points" type="number" step="0.01" value="10">
          <label for="sr_assist_points">SR assist points</label>
          <input id="sr_assist_points" type="number" step="0.01" value="6">
          <label for="sr_own_goal_points">SR own-goal points</label>
          <input id="sr_own_goal_points" type="number" step="0.01" value="-2">
          <label for="sr_win_points">SR win points</label>
          <input id="sr_win_points" type="number" step="0.01" value="20">
          <label for="sr_draw_points">SR draw points</label>
          <input id="sr_draw_points" type="number" step="0.01" value="0">
          <label for="sr_loss_points">SR loss points</label>
          <input id="sr_loss_points" type="number" step="0.01" value="-20">
        </div>

        <label>Match presets (optional)</label>
        <div class="sub-card stack" style="gap:10px;">
          <div id="presetList" class="stack" style="gap:8px;"></div>
          <div class="row" style="margin-top:0;">
            <button class="btn ghost" id="openPresetEditorBtn" type="button">+ Add preset</button>
          </div>
          <div id="presetEditor" class="stack" style="display:none;gap:8px;border:1px solid var(--line);border-radius:10px;padding:12px;background:var(--panel);">
            <label for="preset_name">Preset name</label>
            <input id="preset_name" type="text" maxlength="80" placeholder="e.g. Thursday Night">
            <label>Match day &amp; time</label>
            <div class="row" style="margin-top:0;">
              <select id="preset_day" style="flex:1;min-width:150px;">
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday" selected>Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
              </select>
              <input id="preset_time" type="time" style="flex:1;min-width:150px;" value="20:00">
            </div>
            <label>Registration opens</label>
            <div class="row" style="margin-top:0;">
              <select id="preset_reg_day" style="flex:1;min-width:150px;">
                <option value="Monday">Monday</option>
                <option value="Tuesday">Tuesday</option>
                <option value="Wednesday">Wednesday</option>
                <option value="Thursday" selected>Thursday</option>
                <option value="Friday">Friday</option>
                <option value="Saturday">Saturday</option>
                <option value="Sunday">Sunday</option>
              </select>
              <input id="preset_reg_time" type="time" style="flex:1;min-width:150px;" value="06:00">
            </div>
            <label for="preset_max">Max players</label>
            <input id="preset_max" type="number" min="2" max="200" step="1" value="16">
            <label for="preset_location">Location</label>
            <input id="preset_location" type="text" maxlength="200" placeholder="e.g. Hall A">
            <label for="preset_notes">Description / notes</label>
            <textarea id="preset_notes" maxlength="300" placeholder="Optional notes"></textarea>
            <div class="row" style="margin-top:0;">
              <button class="btn primary" id="savePresetBtn" type="button">Save preset</button>
              <button class="btn ghost" id="cancelPresetBtn" type="button">Cancel</button>
            </div>
          </div>
        </div>

        <div class="row">
          <button class="btn primary" type="submit">Create</button>
          <a class="btn ghost" href="./lobby.html">Back to lobby</a>
        </div>
      </form>
      <div class="status" id="status"></div>
    </div>
  </div>

  <div class="modal-backdrop" id="leagueMapPickerModal">
    <div class="modal-card">
      <div class="row" style="justify-content:space-between; margin-top:0; margin-bottom:8px;">
        <strong>Pick league location on map</strong>
        <button class="btn ghost" id="closeLeagueMapPickerBtn" type="button">Close</button>
      </div>
      <div class="subtle" style="font-size:.85rem; margin-bottom:8px;">Click anywhere on the map to set league location.</div>
      <div class="map-wrap"><div id="leaguePickMap"></div></div>
      <div class="row" style="margin-top:10px; justify-content:flex-end;">
        <button class="btn primary" id="applyLeagueMapLocationBtn" type="button">Use selected point</button>
      </div>
    </div>
  </div>

  <script>
    (function(){
      if (localStorage.getItem("rs_theme") !== "light") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();

    (function(){
      const btn = document.getElementById("darkModeToggle");
      if (!btn) return;
      const sync = () => {
        btn.textContent = document.documentElement.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
      };
      sync();
      btn.addEventListener("click", () => {
        const dark = document.documentElement.getAttribute("data-theme") === "dark";
        if (dark) {
          document.documentElement.removeAttribute("data-theme");
          localStorage.setItem("rs_theme", "light");
        } else {
          document.documentElement.setAttribute("data-theme", "dark");
          localStorage.setItem("rs_theme", "dark");
        }
        sync();
      });
    })();

    const TOKEN_KEY = "rs_access_token";
    const API_BASE_KEY = "rs_api_base_override";
    const DEFAULT_API_BASE = "https://rstrating-accounts-api.onrender.com";
    const statusEl = document.getElementById("status");
    const presets = [];
    const advancedOptionsEl = document.getElementById("advancedOptions");
    const toggleAdvancedBtn = document.getElementById("toggleAdvancedBtn");
    const leagueLatitudeEl = document.getElementById("leagueLatitude");
    const leagueLongitudeEl = document.getElementById("leagueLongitude");
    const leagueLocationStateEl = document.getElementById("leagueLocationState");
    const leagueMapPickerModalEl = document.getElementById("leagueMapPickerModal");
    let leagueLatitude = null;
    let leagueLongitude = null;
    let leagueMapPicker = null;
    let leagueMapMarker = null;
    let pickedLeagueLatitude = null;
    let pickedLeagueLongitude = null;

    function getToken() { return localStorage.getItem(TOKEN_KEY) || ""; }
    function getApiBase() { return (localStorage.getItem(API_BASE_KEY) || DEFAULT_API_BASE).trim(); }
    function show(msg, kind) { statusEl.textContent = msg; statusEl.className = kind ? `status ${kind}` : "status"; }

    function escapeHtml(v){ return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }

    function numberInputValue(id, fallback) {
      const el = document.getElementById(id);
      const val = Number(el ? el.value : fallback);
      return Number.isFinite(val) ? val : fallback;
    }

    function syncLeagueLocationInputs() {
      if (leagueLatitudeEl) leagueLatitudeEl.value = leagueLatitude === null ? "" : String(leagueLatitude);
      if (leagueLongitudeEl) leagueLongitudeEl.value = leagueLongitude === null ? "" : String(leagueLongitude);
      if (leagueLocationStateEl) {
        leagueLocationStateEl.textContent = (leagueLatitude === null || leagueLongitude === null)
          ? "Location not set"
          : `Location set (${leagueLatitude.toFixed(4)}, ${leagueLongitude.toFixed(4)})`;
      }
    }

    function ensureLeagueMapPicker() {
      if (leagueMapPicker || typeof L === "undefined") return;
      leagueMapPicker = L.map("leaguePickMap", { zoomControl: true }).setView([46.1512, 14.9955], 8);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap"
      }).addTo(leagueMapPicker);
      leagueMapPicker.on("click", function(e){
        pickedLeagueLatitude = Number(e.latlng.lat.toFixed(6));
        pickedLeagueLongitude = Number(e.latlng.lng.toFixed(6));
        if (leagueMapMarker) leagueMapPicker.removeLayer(leagueMapMarker);
        leagueMapMarker = L.marker([pickedLeagueLatitude, pickedLeagueLongitude]).addTo(leagueMapPicker);
      });
    }

    function openLeagueMapPicker() {
      ensureLeagueMapPicker();
      if (!leagueMapPicker) {
        show("Map failed to load. Check internet connection.", "error");
        return;
      }
      if (leagueLatitude !== null && leagueLongitude !== null) {
        pickedLeagueLatitude = Number(leagueLatitude);
        pickedLeagueLongitude = Number(leagueLongitude);
        leagueMapPicker.setView([pickedLeagueLatitude, pickedLeagueLongitude], 12);
        if (leagueMapMarker) leagueMapPicker.removeLayer(leagueMapMarker);
        leagueMapMarker = L.marker([pickedLeagueLatitude, pickedLeagueLongitude]).addTo(leagueMapPicker);
      } else {
        pickedLeagueLatitude = null;
        pickedLeagueLongitude = null;
        leagueMapPicker.setView([46.1512, 14.9955], 8);
        if (leagueMapMarker) { leagueMapPicker.removeLayer(leagueMapMarker); leagueMapMarker = null; }
      }
      leagueMapPickerModalEl.style.display = "flex";
      setTimeout(() => leagueMapPicker.invalidateSize(), 50);
    }

    function closeLeagueMapPicker() {
      if (leagueMapPickerModalEl) leagueMapPickerModalEl.style.display = "none";
    }

    function clearPresetEditor() {
      document.getElementById("preset_name").value = "";
      document.getElementById("preset_day").value = "Thursday";
      document.getElementById("preset_time").value = "20:00";
      document.getElementById("preset_reg_day").value = "Thursday";
      document.getElementById("preset_reg_time").value = "06:00";
      document.getElementById("preset_max").value = "16";
      document.getElementById("preset_location").value = "";
      document.getElementById("preset_notes").value = "";
    }

    function renderPresetList(){
      const list = document.getElementById("presetList");
      if (!list) return;
      if (!presets.length){
        list.innerHTML = '<p class="subtle" style="margin:0;">No presets added yet.</p>';
        return;
      }
      list.innerHTML = presets.map((p, idx) => `
        <div class="row" style="justify-content:space-between;border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-top:0;">
          <div>
            <div style="font-weight:700;">${escapeHtml(p.name)}</div>
            <div class="subtle" style="font-size:0.82rem;">${escapeHtml(p.day)} ${escapeHtml(p.time)} · reg opens: ${escapeHtml(p.registration_day || "-")} ${escapeHtml(p.registration_time || "-")} · max ${escapeHtml(p.max_participants)}${p.location ? " · " + escapeHtml(p.location) : ""}</div>
          </div>
          <button class="btn ghost" type="button" data-remove-preset="${idx}" style="padding:6px 10px;">Remove</button>
        </div>
      `).join("");
      list.querySelectorAll("[data-remove-preset]").forEach(btn => {
        btn.addEventListener("click", () => {
          const i = Number(btn.dataset.removePreset);
          if (Number.isFinite(i) && i >= 0) {
            presets.splice(i, 1);
            renderPresetList();
          }
        });
      });
    }

    async function apiFetch(path, options) {
      const headers = Object.assign({}, options?.headers || {});
      const token = getToken();
      if (token) headers.Authorization = "Bearer " + token;
      const res = await fetch(getApiBase() + path, Object.assign({}, options || {}, { headers }));
      let body = null;
      try { body = await res.json(); } catch {}
      if (!res.ok) throw new Error(body?.detail || "Request failed");
      return body;
    }

    if (!getToken()) {
      show("Please log in from lobby first.", "error");
    }

    const presetEditor = document.getElementById("presetEditor");
    const openPresetEditorBtn = document.getElementById("openPresetEditorBtn");
    const cancelPresetBtn = document.getElementById("cancelPresetBtn");
    const savePresetBtn = document.getElementById("savePresetBtn");
    if (openPresetEditorBtn && presetEditor) {
      openPresetEditorBtn.addEventListener("click", () => {
        clearPresetEditor();
        presetEditor.style.display = "flex";
      });
    }
    if (cancelPresetBtn && presetEditor) {
      cancelPresetBtn.addEventListener("click", () => {
        presetEditor.style.display = "none";
      });
    }
    if (savePresetBtn && presetEditor) {
      savePresetBtn.addEventListener("click", () => {
        const name = document.getElementById("preset_name").value.trim();
        const day = document.getElementById("preset_day").value;
        const time = document.getElementById("preset_time").value;
        const regDay = document.getElementById("preset_reg_day").value;
        const regTime = document.getElementById("preset_reg_time").value;
        const maxParticipants = Number(document.getElementById("preset_max").value) || 16;
        const location = document.getElementById("preset_location").value.trim();
        const notes = document.getElementById("preset_notes").value.trim();
        if (!name) { show("Preset name is required.", "error"); return; }
        if (!time) { show("Preset time is required.", "error"); return; }
        if (!regTime) { show("Registration time is required.", "error"); return; }
        presets.push({
          name,
          day,
          time,
          registration_day: regDay,
          registration_time: regTime,
          max_participants: maxParticipants,
          location: location || null,
          notes: notes || null,
        });
        renderPresetList();
        presetEditor.style.display = "none";
        show("Preset added.", "");
      });
    }
    clearPresetEditor();
    renderPresetList();

    if (toggleAdvancedBtn && advancedOptionsEl) {
      toggleAdvancedBtn.addEventListener("click", () => {
        const open = advancedOptionsEl.style.display !== "none";
        advancedOptionsEl.style.display = open ? "none" : "flex";
        toggleAdvancedBtn.textContent = open ? "Show" : "Hide";
      });
    }

    document.getElementById("pickLeagueLocationBtn")?.addEventListener("click", openLeagueMapPicker);
    document.getElementById("closeLeagueMapPickerBtn")?.addEventListener("click", closeLeagueMapPicker);
    document.getElementById("applyLeagueMapLocationBtn")?.addEventListener("click", () => {
      if (pickedLeagueLatitude === null || pickedLeagueLongitude === null) {
        show("Please click a point on the map first.", "error");
        return;
      }
      leagueLatitude = Number(pickedLeagueLatitude);
      leagueLongitude = Number(pickedLeagueLongitude);
      syncLeagueLocationInputs();
      closeLeagueMapPicker();
      show("League location selected.", "");
    });
    document.getElementById("useMyLeagueLocationBtn")?.addEventListener("click", () => {
      if (!navigator.geolocation) {
        show("Geolocation is not supported in this browser.", "error");
        return;
      }
      navigator.geolocation.getCurrentPosition((pos) => {
        leagueLatitude = Number(pos.coords.latitude.toFixed(6));
        leagueLongitude = Number(pos.coords.longitude.toFixed(6));
        syncLeagueLocationInputs();
        show("League location loaded from your device.", "");
      }, () => {
        show("Could not read your location.", "error");
      }, { enableHighAccuracy: true, timeout: 10000 });
    });
    document.getElementById("clearLeagueLocationBtn")?.addEventListener("click", () => {
      leagueLatitude = null;
      leagueLongitude = null;
      syncLeagueLocationInputs();
      show("League location cleared.", "");
    });
    if (leagueMapPickerModalEl) {
      leagueMapPickerModalEl.addEventListener("click", (e) => {
        if (e.target === leagueMapPickerModalEl) closeLeagueMapPicker();
      });
    }
    syncLeagueLocationInputs();

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.currentTarget;
      try {
        const ratingConfig = {
          sr_start_points: numberInputValue("sr_start_points", 1000),
          sr_goal_points: numberInputValue("sr_goal_points", 10),
          sr_assist_points: numberInputValue("sr_assist_points", 6),
          sr_own_goal_points: numberInputValue("sr_own_goal_points", -2),
          sr_win_points: numberInputValue("sr_win_points", 20),
          sr_draw_points: numberInputValue("sr_draw_points", 0),
          sr_loss_points: numberInputValue("sr_loss_points", -20),
        };
        const league = await apiFetch("/leagues", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: form.name.value.trim(),
            football_type: form.football_type.value,
            goal_size: form.goal_size.value,
            region: form.region.value.trim(),
            description: form.description.value.trim() || null,
            latitude: leagueLatitude,
            longitude: leagueLongitude,
            fee_type: form.fee_type.value,
            fee_value: Number(form.fee_value.value) || 0,
            rating_config: ratingConfig,
            match_presets: presets,
          }),
        });
        var pendingApproval = league && league.approval_status && league.approval_status !== "approved";
        show(pendingApproval ? "League created and submitted for admin approval. Redirecting..." : "League created. Redirecting...", "");
        window.location.href = `./league.html?id=${league.id}`;
      } catch (err) {
        show(err.message || "Failed to create league.", "error");
      }
    });
  </script>
</body>
</html>
