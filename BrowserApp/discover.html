<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover Leagues | RSTRating</title>
  <style>
    :root { --text:#0e2c1d; --muted:#4d6f60; --accent:#1f8a4c; --success:#15803d; --danger:#b42318; --line:rgba(14,44,29,.16); }
    body { margin:0; font-family:Georgia, "Times New Roman", serif; color:var(--text); background:linear-gradient(135deg,#f3fbf6,#def0e6); }
    .wrap { max-width:980px; margin:24px auto; padding:0 16px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .btn { border:none; border-radius:9px; padding:9px 14px; font:inherit; font-weight:700; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .btn.primary { background:var(--accent); color:#fff; }
    .btn.confirm { background:var(--success); color:#fff; }
    .btn.ghost { background:#f3faf6; border:1px solid var(--line); color:var(--text); }
    input, select, textarea { padding:9px 10px; border:1px solid var(--line); border-radius:9px; font:inherit; }
    textarea { width:100%; min-height:68px; resize:vertical; }
    .list { display:flex; flex-direction:column; gap:10px; }
    .item { border:1px solid var(--line); border-radius:12px; padding:12px; }
    .pill { display:inline-flex; padding:3px 9px; border-radius:999px; background:#ebf7ef; border:1px solid var(--line); font-size:.82rem; }
    .muted { color:var(--muted); }
    .status { min-height:20px; color:var(--muted); margin-top:6px; }
    .status.error { color:var(--danger); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row" style="justify-content:space-between; margin-bottom:10px;">
      <div>
        <h1 style="margin:0;">Find Nearby Leagues</h1>
        <div class="muted">Search by region and request to join.</div>
      </div>
      <a class="btn ghost" href="./lobby.html">Back to lobby</a>
    </div>

    <div class="card">
      <div class="row">
        <label for="region" class="muted">Region</label>
        <input id="region" placeholder="e.g. Ljubljana">
        <label for="q" class="muted">Name</label>
        <input id="q" placeholder="search text">
        <button class="btn primary" id="searchBtn" type="button">Search</button>
      </div>
    </div>

    <div class="card">
      <h3 style="margin:0 0 10px;">Results</h3>
      <div id="results" class="list"></div>
      <div id="status" class="status"></div>
    </div>
  </div>

  <script>
    const TOKEN_KEY = "rs_access_token";
    const API_BASE_KEY = "rs_api_base_override";
    const DEFAULT_API_BASE = "https://rstrating-accounts-api.onrender.com";

    const regionEl = document.getElementById("region");
    const qEl = document.getElementById("q");
    const resultsEl = document.getElementById("results");
    const statusEl = document.getElementById("status");

    function esc(v){ return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
    function getToken(){ return localStorage.getItem(TOKEN_KEY) || ""; }
    function getApiBase(){ return (localStorage.getItem(API_BASE_KEY) || DEFAULT_API_BASE).trim(); }
    function show(msg, kind){ statusEl.textContent = msg; statusEl.className = kind ? `status ${kind}` : "status"; }

    async function apiFetch(path, options){
      const headers = Object.assign({}, options?.headers || {});
      const token = getToken();
      if (token) headers.Authorization = "Bearer " + token;
      const res = await fetch(getApiBase() + path, Object.assign({}, options || {}, { headers }));
      let body = null; try { body = await res.json(); } catch {}
      if (!res.ok) throw new Error(body?.detail || "Request failed");
      return body;
    }

    function renderRows(rows){
      if (!rows.length) {
        resultsEl.innerHTML = '<div class="item muted">No leagues found for this filter.</div>';
        return;
      }
      resultsEl.innerHTML = rows.map(r => `
        <div class="item">
          <div class="row" style="justify-content:space-between;"><strong>${esc(r.name)}</strong><span class="pill">${esc(r.football_type)} · ${esc(r.goal_size)}</span></div>
          <div class="muted">Region: ${esc(r.region)} · Owner: ${esc(r.owner_username)} · Members: ${esc(r.member_count)}</div>
          <div class="muted">${esc(r.description || "")}</div>
          <div style="margin-top:8px;">
            ${r.my_request_status === 'pending'
              ? '<span class="pill">Join request pending</span>'
              : `<button class="btn confirm requestBtn" data-id="${r.id}">Request join</button>`}
          </div>
          <div class="requestMessageWrap" style="margin-top:8px; display:none;" id="req-msg-wrap-${r.id}">
            <textarea id="req-msg-${r.id}" placeholder="Optional message for admins"></textarea>
            <div class="row" style="margin-top:6px;"><button class="btn primary submitReqBtn" data-id="${r.id}">Submit request</button></div>
          </div>
        </div>
      `).join("");
    }

    async function search(){
      if (!getToken()) { show("Please log in from lobby first.", "error"); return; }
      try {
        const params = new URLSearchParams();
        if (regionEl.value.trim()) params.set("region", regionEl.value.trim());
        if (qEl.value.trim()) params.set("q", qEl.value.trim());
        const rows = await apiFetch(`/leagues/discover?${params.toString()}`, { method: "GET" });
        renderRows(rows || []);
        show(`Found ${rows.length} leagues.`);
      } catch (err) {
        show(err.message || "Search failed.", "error");
      }
    }

    document.getElementById("searchBtn").addEventListener("click", search);

    document.body.addEventListener("click", async (e) => {
      const reqBtn = e.target.closest(".requestBtn");
      if (reqBtn) {
        const wrap = document.getElementById(`req-msg-wrap-${reqBtn.dataset.id}`);
        if (wrap) wrap.style.display = wrap.style.display === "none" ? "block" : "none";
      }
      const submitBtn = e.target.closest(".submitReqBtn");
      if (submitBtn) {
        const leagueId = Number(submitBtn.dataset.id);
        const msgEl = document.getElementById(`req-msg-${leagueId}`);
        try {
          await apiFetch(`/leagues/${leagueId}/join-requests`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: msgEl ? msgEl.value.trim() || null : null }),
          });
          show("Join request submitted.");
          await search();
        } catch (err) {
          show(err.message || "Could not submit request.", "error");
        }
      }
    });

    search();
  </script>
</body>
</html>
