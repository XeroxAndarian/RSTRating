<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1f8a4c">
  <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(function(){});}</script>
  <script src="./palette.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <title>Looking for League</title>
  <style>
    :root { --text:#0e2c1d; --muted:#4d6f60; --accent:#1f8a4c; --success:#15803d; --danger:#b42318; --line:rgba(14,44,29,.16); --panel:#fff; --panel-soft:#f3faf6; --pill:#ebf7ef; --bg-a:#f3fbf6; --bg-b:#def0e6; }
    [data-theme="dark"] { --text:#e7f5ee; --muted:#9dc4b2; --accent:#2fa765; --success:#26a957; --danger:#ef6f66; --line:rgba(231,245,238,.2); --panel:#16241f; --panel-soft:#1b2d27; --pill:#20362f; --bg-a:#101b17; --bg-b:#0b1411; }
    body { margin:0; font-family:"Roboto", "Segoe UI", sans-serif; color:var(--text); background:linear-gradient(135deg,var(--bg-a),var(--bg-b)); }
    .wrap { max-width:980px; margin:24px auto; padding:0 16px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:12px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .search-grid { display:grid; grid-template-columns:1fr; gap:10px; }
    .search-line { display:flex; flex-wrap:wrap; gap:10px; align-items:end; }
    .field-col { display:flex; flex-direction:column; gap:5px; min-width:160px; }
    .field-col.grow { flex:1; min-width:220px; }
    .location-pill { display:inline-flex; align-items:center; padding:4px 10px; border-radius:999px; border:1px solid var(--line); background:var(--pill); font-size:.8rem; color:var(--muted); }
    .btn { border:none; border-radius:9px; padding:9px 14px; font:inherit; font-weight:700; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .btn.primary { background:var(--accent); color:#fff; }
    .btn.confirm { background:var(--success); color:#fff; }
    .btn.ghost { background:var(--panel-soft); border:1px solid var(--line); color:var(--text); }
    input, select, textarea { padding:9px 10px; border:1px solid var(--line); border-radius:9px; font:inherit; }
    textarea { width:100%; min-height:68px; resize:vertical; }
    .list { display:flex; flex-direction:column; gap:10px; }
    .item { border:1px solid var(--line); border-radius:12px; padding:12px; }
    .pill { display:inline-flex; padding:3px 9px; border-radius:999px; background:var(--pill); border:1px solid var(--line); font-size:.82rem; }
    .muted { color:var(--muted); }
    .status { min-height:20px; color:var(--muted); margin-top:6px; }
    .status.error { color:var(--danger); }
    .build-stamp { font-size:.74rem; color:var(--muted); text-align:right; margin-top:4px; }
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }
    .modal-card { width:min(760px,100%); background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:14px; box-shadow:0 18px 40px rgba(0,0,0,.28); }
    .map-wrap { width:100%; height:360px; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
    #pickMap { width:100%; height:100%; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row" style="justify-content:space-between; margin-bottom:10px;">
      <div>
        <h1 style="margin:0;">Looking for League</h1>
        <div class="muted">Search leagues by region or distance and request to join.</div>
      </div>
      <div class="row">
        <button class="btn ghost" id="darkModeToggle" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
        <a class="btn ghost" href="./lobby.html">Back to lobby</a>
      </div>
    </div>

    <div class="card">
      <div class="search-grid">
        <div class="search-line">
          <div class="field-col grow">
            <label for="q" class="muted">Search by name</label>
            <input id="q" placeholder="League name">
          </div>
          <button class="btn primary" id="searchBtn" type="button">Search</button>
        </div>
        <div class="search-line">
          <div class="field-col grow">
            <label for="region" class="muted">Search by region</label>
            <input id="region" placeholder="e.g. Ljubljana">
          </div>
          <div class="field-col">
            <label for="maxKm" class="muted">Max km</label>
            <input id="maxKm" type="number" step="1" min="1" placeholder="25">
          </div>
          <button class="btn ghost" id="pickOnMapBtn" type="button">Pick on map</button>
          <button class="btn ghost" id="useLocationBtn" type="button">Use my location</button>
          <button class="btn ghost" id="clearLocationBtn" type="button">Clear location</button>
          <span class="location-pill" id="locationState">Location not set</span>
        </div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin:0 0 10px;">Results</h3>
      <div id="results" class="list"></div>
      <div id="status" class="status"></div>
    </div>
    <div class="build-stamp">Build: discover-v2026-05-01-1</div>
  </div>

  <div class="modal-backdrop" id="mapPickerModal">
    <div class="modal-card">
      <div class="row" style="justify-content:space-between; margin-bottom:8px;">
        <strong>Pick location on map</strong>
        <button class="btn ghost" id="closeMapPickerBtn" type="button">Close</button>
      </div>
      <div class="muted" style="font-size:.85rem; margin-bottom:8px;">Click anywhere on the map to set your search location.</div>
      <div class="map-wrap"><div id="pickMap"></div></div>
      <div class="row" style="margin-top:10px; justify-content:flex-end;">
        <button class="btn primary" id="applyMapLocationBtn" type="button">Use selected point</button>
      </div>
    </div>
  </div>

  <script>
    (function(){
      if (localStorage.getItem("rs_theme") !== "light") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();

    (function(){
      const btn = document.getElementById("darkModeToggle");
      if (!btn) return;
      const sync = () => {
        btn.textContent = document.documentElement.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
      };
      sync();
      btn.addEventListener("click", () => {
        const dark = document.documentElement.getAttribute("data-theme") === "dark";
        if (dark) {
          document.documentElement.removeAttribute("data-theme");
          localStorage.setItem("rs_theme", "light");
        } else {
          document.documentElement.setAttribute("data-theme", "dark");
          localStorage.setItem("rs_theme", "dark");
        }
        sync();
      });
    })();

    const TOKEN_KEY = "rs_access_token";
    const API_BASE_KEY = "rs_api_base_override";
    const DEFAULT_API_BASE = "https://rstrating-accounts-api.onrender.com";

    const regionEl = document.getElementById("region");
    const qEl = document.getElementById("q");
    const maxKmEl = document.getElementById("maxKm");
    const locationStateEl = document.getElementById("locationState");
    const resultsEl = document.getElementById("results");
    const statusEl = document.getElementById("status");
    const mapPickerModalEl = document.getElementById("mapPickerModal");
    let currentLatitude = null;
    let currentLongitude = null;
    let mapPicker = null;
    let mapMarker = null;
    let pickedLatitude = null;
    let pickedLongitude = null;

    function esc(v){ return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
    function getToken(){ return localStorage.getItem(TOKEN_KEY) || ""; }
    function getApiBase(){ return (localStorage.getItem(API_BASE_KEY) || DEFAULT_API_BASE).trim(); }
    function show(msg, kind){ statusEl.textContent = msg; statusEl.className = kind ? `status ${kind}` : "status"; }

    async function apiFetch(path, options){
      const headers = Object.assign({}, options?.headers || {});
      const token = getToken();
      if (token) headers.Authorization = "Bearer " + token;
      const res = await fetch(getApiBase() + path, Object.assign({}, options || {}, { headers }));
      let body = null; try { body = await res.json(); } catch {}
      if (!res.ok) throw new Error(body?.detail || "Request failed");
      return body;
    }

    function renderRows(rows){
      if (!rows.length) {
        resultsEl.innerHTML = '<div class="item muted">No leagues found for this filter.</div>';
        return;
      }
      resultsEl.innerHTML = rows.map(r => `
        <div class="item">
          <div class="row" style="justify-content:space-between;"><strong>${esc(r.name)}</strong><span class="pill">${esc(r.football_type)} · ${esc(r.goal_size)}</span></div>
          <div class="muted">Region: ${esc(r.region)} · Owner: ${esc(r.owner_username)} · Members: ${esc(r.member_count)}</div>
          ${(Number.isFinite(Number(r.distance_km))) ? `<div class="muted">Distance: ${Number(r.distance_km).toFixed(1)} km</div>` : ""}
          <div class="muted">${esc(r.description || "")}</div>
          <div style="margin-top:8px;">
            ${r.my_request_status === 'pending'
              ? '<span class="pill">Join request pending</span>'
              : `<button class="btn confirm requestBtn" data-id="${r.id}">Request join</button>`}
          </div>
          <div class="requestMessageWrap" style="margin-top:8px; display:none;" id="req-msg-wrap-${r.id}">
            <textarea id="req-msg-${r.id}" placeholder="Optional message for admins"></textarea>
            <div class="row" style="margin-top:6px;"><button class="btn primary submitReqBtn" data-id="${r.id}">Submit request</button></div>
          </div>
        </div>
      `).join("");
    }

    async function search(){
      if (!getToken()) { show("Please log in from lobby first.", "error"); return; }
      try {
        const params = new URLSearchParams();
        if (regionEl.value.trim()) params.set("region", regionEl.value.trim());
        if (qEl.value.trim()) params.set("q", qEl.value.trim());
        if (currentLatitude !== null) params.set("latitude", String(Number(currentLatitude)));
        if (currentLongitude !== null) params.set("longitude", String(Number(currentLongitude)));
        if (maxKmEl.value !== "") params.set("max_km", String(Number(maxKmEl.value)));
        const rows = await apiFetch(`/leagues/discover?${params.toString()}`, { method: "GET" });
        renderRows(rows || []);
        show(`Found ${rows.length} leagues.`);
      } catch (err) {
        show(err.message || "Search failed.", "error");
      }
    }

    document.getElementById("searchBtn").addEventListener("click", search);
    document.getElementById("useLocationBtn").addEventListener("click", () => {
      if (!navigator.geolocation) {
        show("Geolocation is not supported in this browser.", "error");
        return;
      }
      navigator.geolocation.getCurrentPosition((pos) => {
        currentLatitude = Number(pos.coords.latitude.toFixed(6));
        currentLongitude = Number(pos.coords.longitude.toFixed(6));
        if (!maxKmEl.value) maxKmEl.value = "25";
        if (locationStateEl) locationStateEl.textContent = "Location loaded";
        show("Location loaded. You can now search by distance.");
      }, () => {
        currentLatitude = null;
        currentLongitude = null;
        if (locationStateEl) locationStateEl.textContent = "Location not set";
        show("Could not read your location.", "error");
      }, { enableHighAccuracy: true, timeout: 10000 });
    });

    document.getElementById("clearLocationBtn").addEventListener("click", () => {
      currentLatitude = null;
      currentLongitude = null;
      maxKmEl.value = "";
      if (locationStateEl) locationStateEl.textContent = "Location not set";
      show("Location filter cleared.");
    });

    function ensureMapPicker() {
      if (mapPicker || typeof L === "undefined") return;
      mapPicker = L.map("pickMap", { zoomControl: true }).setView([46.1512, 14.9955], 8);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap"
      }).addTo(mapPicker);
      mapPicker.on("click", function(e){
        pickedLatitude = Number(e.latlng.lat.toFixed(6));
        pickedLongitude = Number(e.latlng.lng.toFixed(6));
        if (mapMarker) mapPicker.removeLayer(mapMarker);
        mapMarker = L.marker([pickedLatitude, pickedLongitude]).addTo(mapPicker);
      });
    }

    function openMapPicker(){
      ensureMapPicker();
      if (!mapPicker) {
        show("Map failed to load. Check internet connection.", "error");
        return;
      }
      if (currentLatitude !== null && currentLongitude !== null) {
        pickedLatitude = Number(currentLatitude);
        pickedLongitude = Number(currentLongitude);
        mapPicker.setView([pickedLatitude, pickedLongitude], 12);
        if (mapMarker) mapPicker.removeLayer(mapMarker);
        mapMarker = L.marker([pickedLatitude, pickedLongitude]).addTo(mapPicker);
      } else {
        pickedLatitude = null;
        pickedLongitude = null;
        mapPicker.setView([46.1512, 14.9955], 8);
        if (mapMarker) { mapPicker.removeLayer(mapMarker); mapMarker = null; }
      }
      mapPickerModalEl.style.display = "flex";
      setTimeout(() => mapPicker.invalidateSize(), 50);
    }

    function closeMapPicker(){
      if (mapPickerModalEl) mapPickerModalEl.style.display = "none";
    }

    document.getElementById("pickOnMapBtn").addEventListener("click", openMapPicker);
    document.getElementById("closeMapPickerBtn").addEventListener("click", closeMapPicker);
    document.getElementById("applyMapLocationBtn").addEventListener("click", () => {
      if (pickedLatitude === null || pickedLongitude === null) {
        show("Please click a point on the map first.", "error");
        return;
      }
      currentLatitude = Number(pickedLatitude);
      currentLongitude = Number(pickedLongitude);
      if (!maxKmEl.value) maxKmEl.value = "25";
      if (locationStateEl) locationStateEl.textContent = "Location loaded";
      closeMapPicker();
      show("Location selected from map.");
    });
    if (mapPickerModalEl) {
      mapPickerModalEl.addEventListener("click", (e) => {
        if (e.target === mapPickerModalEl) closeMapPicker();
      });
    }

    document.body.addEventListener("click", async (e) => {
      const reqBtn = e.target.closest(".requestBtn");
      if (reqBtn) {
        const wrap = document.getElementById(`req-msg-wrap-${reqBtn.dataset.id}`);
        if (wrap) wrap.style.display = wrap.style.display === "none" ? "block" : "none";
      }
      const submitBtn = e.target.closest(".submitReqBtn");
      if (submitBtn) {
        const leagueId = Number(submitBtn.dataset.id);
        const msgEl = document.getElementById(`req-msg-${leagueId}`);
        try {
          await apiFetch(`/leagues/${leagueId}/join-requests`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: msgEl ? msgEl.value.trim() || null : null }),
          });
          show("Join request submitted.");
          await search();
        } catch (err) {
          show(err.message || "Could not submit request.", "error");
        }
      }
    });

    search();
  </script>
</body>
</html>
