<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting | RSTRating</title>
</head>
<body>
  <p style="font-family:Arial,sans-serif;text-align:center;padding-top:40px;">Redirecting to match page...</p>
  <script>
    const token = new URLSearchParams(window.location.search).get("token") || "";
    const target = token ? `./match.html?token=${encodeURIComponent(token)}` : "./lobby.html";
    window.location.replace(target);
  </script>
</body>
</html>
