<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Match | RSTRating</title>
  <style>
    :root { --bg:#e9f7ef; --panel:#fff; --panel-soft:#f5f9ff; --text:#0e2c1d; --muted:#4d6f60; --accent:#1f8a4c; --danger:#b42318; --line:rgba(14,44,29,.15); --bg-a:#f3fbf6; --bg-b:#def0e6; }
    [data-theme="dark"] { --bg:#0e1714; --panel:#16241f; --panel-soft:#1b2d27; --text:#e7f5ee; --muted:#9dc4b2; --accent:#2fa765; --danger:#ef6f66; --line:rgba(231,245,238,.2); --bg-a:#101b17; --bg-b:#0b1411; }
    body { margin:0; font-family:"Roboto", "Segoe UI", sans-serif; background:linear-gradient(135deg,var(--bg-a),var(--bg-b)); color:var(--text); }
    .wrap { max-width:760px; margin:32px auto; padding:0 16px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:24px; }
    h1 { margin:0 0 6px; }
    .sub { color:var(--muted); margin:0 0 20px; }
    label { display:block; margin:12px 0 6px; font-weight:700; }
    input, textarea { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:10px; font:inherit; }
    textarea { min-height:90px; resize:vertical; }
    .row { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
    .btn { border:none; border-radius:9px; padding:11px 16px; font:inherit; font-weight:700; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .btn.primary { background:var(--accent); color:#fff; }
    .btn.ghost { background:var(--panel-soft); color:var(--text); border:1px solid var(--line); }
    .topbar { display:flex; justify-content:flex-end; margin-bottom:10px; }
    .status { margin-top:14px; min-height:20px; color:var(--muted); }
    .status.error { color:var(--danger); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button class="btn ghost" id="darkModeToggle" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
    </div>
    <div class="card">
      <h1>Create Match</h1>
      <p class="sub" id="leagueInfo">Loading league...</p>
      <form id="form">
        <label for="presetSelect">Preset (optional)</label>
        <select id="presetSelect" name="presetSelect">
          <option value="">Custom match (no preset)</option>
        </select>

        <label for="title">Match title</label>
        <input id="title" name="title" maxlength="100" required>

        <label for="location">Location</label>
        <input id="location" name="location" maxlength="200">

        <label for="scheduled_at">Date & time</label>
        <input id="scheduled_at" name="scheduled_at" type="datetime-local" required>

        <label for="registration_opens_at">Registration opens</label>
        <input id="registration_opens_at" name="registration_opens_at" type="datetime-local">

        <label for="max_participants">Max participants</label>
        <input id="max_participants" name="max_participants" type="number" min="2" max="200" value="14" required>

        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" maxlength="1000"></textarea>

        <div class="row">
          <button class="btn primary" type="submit">Create match</button>
          <a class="btn ghost" id="backLeagueLink" href="./index.html">Back</a>
        </div>
      </form>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
    (function(){
      if (localStorage.getItem("rs_theme") !== "light") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();

    (function(){
      const btn = document.getElementById("darkModeToggle");
      if (!btn) return;
      const sync = () => {
        btn.textContent = document.documentElement.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
      };
      sync();
      btn.addEventListener("click", () => {
        const dark = document.documentElement.getAttribute("data-theme") === "dark";
        if (dark) {
          document.documentElement.removeAttribute("data-theme");
          localStorage.setItem("rs_theme", "light");
        } else {
          document.documentElement.setAttribute("data-theme", "dark");
          localStorage.setItem("rs_theme", "dark");
        }
        sync();
      });
    })();

    const params = new URLSearchParams(window.location.search);
    const leagueId = Number(params.get("league_id") || 0);
    const presetParam = Number(params.get("preset") || "");
    const TOKEN_KEY = "rs_access_token";
    const API_BASE_KEY = "rs_api_base_override";
    const DEFAULT_API_BASE = "https://rstrating-accounts-api.onrender.com";
    const statusEl = document.getElementById("status");
    let currentLeague = null;

    function getToken() { return localStorage.getItem(TOKEN_KEY) || ""; }
    function getApiBase() { return (localStorage.getItem(API_BASE_KEY) || DEFAULT_API_BASE).trim(); }
    function show(msg, kind) { statusEl.textContent = msg; statusEl.className = kind ? `status ${kind}` : "status"; }

    async function apiFetch(path, options) {
      const headers = Object.assign({}, options?.headers || {});
      const token = getToken();
      if (token) headers.Authorization = "Bearer " + token;
      const res = await fetch(getApiBase() + path, Object.assign({}, options || {}, { headers }));
      let body = null; try { body = await res.json(); } catch {}
      if (!res.ok) throw new Error(body?.detail || "Request failed");
      return body;
    }

    if (!leagueId) show("Missing league_id in URL.", "error");
    if (!getToken()) show("Please log in from lobby first.", "error");
    document.getElementById("backLeagueLink").href = leagueId ? `./league.html?id=${leagueId}` : "./index.html";

    (async () => {
      if (!leagueId || !getToken()) return;
      try {
        const detail = await apiFetch(`/leagues/${leagueId}`, { method: "GET" });
        currentLeague = detail.league;
        document.getElementById("leagueInfo").textContent = `League: ${detail.league.name}`;

        const presets = Array.isArray(detail.league.match_presets) ? detail.league.match_presets : [];
        const presetSelect = document.getElementById("presetSelect");
        const form = document.getElementById("form");
        const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        const dayIndex = d => {
          const i = days.findIndex(x => x.toLowerCase() === String(d || "").toLowerCase());
          return i >= 0 ? i : null;
        };
        const nextDateTimeLocal = (weekday, hhmm) => {
          const idxDay = dayIndex(weekday);
          if (idxDay === null || !hhmm || !/^\d{2}:\d{2}$/.test(hhmm)) return "";
          const now = new Date();
          const d = new Date(now);
          const delta = (idxDay - d.getDay() + 7) % 7;
          d.setDate(d.getDate() + delta);
          const [hh, mm] = hhmm.split(":").map(Number);
          d.setHours(hh, mm, 0, 0);
          if (d.getTime() <= now.getTime()) d.setDate(d.getDate() + 7);
          const pad = n => String(n).padStart(2, "0");
          return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        };
        const subtractHoursLocal = (dateTimeLocal, hours) => {
          if (!dateTimeLocal || !Number.isFinite(hours)) return "";
          const d = new Date(dateTimeLocal);
          if (Number.isNaN(d.getTime())) return "";
          d.setHours(d.getHours() - Math.max(0, hours));
          const pad = n => String(n).padStart(2, "0");
          return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
        };
        const applyPreset = (p) => {
          if (!form || !p) return;
          form.title.value = p.name || form.title.value;
          form.location.value = p.location || "";
          form.max_participants.value = Number(p.max_participants || 16);
          form.notes.value = p.notes || "";
          const sched = nextDateTimeLocal(p.day, p.time);
          const regHours = Number(p.registration_hours_before);
          const regOpen = Number.isFinite(regHours)
            ? subtractHoursLocal(sched, regHours)
            : nextDateTimeLocal(p.registration_day, p.registration_time);
          if (sched) form.scheduled_at.value = sched;
          if (regOpen) form.registration_opens_at.value = regOpen;
        };
        if (presetSelect) {
          presetSelect.innerHTML = '<option value="">Custom match (no preset)</option>' + presets.map((p, i) => `<option value="${i}">${(p.name || `Preset ${i + 1}`)}</option>`).join("");
          presetSelect.addEventListener("change", () => {
            const idx = Number(presetSelect.value);
            if (!Number.isFinite(idx) || idx < 0 || idx >= presets.length) return;
            applyPreset(presets[idx]);
          });

          if (Number.isFinite(presetParam) && presetParam >= 0 && presetParam < presets.length) {
            presetSelect.value = String(presetParam);
            applyPreset(presets[presetParam]);
          }
        }
      } catch (err) {
        show(err.message || "Could not load league.", "error");
      }
    })();

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!leagueId) return;
      const form = e.currentTarget;
      try {
        const payload = {
          title: form.title.value.trim(),
          location: form.location.value.trim() || null,
          scheduled_at: new Date(form.scheduled_at.value).toISOString(),
          registration_opens_at: form.registration_opens_at.value ? new Date(form.registration_opens_at.value).toISOString() : null,
          max_participants: Number(form.max_participants.value),
          notes: form.notes.value.trim() || null,
        };
        const match = await apiFetch(`/leagues/${leagueId}/matches`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        show("Match created. Redirecting...", "");
        window.location.href = `./match.html?id=${match.id}`;
      } catch (err) {
        show(err.message || "Failed to create match.", "error");
      }
    });
  </script>
</body>
</html>
