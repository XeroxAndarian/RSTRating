<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1f8a4c">
  <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(function(){});}</script>
  <script src="./palette.js"></script>
  <title>League Manager</title>
  <style>
    :root { --bg:#e9f7ef; --panel:#fff; --panel-soft:#f5f9ff; --text:#0e2c1d; --muted:#4d6f60; --accent:#1f8a4c; --danger:#b42318; --line:rgba(14,44,29,.15); --bg-a:#f3fbf6; --bg-b:#def0e6; }
    [data-theme="dark"] { --bg:#0e1714; --panel:#16241f; --panel-soft:#1b2d27; --text:#e7f5ee; --muted:#9dc4b2; --accent:#2fa765; --danger:#ef6f66; --line:rgba(231,245,238,.2); --bg-a:#101b17; --bg-b:#0b1411; }
    body { margin:0; font-family:"Roboto", "Segoe UI", sans-serif; background:linear-gradient(135deg,var(--bg-a),var(--bg-b)); color:var(--text); }
    .wrap { max-width:760px; margin:32px auto; padding:0 16px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:24px; }
    h1 { margin:0 0 6px; }
    .sub { color:var(--muted); margin:0 0 20px; }
    label { display:block; margin:12px 0 6px; font-weight:700; }
    input, textarea { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:10px; font:inherit; box-sizing:border-box; background:var(--panel-soft); color:var(--text); }
    textarea { min-height:84px; resize:vertical; }
    .hint { color:var(--muted); font-size:.88rem; margin:8px 0 0; }
    .row { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
    .btn { border:none; border-radius:9px; padding:11px 16px; font:inherit; font-weight:700; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .btn.primary { background:var(--accent); color:#fff; }
    .btn.ghost { background:var(--panel-soft); color:var(--text); border:1px solid var(--line); }
    .topbar { display:flex; justify-content:flex-end; margin-bottom:10px; }
    .status { margin-top:14px; min-height:20px; color:var(--muted); }
    .status.error { color:var(--danger); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <button class="btn ghost" id="darkModeToggle" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
    </div>
    <div class="card">
      <h1>Create Season</h1>
      <p class="sub" id="leagueInfo">Loading league...</p>
      <form id="form">
        <label for="name">Season name</label>
        <input id="name" name="name" maxlength="80" required placeholder="Season 2">

        <label for="start_at">Start</label>
        <input id="start_at" name="start_at" type="datetime-local" required>

        <label for="end_at">End</label>
        <input id="end_at" name="end_at" type="datetime-local" required>

        <label for="description">Description</label>
        <textarea id="description" name="description" maxlength="300" placeholder="Optional season notes"></textarea>

        <p class="hint">The season can overlap neither past nor future seasons. If its window includes now, it will be activated automatically.</p>

        <div class="row">
          <button class="btn primary" type="submit">Create season</button>
          <a class="btn ghost" id="backLeagueLink" href="./index.html">Back</a>
        </div>
      </form>
      <div class="status" id="status"></div>
    </div>
  </div>

  <script>
    (function(){ if(localStorage.getItem("rs_theme") !== "light") document.documentElement.setAttribute("data-theme","dark"); })();
    (function(){
      const btn=document.getElementById("darkModeToggle");
      const sync=()=>btn.textContent=document.documentElement.getAttribute("data-theme")==="dark"?"☀️":"🌙";
      sync();
      btn.addEventListener("click",()=>{
        const dark=document.documentElement.getAttribute("data-theme")==="dark";
        if(dark){ document.documentElement.removeAttribute("data-theme"); localStorage.setItem("rs_theme","light"); }
        else { document.documentElement.setAttribute("data-theme","dark"); localStorage.setItem("rs_theme","dark"); }
        sync();
      });
    })();

    const params=new URLSearchParams(window.location.search);
    const leagueId=Number(params.get("league_id")||0);
    const TOKEN_KEY="rs_access_token";
    const API_BASE_KEY="rs_api_base_override";
    const DEFAULT_API_BASE="https://rstrating-accounts-api.onrender.com";
    const statusEl=document.getElementById("status");

    function getToken(){ return localStorage.getItem(TOKEN_KEY)||""; }
    function getApiBase(){ return (localStorage.getItem(API_BASE_KEY)||DEFAULT_API_BASE).trim(); }
    function show(msg,kind){ statusEl.textContent=msg; statusEl.className=kind?"status "+kind:"status"; }

    async function apiFetch(path, options){
      const headers=Object.assign({}, options&&options.headers||{});
      const token=getToken();
      if(token) headers.Authorization="Bearer "+token;
      const res=await fetch(getApiBase()+path, Object.assign({}, options||{}, {headers}));
      let body=null; try{ body=await res.json(); }catch(e){}
      if(!res.ok) throw new Error((body&&body.detail)||"Request failed");
      return body;
    }

    if (!leagueId) show("Missing league id.", "error");
    if (!getToken()) show("Please sign in first.", "error");
    document.getElementById("backLeagueLink").href = leagueId ? `./league.html?id=${leagueId}` : "./index.html";

    (async ()=>{
      if(!leagueId||!getToken()) return;
      try{
        const detail=await apiFetch(`/leagues/${leagueId}`);
        document.getElementById("leagueInfo").textContent=`League: ${detail.league.name}`;
      }catch(err){ show(err.message||"Could not load league.","error"); }
    })();

    document.getElementById("form").addEventListener("submit", async (e)=>{
      e.preventDefault();
      if(!leagueId) return;
      const form=e.currentTarget;
      try{
        const startIso=new Date(form.start_at.value).toISOString();
        const endIso=new Date(form.end_at.value).toISOString();
        if(new Date(endIso) <= new Date(startIso)){
          show("Season end must be after start.","error");
          return;
        }
        const now=new Date();
        const shouldActivate=new Date(startIso) <= now && now < new Date(endIso);
        await apiFetch(`/leagues/${leagueId}/seasons`, {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            name:form.name.value.trim(),
            description:(form.description.value||"").trim()||null,
            start_at:startIso,
            end_at:endIso,
            activate:shouldActivate
          }),
        });
        show("Season created. Redirecting...","");
        window.location.href=`./league.html?id=${leagueId}`;
      }catch(err){
        show(err.message||"Failed to create season.","error");
      }
    });
  </script>
</body>
</html>
