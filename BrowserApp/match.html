<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match | RSTRating</title>
  <style>
    :root { --bg:#e9f7ef; --panel:#fff; --panel-soft:#f3faf6; --text:#0e2c1d; --muted:#4d6f60; --accent:#1f8a4c; --success:#15803d; --danger:#b42318; --line:rgba(14,44,29,.16); --pill:#ebf7ef; --bg-a:#f3fbf6; --bg-b:#def0e6; }
    [data-theme="dark"] { --bg:#0e1714; --panel:#16241f; --panel-soft:#1b2d27; --text:#e7f5ee; --muted:#9dc4b2; --accent:#2fa765; --success:#26a957; --danger:#ef6f66; --line:rgba(231,245,238,.2); --pill:#20362f; --bg-a:#101b17; --bg-b:#0b1411; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Roboto", "Segoe UI", sans-serif; background:linear-gradient(135deg,var(--bg-a),var(--bg-b)); color:var(--text); text-align:center; }
    .wrap { max-width:1040px; margin:24px auto; padding:0 16px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:center; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:12px; }
    h1,h2,h3 { margin:0; }
    .muted { color:var(--muted); }
    .btn { border:none; border-radius:9px; padding:8px 14px; font:inherit; font-weight:700; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }
    .btn.primary{ background:var(--accent); color:#fff; }
    .btn.confirm{ background:var(--success); color:#fff; }
    .btn.danger{ background:var(--danger); color:#fff; }
    .btn.ghost{ background:var(--panel-soft); border:1px solid var(--line); color:var(--text); }
    .pill { display:inline-flex; padding:4px 10px; border-radius:999px; background:var(--pill); border:1px solid var(--line); font-size:.82rem; }
    .score-grid { display:grid; grid-template-columns:1fr auto 1fr; gap:10px; align-items:center; margin-top:10px; }
    .team-title { font-size:1.25rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .team-title.right { text-align:right; }
    .team-title.left { text-align:left; }
    .score-main { font-size:2.2rem; font-weight:800; min-width:130px; }
    .clock { margin-top:6px; font-weight:700; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width:860px){ .grid { grid-template-columns:1fr; } .team-title.right,.team-title.left { text-align:center; } .score-grid { grid-template-columns:1fr; } }
    .list { display:flex; flex-direction:column; gap:8px; }
    .item { border:1px solid var(--line); border-radius:10px; padding:10px; }
    .events-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width:860px){ .events-grid { grid-template-columns:1fr; } }
    .events-col { border:1px solid var(--line); border-radius:12px; padding:12px; background:var(--panel-soft); }
    .status { min-height:20px; color:var(--muted); margin-top:8px; }
    .status.error { color:var(--danger); }
    .small { font-size:.86rem; }
    .state-live { background:rgba(180,35,24,.14); border-color:rgba(180,35,24,.4); color:#b42318; }
    .state-registration_open { background:rgba(31,138,76,.16); border-color:rgba(31,138,76,.4); }
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; z-index:100; padding:20px; }
    .modal-card { width:100%; max-width:420px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; text-align:left; }
    .stack { display:flex; flex-direction:column; gap:8px; }
    input, select { padding:8px 10px; border:1px solid var(--line); border-radius:8px; font:inherit; width:100%; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row" style="justify-content:space-between; margin-bottom:8px;">
      <div style="flex:1; min-width:220px;">
        <h1 id="title">Match</h1>
        <div id="sub" class="muted">Loading...</div>
      </div>
      <div class="row" style="justify-content:flex-end;">
        <button class="btn ghost" id="darkModeToggle" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
        <a class="btn ghost" href="./lobby.html">Lobby</a>
        <a class="btn ghost" id="leagueLink" href="./index.html">League</a>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:center;">
        <span class="pill" id="state">-</span>
        <span class="pill" id="viewTag">normal</span>
      </div>
      <div class="score-grid">
        <div class="team-title left" id="teamAHeader">Team A</div>
        <div class="score-main" id="score">0 - 0</div>
        <div class="team-title right" id="teamBHeader">Team B</div>
      </div>
      <div class="clock" id="clockText">Full Time</div>
      <div class="muted" id="meta" style="margin-top:6px;"></div>
      <div class="row" id="actions" style="margin-top:10px;"></div>
    </div>

    <div class="grid">
      <div class="card">
        <h3 style="margin-bottom:8px;">Teams</h3>
        <div class="grid">
          <div>
            <div class="small muted">Team A Name</div>
            <input id="teamAName" maxlength="60" placeholder="Team A">
          </div>
          <div>
            <div class="small muted">Team B Name</div>
            <input id="teamBName" maxlength="60" placeholder="Team B">
          </div>
        </div>
        <div class="row" id="teamNameButtons" style="margin-top:8px;"></div>
        <div class="grid" style="margin-top:10px;">
          <div class="item" id="teamAPlayers"></div>
          <div class="item" id="teamBPlayers"></div>
        </div>
      </div>
      <div class="card" id="registrationsCard">
        <h3 style="margin-bottom:8px;">Registrations</h3>
        <div id="regs" class="list"></div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:8px;">Match Events</h3>
      <div class="events-grid">
        <div class="events-col">
          <h4 id="eventsATitle" style="margin-bottom:8px;">Team A</h4>
          <div id="eventsA" class="list"></div>
          <div class="row" id="adminBtnsA" style="margin-top:8px;"></div>
        </div>
        <div class="events-col">
          <h4 id="eventsBTitle" style="margin-bottom:8px;">Team B</h4>
          <div id="eventsB" class="list"></div>
          <div class="row" id="adminBtnsB" style="margin-top:8px;"></div>
        </div>
      </div>
    </div>

    <div id="status" class="status"></div>
  </div>

  <div class="modal-backdrop" id="eventModal">
    <div class="modal-card">
      <h3 id="eventModalTitle">Add event</h3>
      <div class="stack" style="margin-top:10px;">
        <label for="eventPlayer">Player</label>
        <select id="eventPlayer"></select>
        <label><input type="checkbox" id="assistToggle"> Assist</label>
        <select id="assistPlayer" style="display:none;"></select>
        <label><input type="checkbox" id="ownGoalToggle"> Own goal (from opposite team)</label>
        <select id="ownGoalPlayer" style="display:none;"></select>
        <div class="row" style="justify-content:flex-end;margin-top:8px;">
          <button class="btn ghost" id="eventCancelBtn" type="button">Cancel</button>
          <button class="btn primary" id="eventSaveBtn" type="button">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      if (localStorage.getItem("rs_theme") !== "light") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();

    (function(){
      const btn = document.getElementById("darkModeToggle");
      const sync = () => { btn.textContent = document.documentElement.getAttribute("data-theme") === "dark" ? "☀️" : "🌙"; };
      sync();
      btn.addEventListener("click", () => {
        const dark = document.documentElement.getAttribute("data-theme") === "dark";
        if (dark) {
          document.documentElement.removeAttribute("data-theme");
          localStorage.setItem("rs_theme", "light");
        } else {
          document.documentElement.setAttribute("data-theme", "dark");
          localStorage.setItem("rs_theme", "dark");
        }
        sync();
      });
    })();

    const params = new URLSearchParams(window.location.search);
    const matchId = Number(params.get("id") || 0);
    const previewToken = params.get("token") || "";
    const TOKEN_KEY = "rs_access_token";
    const API_BASE_KEY = "rs_api_base_override";
    const DEFAULT_API_BASE = "https://rstrating-accounts-api.onrender.com";

    const titleEl = document.getElementById("title");
    const subEl = document.getElementById("sub");
    const scoreEl = document.getElementById("score");
    const stateEl = document.getElementById("state");
    const viewTagEl = document.getElementById("viewTag");
    const metaEl = document.getElementById("meta");
    const clockEl = document.getElementById("clockText");
    const actionsEl = document.getElementById("actions");
    const regsEl = document.getElementById("regs");
    const teamAHeader = document.getElementById("teamAHeader");
    const teamBHeader = document.getElementById("teamBHeader");
    const teamANameInput = document.getElementById("teamAName");
    const teamBNameInput = document.getElementById("teamBName");
    const teamNameButtons = document.getElementById("teamNameButtons");
    const teamAPlayers = document.getElementById("teamAPlayers");
    const teamBPlayers = document.getElementById("teamBPlayers");
    const eventsATitle = document.getElementById("eventsATitle");
    const eventsBTitle = document.getElementById("eventsBTitle");
    const eventsAEl = document.getElementById("eventsA");
    const eventsBEl = document.getElementById("eventsB");
    const adminBtnsA = document.getElementById("adminBtnsA");
    const adminBtnsB = document.getElementById("adminBtnsB");
    const registrationsCard = document.getElementById("registrationsCard");
    const leagueLink = document.getElementById("leagueLink");
    const statusEl = document.getElementById("status");

    const ADJECTIVES = ["Swift", "Iron", "Bold", "Rapid", "Mighty", "Prime", "Fierce", "Royal", "Urban", "Classic"];
    const NOUNS = ["Falcons", "Titans", "Wolves", "Strikers", "United", "Rangers", "Storm", "Warriors", "Athletic", "Legends"];

    let detail = null;
    let leagueRole = null;
    let viewMode = "normal"; // admin | normal | censored
    let editingTeams = false;
    let draft = { teamA: [], teamB: [] };
    let pendingEvent = { eventType: "goal", team: "a" };

    function esc(v){ return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
    function show(msg, kind){ statusEl.textContent = msg; statusEl.className = kind ? `status ${kind}` : "status"; }
    function getToken(){ return localStorage.getItem(TOKEN_KEY) || ""; }
    function getApiBase(){ return (localStorage.getItem(API_BASE_KEY) || DEFAULT_API_BASE).trim(); }
    function isAdmin(){ return viewMode === "admin"; }
    function isCensored(){ return viewMode === "censored"; }

    async function apiFetch(path, options){
      const headers = Object.assign({}, options?.headers || {});
      const token = getToken();
      if (token) headers.Authorization = "Bearer " + token;
      const res = await fetch(getApiBase() + path, Object.assign({}, options || {}, { headers }));
      let body = null; try { body = await res.json(); } catch {}
      if (!res.ok) throw new Error(body?.detail || "Request failed");
      return body;
    }

    async function publicFetch(path){
      const res = await fetch(getApiBase() + path);
      let body = null; try { body = await res.json(); } catch {}
      if (!res.ok) throw new Error(body?.detail || "Request failed");
      return body;
    }

    function statusLabel(s){
      const map = {
        upcoming: "Upcoming",
        registration_open: "Registration Open",
        registration_closed: "Registration Closed",
        live: "LIVE",
        finished: "Finished",
        completed: "Completed",
        cancelled: "Cancelled"
      };
      return map[s] || s;
    }

    function randomTeamName(){
      return `${ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)]} ${NOUNS[Math.floor(Math.random() * NOUNS.length)]}`;
    }

    function formatIso(iso){
      const d = new Date(iso);
      return Number.isNaN(d.getTime()) ? iso : d.toLocaleString();
    }

    function minutesLabel(seconds){
      return `${Math.floor(Number(seconds || 0) / 60)}'`;
    }

    function participantsMap(){
      const m = new Map();
      (detail?.registrations || []).forEach((r) => m.set(Number(r.user_id), r));
      return m;
    }

    function playerName(uid){
      const p = participantsMap().get(Number(uid));
      if (!p) return `#${uid}`;
      return p.display_name || p.username;
    }

    function playerNameForView(uid){
      if (isCensored()) return "Player";
      return playerName(uid);
    }

    function teamEventsMap(){
      const events = (detail?.events || []).filter((e) => !e.undone);
      const assistsByKey = new Map();
      events.filter((e) => e.event_type === "assist").forEach((e) => {
        const key = `${e.team}|${e.event_seconds}`;
        const arr = assistsByKey.get(key) || [];
        arr.push(e);
        assistsByKey.set(key, arr);
      });

      const a = [];
      const b = [];
      events.forEach((e) => {
        if (e.event_type === "assist") return;
        const team = e.team === "b" ? "b" : "a";
        const key = `${team}|${e.event_seconds}`;
        let text = "";
        if (e.event_type === "goal") {
          const assists = assistsByKey.get(key) || [];
          const assist = assists.shift();
          const assistText = assist ? ` (${esc(playerNameForView(assist.user_id))})` : "";
          text = `⚽ ${esc(playerNameForView(e.user_id))}${assistText} - ${minutesLabel(e.event_seconds)}`;
        } else if (e.event_type === "own_goal") {
          text = `🥅 ${esc(playerNameForView(e.user_id))} - ${minutesLabel(e.event_seconds)}`;
        } else if (e.event_type === "injury") {
          text = `➕ ${esc(playerNameForView(e.user_id))} - ${minutesLabel(e.event_seconds)}`;
        } else if (e.event_type === "yellow_card") {
          text = `🟨 ${esc(playerNameForView(e.user_id))} - ${minutesLabel(e.event_seconds)}`;
        } else if (e.event_type === "red_card") {
          text = `🟥 ${esc(playerNameForView(e.user_id))} - ${minutesLabel(e.event_seconds)}`;
        } else {
          text = `${esc(e.event_type)} - ${minutesLabel(e.event_seconds)}`;
        }
        (team === "a" ? a : b).push(text);
      });
      return { a, b };
    }

    function renderActions(){
      const m = detail.match;
      const my = m.my_registration_status;
      const btns = [];

      if (!isCensored() && m.status === "registration_open") {
        if (!my || my === "cancelled") btns.push('<button class="btn primary" data-act="register">Register</button>');
        if (my && my !== "cancelled") btns.push('<button class="btn danger" data-act="cancel-reg">Cancel registration</button>');
      }

      if (isAdmin()) {
        if (m.status === "upcoming" || m.status === "registration_closed") btns.push('<button class="btn primary" data-act="open-reg">Open registration</button>');
        if (m.status === "registration_open") btns.push('<button class="btn danger" data-act="close-reg">Close registration</button>');
        if (m.status === "registration_closed") {
          btns.push('<button class="btn primary" data-act="generate">Generate teams</button>');
          btns.push(`<button class="btn ghost" data-act="edit-teams">${editingTeams ? "Stop editing" : "Edit teams"}</button>`);
          if (editingTeams) btns.push('<button class="btn primary" data-act="save-teams">Save draft</button>');
          if (!m.teams_confirmed) btns.push('<button class="btn confirm" data-act="confirm-teams">Confirm teams</button>');
          if (m.teams_confirmed) btns.push('<button class="btn confirm" data-act="start">Start match</button>');
        }
        if (m.status === "live") btns.push('<button class="btn confirm" data-act="finish">Finish match</button>');
        if (m.status === "finished") btns.push('<button class="btn confirm" data-act="confirm">Confirm result</button>');
        if (m.status !== "completed" && m.status !== "cancelled") btns.push('<button class="btn danger" data-act="cancel">Cancel match</button>');
      }

      actionsEl.innerHTML = btns.join("");
    }

    function renderTeams(){
      const m = detail.match;
      const pMap = participantsMap();
      const teamA = draft.teamA.length ? draft.teamA : (m.team_a || []);
      const teamB = draft.teamB.length ? draft.teamB : (m.team_b || []);

      const mkPlayers = (ids) => ids.map((uid) => {
        const p = pMap.get(Number(uid));
        const name = isCensored() ? "Player" : (p ? (p.display_name || p.username) : `#${uid}`);
        const rate = p ? ` <span class="muted small">(${Number(p.seasonal_rating || 0).toFixed(1)})</span>` : "";
        const move = editingTeams && isAdmin() ? `<button class="btn ghost small" data-move="${uid}">move</button>` : "";
        return `<div class="item">${esc(name)}${isCensored() ? "" : rate} ${move}</div>`;
      }).join("") || '<div class="muted small">No players.</div>';

      teamAPlayers.innerHTML = `<h4>${esc(m.team_a_name || "Team A")}</h4><div class="list">${mkPlayers(teamA)}</div>`;
      teamBPlayers.innerHTML = `<h4>${esc(m.team_b_name || "Team B")}</h4><div class="list">${mkPlayers(teamB)}</div>`;

      teamANameInput.value = m.team_a_name || "Team A";
      teamBNameInput.value = m.team_b_name || "Team B";
      teamANameInput.disabled = !isAdmin() || !editingTeams;
      teamBNameInput.disabled = !isAdmin() || !editingTeams;

      if (isAdmin() && editingTeams) {
        teamNameButtons.innerHTML = '<button class="btn ghost" id="randA" type="button">Random Team A</button><button class="btn ghost" id="randB" type="button">Random Team B</button>';
        document.getElementById("randA").onclick = () => { teamANameInput.value = randomTeamName(); };
        document.getElementById("randB").onclick = () => { teamBNameInput.value = randomTeamName(); };
      } else {
        teamNameButtons.innerHTML = "";
      }
    }

    function renderRegistrations(){
      if (isCensored()) {
        registrationsCard.style.display = "block";
        regsEl.innerHTML = '<div class="item muted">Spectator mode: player names are hidden.</div>';
        return;
      }
      const regs = detail.registrations || [];
      regsEl.innerHTML = regs.map((r) => `<div class="item"><strong>${esc(r.display_name || r.username)}</strong> <span class="pill">${esc(r.status)}</span></div>`).join("") || '<div class="item muted">No registrations.</div>';
    }

    function renderEvents(){
      const grouped = teamEventsMap();
      eventsAEl.innerHTML = grouped.a.map((line) => `<div class="item">${line}</div>`).join("") || '<div class="item muted">No events</div>';
      eventsBEl.innerHTML = grouped.b.map((line) => `<div class="item">${line}</div>`).join("") || '<div class="item muted">No events</div>';

      if (isAdmin() && detail.match.status === "live") {
        const buttonSet = (team) => `
          <button class="btn primary" data-live="goal" data-team="${team}">Goal</button>
          <button class="btn ghost" data-live="injury" data-team="${team}">Injury</button>
          <button class="btn ghost" data-live="yellow_card" data-team="${team}">Yellow</button>
          <button class="btn danger" data-live="red_card" data-team="${team}">Red</button>
        `;
        adminBtnsA.innerHTML = buttonSet("a");
        adminBtnsB.innerHTML = buttonSet("b");
      } else {
        adminBtnsA.innerHTML = "";
        adminBtnsB.innerHTML = "";
      }
    }

    function render(){
      const m = detail.match;
      titleEl.textContent = m.title;
      subEl.textContent = `${formatIso(m.scheduled_at)}${m.location ? " · " + m.location : ""}`;
      stateEl.textContent = statusLabel(m.status);
      stateEl.className = `pill ${m.status === "live" ? "state-live" : "state-" + m.status}`;
      viewTagEl.textContent = viewMode;
      scoreEl.textContent = `${m.score_a} - ${m.score_b}`;
      teamAHeader.textContent = m.team_a_name || "Team A";
      teamBHeader.textContent = m.team_b_name || "Team B";
      eventsATitle.textContent = m.team_a_name || "Team A";
      eventsBTitle.textContent = m.team_b_name || "Team B";
      metaEl.textContent = `Registered ${m.registered_count}/${m.max_participants} · Waitlist ${m.waitlisted_count}`;
      if (m.status === "live" && m.started_at) {
        const sec = Math.max(0, Math.floor((Date.now() - new Date(m.started_at).getTime()) / 1000));
        const mm = String(Math.floor(sec / 60)).padStart(2, "0");
        const ss = String(sec % 60).padStart(2, "0");
        clockEl.textContent = `${mm}:${ss}`;
      } else {
        clockEl.textContent = "Full Time";
      }
      leagueLink.href = m.league_id ? `./league.html?id=${m.league_id}` : "./index.html";

      renderActions();
      renderTeams();
      renderRegistrations();
      renderEvents();
    }

    async function load(){
      try {
        if (previewToken) {
          detail = await publicFetch(`/preview/matches/${encodeURIComponent(previewToken)}`);
          viewMode = "censored";
          leagueRole = null;
          editingTeams = false;
          draft = { teamA: [], teamB: [] };
          render();
          return;
        }

        if (!matchId) { show("Missing match id.", "error"); return; }
        if (!getToken()) { show("Please log in from lobby first.", "error"); return; }

        detail = await apiFetch(`/matches/${matchId}`, { method: "GET" });
        const leagueDetail = await apiFetch(`/leagues/${detail.match.league_id}`, { method: "GET" });
        leagueRole = leagueDetail.league.member_role;
        viewMode = (leagueRole === "owner" || leagueRole === "admin") ? "admin" : "normal";

        if (!editingTeams) {
          draft.teamA = [...(detail.match.team_a || [])];
          draft.teamB = [...(detail.match.team_b || [])];
        }
        if (detail.match.status !== "registration_closed") editingTeams = false;

        render();
      } catch (err) {
        show(err.message || "Failed loading match.", "error");
      }
    }

    document.body.addEventListener("click", async (e) => {
      const m = detail?.match;
      const actBtn = e.target.closest("[data-act]");
      if (actBtn && m) {
        const act = actBtn.dataset.act;
        try {
          if (act === "register") await apiFetch(`/matches/${m.id}/register`, { method: "POST" });
          if (act === "cancel-reg") await apiFetch(`/matches/${m.id}/register`, { method: "DELETE" });
          if (act === "open-reg") await apiFetch(`/matches/${m.id}/open-registration`, { method: "POST" });
          if (act === "close-reg") await apiFetch(`/matches/${m.id}/close-registration`, { method: "POST" });
          if (act === "generate") await apiFetch(`/matches/${m.id}/generate-teams`, { method: "POST" });
          if (act === "edit-teams") {
            editingTeams = !editingTeams;
            draft.teamA = [...(m.team_a || [])];
            draft.teamB = [...(m.team_b || [])];
            render();
            return;
          }
          if (act === "save-teams") {
            await apiFetch(`/matches/${m.id}/teams`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                team_a: draft.teamA,
                team_b: draft.teamB,
                team_a_name: teamANameInput.value.trim() || "Team A",
                team_b_name: teamBNameInput.value.trim() || "Team B",
              }),
            });
          }
          if (act === "confirm-teams") await apiFetch(`/matches/${m.id}/confirm-teams`, { method: "POST" });
          if (act === "start") await apiFetch(`/matches/${m.id}/start`, { method: "POST" });
          if (act === "finish") await apiFetch(`/matches/${m.id}/finish`, { method: "POST" });
          if (act === "confirm") await apiFetch(`/matches/${m.id}/confirm`, { method: "POST" });
          if (act === "cancel") await apiFetch(`/matches/${m.id}/cancel`, { method: "POST" });
          await load();
        } catch (err) {
          show(err.message || "Action failed.", "error");
        }
      }

      const moveBtn = e.target.closest("[data-move]");
      if (moveBtn && editingTeams && isAdmin() && detail) {
        const uid = Number(moveBtn.dataset.move);
        const inA = draft.teamA.includes(uid);
        if (inA) {
          draft.teamA = draft.teamA.filter((x) => x !== uid);
          draft.teamB.push(uid);
        } else {
          draft.teamB = draft.teamB.filter((x) => x !== uid);
          draft.teamA.push(uid);
        }
        render();
      }

      const liveBtn = e.target.closest("[data-live]");
      if (liveBtn && detail) {
        pendingEvent.eventType = liveBtn.dataset.live;
        pendingEvent.team = liveBtn.dataset.team;
        openEventModal();
      }
    });

    function openEventModal(){
      if (!detail) return;
      const team = pendingEvent.team;
      const isGoal = pendingEvent.eventType === "goal";
      const teamIds = team === "a" ? (detail.match.team_a || []) : (detail.match.team_b || []);
      const oppIds = team === "a" ? (detail.match.team_b || []) : (detail.match.team_a || []);

      const eventPlayer = document.getElementById("eventPlayer");
      const assistPlayer = document.getElementById("assistPlayer");
      const ownGoalPlayer = document.getElementById("ownGoalPlayer");
      const title = document.getElementById("eventModalTitle");
      const assistToggle = document.getElementById("assistToggle");
      const ownGoalToggle = document.getElementById("ownGoalToggle");

      title.textContent = `Add ${pendingEvent.eventType.replace("_", " ")} for Team ${team.toUpperCase()}`;
      const options = (ids) => ids.map((uid) => `<option value="${uid}">${esc(playerName(uid))}</option>`).join("");
      eventPlayer.innerHTML = options(teamIds);
      assistPlayer.innerHTML = '<option value="">Select assist</option>' + options(teamIds);
      ownGoalPlayer.innerHTML = '<option value="">Select own-goal player</option>' + options(oppIds);

      assistToggle.checked = false;
      ownGoalToggle.checked = false;
      assistPlayer.style.display = "none";
      ownGoalPlayer.style.display = "none";
      assistToggle.parentElement.style.display = isGoal ? "block" : "none";
      ownGoalToggle.parentElement.style.display = isGoal ? "block" : "none";

      document.getElementById("eventModal").style.display = "flex";
    }

    document.getElementById("assistToggle").addEventListener("change", (e) => {
      document.getElementById("assistPlayer").style.display = e.target.checked ? "block" : "none";
    });
    document.getElementById("ownGoalToggle").addEventListener("change", (e) => {
      document.getElementById("ownGoalPlayer").style.display = e.target.checked ? "block" : "none";
    });
    document.getElementById("eventCancelBtn").addEventListener("click", () => {
      document.getElementById("eventModal").style.display = "none";
    });
    document.getElementById("eventSaveBtn").addEventListener("click", async () => {
      if (!detail) return;
      try {
        const eventPlayer = Number(document.getElementById("eventPlayer").value);
        const assist = document.getElementById("assistToggle").checked ? Number(document.getElementById("assistPlayer").value || 0) : null;
        const ownGoal = document.getElementById("ownGoalToggle").checked ? Number(document.getElementById("ownGoalPlayer").value || 0) : null;

        const payload = {
          event_type: ownGoal ? "own_goal" : pendingEvent.eventType,
          team: pendingEvent.team,
          scorer_user_id: pendingEvent.eventType === "goal" ? eventPlayer : null,
          assist_user_id: assist || null,
          own_goal_user_id: ownGoal || null,
          player_user_id: pendingEvent.eventType === "goal" ? null : eventPlayer,
        };

        await apiFetch(`/matches/${detail.match.id}/events`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        document.getElementById("eventModal").style.display = "none";
        await load();
      } catch (err) {
        show(err.message || "Failed to add event.", "error");
      }
    });

    load();
    setInterval(load, 5000);
  </script>
</body>
</html>
