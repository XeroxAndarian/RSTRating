<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1f8a4c">
  <script>if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(function(){});}</script>
  <script src="./palette.js"></script>
  <title>League Manager</title>
  <style>
    :root { --bg:#e9f7ef; --panel:#fff; --panel-soft:#f3faf6; --text:#0e2c1d; --muted:#4d6f60; --accent:#1f8a4c; --success:#15803d; --danger:#b42318; --line:rgba(14,44,29,.16); --pill:#ebf7ef; --bg-a:#f3fbf6; --bg-b:#def0e6; }
    [data-theme="dark"] { --bg:#0e1714; --panel:#16241f; --panel-soft:#1b2d27; --text:#e7f5ee; --muted:#9dc4b2; --accent:#2fa765; --success:#26a957; --danger:#ef6f66; --line:rgba(231,245,238,.2); --pill:#20362f; --bg-a:#101b17; --bg-b:#0b1411; }
    * { box-sizing:border-box; }
    body {
      margin:0;
      font-family:"Roboto", "Segoe UI", sans-serif;
      color:var(--text);
      text-align:center;
      background:
        radial-gradient(circle at 0% 0%, rgba(31, 138, 76, 0.18), transparent 24%),
        radial-gradient(circle at 100% 20%, rgba(34, 197, 94, 0.14), transparent 22%),
        linear-gradient(135deg, var(--panel) 0%, var(--bg) 45%, var(--bg) 100%);
    }
    .wrap { max-width:1040px; margin:24px auto; padding:0 16px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:center; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:12px; }
    h1,h2,h3 { margin:0; }
    .muted { color:var(--muted); }
    .btn { border:none; border-radius:9px; padding:8px 14px; font:inherit; font-weight:700; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }
    .btn.primary{ background:var(--accent); color:#fff; }
    .btn.confirm{ background:var(--success); color:#fff; }
    .btn.danger{ background:var(--danger); color:#fff; }
    .btn.ghost{ background:var(--panel-soft); border:1px solid var(--line); color:var(--text); }
    .pill { display:inline-flex; padding:4px 10px; border-radius:999px; background:var(--pill); border:1px solid var(--line); font-size:.82rem; }
    .score-grid { display:grid; grid-template-columns:1fr auto 1fr; gap:10px; align-items:center; margin-top:10px; }
    .team-title { font-size:1.25rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .team-title.right { text-align:right; }
    .team-title.left { text-align:left; }
    .team-subline { font-size:.78rem; color:var(--muted); margin-top:2px; white-space:normal; }
    .score-main { font-size:2.2rem; font-weight:800; min-width:130px; }
    .clock { margin-top:6px; font-weight:700; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width:860px){ .grid { grid-template-columns:1fr; } .team-title.right,.team-title.left { text-align:center; } .score-grid { grid-template-columns:1fr; } }
    .list { display:flex; flex-direction:column; gap:8px; }
    .item { border:1px solid var(--line); border-radius:10px; padding:10px; }
    .events-grid { display:grid; grid-template-columns:1fr; gap:10px; }
    .events-col { border:1px solid var(--line); border-radius:12px; padding:12px; background:var(--panel-soft); }
    .player-line { display:flex; align-items:center; justify-content:space-between; gap:8px; border:1px solid var(--line); border-radius:10px; padding:8px 10px; }
    .player-actions { display:flex; gap:6px; flex-wrap:wrap; }
    .icon-btn { min-width:36px; padding:6px 8px; font-size:1rem; }
    .goal-side { display:flex; align-items:center; gap:8px; }
    .log-list { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
    .log-row { display:grid; grid-template-columns:1fr 56px 1fr; gap:8px; align-items:center; border:1px solid var(--line); border-radius:10px; padding:8px 10px; background:var(--panel); position:relative; }
    .log-undo { position:absolute; right:6px; top:50%; transform:translateY(-50%); }
    .log-left { text-align:left; }
    .log-right { text-align:right; }
    .log-time { font-weight:700; color:var(--muted); }
    .status { min-height:20px; color:var(--muted); margin-top:8px; }
    .status.error { color:var(--danger); }
    .small { font-size:.86rem; }
    .state-live { background:rgba(180,35,24,.14); border-color:rgba(180,35,24,.4); color:#b42318; }
    .state-registration_open { background:rgba(31,138,76,.16); border-color:rgba(31,138,76,.4); }
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; z-index:100; padding:20px; }
    .modal-card { width:100%; max-width:420px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; text-align:left; }
    .stack { display:flex; flex-direction:column; gap:8px; }
    input, select { padding:8px 10px; border:1px solid var(--line); border-radius:8px; font:inherit; width:100%; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row" style="justify-content:flex-end; margin-bottom:8px;">
      <div class="row" style="justify-content:flex-end;">
        <button class="btn ghost" id="darkModeToggle" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
        <button class="btn ghost" id="topNotifLink" title="Notifications" type="button">🔔</button>
        <a class="btn ghost" href="./account.html" id="topAccountLink" title="Account">👤</a>
        <a class="btn ghost" href="./lobby.html">Lobby</a>
        <a class="btn ghost" id="leagueLink" href="./index.html">League</a>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div style="text-align:left;">
          <h1 id="title">Match</h1>
          <div id="sub" class="muted" style="margin-top:4px;">Loading...</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0;">
          <span class="pill" id="state">-</span>
          <span class="pill" id="viewTag">public</span>
        </div>
      </div>
      <div class="score-grid">
        <div class="team-title left">
          <div id="teamAHeader">Team A</div>
          <div class="team-subline" id="teamAAvg"></div>
          <div class="team-subline" id="teamAScorers"></div>
        </div>
        <div class="score-main" id="score">0 - 0</div>
        <div class="team-title right">
          <div id="teamBHeader">Team B</div>
          <div class="team-subline" id="teamBAvg"></div>
          <div class="team-subline" id="teamBScorers"></div>
        </div>
      </div>
      <div class="clock" id="clockText">Full Time</div>
      <div class="muted" id="meta" style="margin-top:6px;"></div>
      <div class="row" id="actions" style="margin-top:10px;"></div>
    </div>

    <div class="card" id="teamsCard">
      <div id="registrationsSection">
        <h3 style="margin-bottom:8px;">Registrations</h3>
        <div id="regs" class="list"></div>
      </div>
      <div id="teamsSection" style="display:none;">
        <h3 style="margin-bottom:8px;">Teams</h3>
        <div class="grid" id="teamNamesWrap" style="display:none;">
          <div>
            <div class="small muted">Team A Name</div>
            <div class="row" style="justify-content:flex-start;gap:6px;flex-wrap:nowrap;">
              <input id="teamAName" maxlength="60" placeholder="Team A">
              <button class="btn ghost" id="randAInline" type="button" title="Random name">🎲</button>
            </div>
          </div>
          <div>
            <div class="small muted">Team B Name</div>
            <div class="row" style="justify-content:flex-start;gap:6px;flex-wrap:nowrap;">
              <input id="teamBName" maxlength="60" placeholder="Team B">
              <button class="btn ghost" id="randBInline" type="button" title="Random name">🎲</button>
            </div>
          </div>
        </div>
        <div class="grid" style="margin-top:10px;">
          <div class="item" id="teamAPlayers"></div>
          <div class="item" id="teamBPlayers"></div>
        </div>
      </div>
    </div>

    <div class="card" id="receiptCard" style="display:none;">
      <h3 style="cursor:pointer;user-select:none;" id="receiptToggle">
        Match Receipt <span id="receiptChevron" style="font-size:.85em;">▼</span>
      </h3>
      <div id="receiptBody" style="margin-top:10px;overflow-x:auto;"></div>
    </div>

    <div class="card" id="eventsCard">
      <h3 style="margin-bottom:8px;">Match Events</h3>
      <div class="events-grid">
        <div class="events-col">
          <div class="row" style="justify-content:space-between;">
            <div class="goal-side"><span id="eventsATitle">Team A</span><button class="btn ghost icon-btn" id="cornerBtnA" type="button" data-live="corner" data-team="a" title="Corner">🏳️</button><button class="btn primary icon-btn" id="goalBtnA" type="button" data-live="goal" data-team="a" title="Goal">⚽</button></div>
            <div class="goal-side"><button class="btn primary icon-btn" id="goalBtnB" type="button" data-live="goal" data-team="b" title="Goal">⚽</button><button class="btn ghost icon-btn" id="cornerBtnB" type="button" data-live="corner" data-team="b" title="Corner">🏳️</button><span id="eventsBTitle">Team B</span></div>
          </div>
          <div id="eventLog" class="log-list"></div>
        </div>
      </div>
    </div>

    <div id="status" class="status"></div>
  </div>

  <div class="modal-backdrop" id="eventModal">
    <div class="modal-card">
      <h3 id="eventModalTitle">Add event</h3>
      <div class="stack" style="margin-top:10px;">
        <!-- Step 1: goal type selection (only shown for goal events) -->
        <div id="goalTypeStep" style="display:none;">
          <label style="font-weight:700;">Goal type</label>
          <div style="display:flex;gap:12px;margin-top:6px;">
            <label style="display:flex;align-items:center;gap:6px;"><input type="radio" name="goalType" id="goalTypeNormal" value="normal" checked> Normal goal</label>
            <label style="display:flex;align-items:center;gap:6px;"><input type="radio" name="goalType" id="goalTypeOwn" value="own"> Own goal</label>
          </div>
        </div>
        <!-- Step 2a: normal goal -->
        <div id="normalGoalStep">
          <label for="eventPlayer" id="eventPlayerLabel">Player</label>
          <select id="eventPlayer"></select>
          <div id="assistRow" style="display:none;">
            <label><input type="checkbox" id="assistToggle"> Assist</label>
            <select id="assistPlayer" style="display:none;"></select>
          </div>
        </div>
        <!-- Step 2b: own goal player (opposite team) -->
        <div id="ownGoalStep" style="display:none;">
          <label for="ownGoalPlayer">Own-goal scorer (opponent)</label>
          <select id="ownGoalPlayer"></select>
        </div>
        <label for="eventSeconds" id="eventSecondsLabel" style="display:none;">Timestamp (minutes)</label>
        <input id="eventSeconds" type="number" min="0" step="1" style="display:none;" placeholder="e.g. 45">
        <div class="row" style="justify-content:flex-end;margin-top:8px;">
          <button class="btn ghost" id="eventCancelBtn" type="button">Cancel</button>
          <button class="btn primary" id="eventSaveBtn" type="button">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      if (localStorage.getItem("rs_theme") !== "light") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();

    document.addEventListener("DOMContentLoaded", function () {
      const btn = document.getElementById("darkModeToggle");
      if (!btn) return;
      const sync = () => { btn.textContent = document.documentElement.getAttribute("data-theme") === "dark" ? "☀️" : "🌙"; };
      sync();
      btn.addEventListener("click", () => {
        const dark = document.documentElement.getAttribute("data-theme") === "dark";
        if (dark) {
          document.documentElement.removeAttribute("data-theme");
          localStorage.setItem("rs_theme", "light");
        } else {
          document.documentElement.setAttribute("data-theme", "dark");
          localStorage.setItem("rs_theme", "dark");
        }
        if (window.RSPalette && typeof window.RSPalette.reapply === "function") {
          window.RSPalette.reapply();
        }
        sync();
      });
    });

    const params = new URLSearchParams(window.location.search);
    const matchId = Number(params.get("id") || 0);
    const previewToken = params.get("token") || "";
    const TOKEN_KEY = "rs_access_token";
    const API_BASE_KEY = "rs_api_base_override";
    const DEFAULT_API_BASE = (
      window.location.hostname === "localhost" ||
      window.location.hostname === "127.0.0.1"
    )
      ? "http://127.0.0.1:8000"
      : "https://rstrating-accounts-api.onrender.com";
    const REMOTE_API_BASE = "https://rstrating-accounts-api.onrender.com";
    const LOCAL_API_BASE = "http://127.0.0.1:8000";

    const titleEl = document.getElementById("title");
    const subEl = document.getElementById("sub");
    const scoreEl = document.getElementById("score");
    const stateEl = document.getElementById("state");
    const viewTagEl = document.getElementById("viewTag");
    const metaEl = document.getElementById("meta");
    const clockEl = document.getElementById("clockText");
    const actionsEl = document.getElementById("actions");
    const regsEl = document.getElementById("regs");
    const teamAHeader = document.getElementById("teamAHeader");
    const teamBHeader = document.getElementById("teamBHeader");
    const teamAAvg = document.getElementById("teamAAvg");
    const teamBAvg = document.getElementById("teamBAvg");
    const teamAScorers = document.getElementById("teamAScorers");
    const teamBScorers = document.getElementById("teamBScorers");
    const teamANameInput = document.getElementById("teamAName");
    const teamBNameInput = document.getElementById("teamBName");
    const randAInline = document.getElementById("randAInline");
    const randBInline = document.getElementById("randBInline");
    const teamAPlayers = document.getElementById("teamAPlayers");
    const teamBPlayers = document.getElementById("teamBPlayers");
    const eventsATitle = document.getElementById("eventsATitle");
    const eventsBTitle = document.getElementById("eventsBTitle");
    const eventLogEl = document.getElementById("eventLog");
    const teamsCard = document.getElementById("teamsCard");
    const teamsSection = document.getElementById("teamsSection");
    const registrationsSection = document.getElementById("registrationsSection");
    const eventsCard = document.getElementById("eventsCard");
    const leagueLink = document.getElementById("leagueLink");
    const statusEl = document.getElementById("status");
    const goalBtnA = document.getElementById("goalBtnA");
    const goalBtnB = document.getElementById("goalBtnB");
    const cornerBtnA = document.getElementById("cornerBtnA");
    const cornerBtnB = document.getElementById("cornerBtnB");

    const ADJECTIVES = ["Swift", "Iron", "Bold", "Rapid", "Mighty", "Prime", "Fierce", "Royal", "Urban", "Classic"];
    const NOUNS = ["Falcons", "Titans", "Wolves", "Strikers", "United", "Rangers", "Storm", "Warriors", "Athletic", "Legends"];

    let detail = null;
    let playerResults = null; // fetched for completed matches
    let leagueRole = null;
    let viewMode = "normal"; // admin | normal | censored
    let editingTeams = false;
    let editingEvents = false;
    let draft = { teamA: [], teamB: [] };
    let draftNames = { teamA: "Team A", teamB: "Team B" };
    let pendingEvent = { eventType: "goal", team: "a" };

    function esc(v){ return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
    function show(msg, kind){ statusEl.textContent = msg; statusEl.className = kind ? `status ${kind}` : "status"; }
    function getToken(){ return localStorage.getItem(TOKEN_KEY) || ""; }
    function getApiBase(){ return (localStorage.getItem(API_BASE_KEY) || DEFAULT_API_BASE).trim(); }
    function getApiCandidates(){
      const override = (localStorage.getItem(API_BASE_KEY) || "").trim();
      const primary = override || DEFAULT_API_BASE;
      if (override) return [primary];
      const secondary = primary === LOCAL_API_BASE ? REMOTE_API_BASE : LOCAL_API_BASE;
      return [primary, secondary];
    }
    function isAdmin(){ return viewMode === "admin"; }
    function isCensored(){ return viewMode === "censored"; }

    async function apiFetch(path, options){
      const headers = Object.assign({}, options?.headers || {});
      const token = getToken();
      if (token) headers.Authorization = "Bearer " + token;
      const candidates = getApiCandidates();
      let lastErr = null;
      for (let i = 0; i < candidates.length; i++) {
        try {
          const res = await fetch(candidates[i] + path, Object.assign({}, options || {}, { headers }));
          let body = null; try { body = await res.json(); } catch {}
          if (!res.ok) throw new Error(body?.detail || "Request failed");
          return body;
        } catch (err) {
          lastErr = err;
          if (i < candidates.length - 1) continue;
        }
      }
      throw lastErr || new Error("Request failed");
    }

    async function publicFetch(path){
      const candidates = getApiCandidates();
      let lastErr = null;
      for (let i = 0; i < candidates.length; i++) {
        try {
          const res = await fetch(candidates[i] + path);
          let body = null; try { body = await res.json(); } catch {}
          if (!res.ok) throw new Error(body?.detail || "Request failed");
          return body;
        } catch (err) {
          lastErr = err;
          if (i < candidates.length - 1) continue;
        }
      }
      throw lastErr || new Error("Request failed");
    }

    function statusLabel(s){
      const map = {
        upcoming: "Upcoming",
        registration_open: "Registration Open",
        registration_closed: "Registration Closed",
        live: "LIVE",
        finished: "Finished",
        completed: "Completed",
        cancelled: "Cancelled"
      };
      return map[s] || s;
    }

    function randomTeamName(){
      return `${ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)]} ${NOUNS[Math.floor(Math.random() * NOUNS.length)]}`;
    }

    function formatIso(iso){
      const d = new Date(iso);
      return Number.isNaN(d.getTime()) ? iso : d.toLocaleString();
    }

    function minutesLabel(seconds){
      return `${Math.floor(Number(seconds || 0) / 60)}'`;
    }

    function participantsMap(){
      const m = new Map();
      (detail?.registrations || []).forEach((r) => m.set(Number(r.user_id), r));
      return m;
    }

    function playerName(uid){
      const p = participantsMap().get(Number(uid));
      if (!p) return `#${uid}`;
      return p.display_name || p.username;
    }

    function playerNameForView(uid){
      if (isCensored()) return "Player";
      return playerName(uid);
    }

    function hasGeneratedTeams(m){
      return ((m.team_a || []).length + (m.team_b || []).length) > 0;
    }

    function isMatchPaused(){
      const markers = (detail?.events || []).filter((e) => !e.undone && (e.event_type === "pause" || e.event_type === "resume"))
        .sort((a, b) => (a.event_seconds - b.event_seconds) || (a.created_at > b.created_at ? 1 : -1));
      return !!markers.length && markers[markers.length - 1].event_type === "pause";
    }

    function activeLiveSeconds(startedAt){
      const started = new Date(startedAt).getTime();
      let elapsed = Math.max(0, Math.floor((Date.now() - started) / 1000));
      const markers = (detail?.events || []).filter((e) => !e.undone && (e.event_type === "pause" || e.event_type === "resume"))
        .sort((a, b) => (a.event_seconds - b.event_seconds) || (a.created_at > b.created_at ? 1 : -1));
      let pausedFrom = null;
      let pausedTotal = 0;
      markers.forEach((m) => {
        if (m.event_type === "pause") pausedFrom = m.event_seconds;
        if (m.event_type === "resume" && pausedFrom != null) {
          pausedTotal += Math.max(0, m.event_seconds - pausedFrom);
          pausedFrom = null;
        }
      });
      if (pausedFrom != null) {
        pausedTotal += Math.max(0, elapsed - pausedFrom);
      }
      return Math.max(0, elapsed - pausedTotal);
    }

    function teamEventsMap(){
      const events = (detail?.events || []).filter((e) => !e.undone && !["pause", "resume", "assist"].includes(e.event_type));
      const assistsByKey = new Map();
      (detail?.events || []).filter((e) => !e.undone && e.event_type === "assist").forEach((e) => {
        const key = `${e.team}|${e.event_seconds}`;
        const arr = assistsByKey.get(key) || [];
        arr.push(e);
        assistsByKey.set(key, arr);
      });

      const m = detail?.match;
      const teamAName = m?.team_a_name || "Team A";
      const teamBName = m?.team_b_name || "Team B";

      const rows = [];
      const pick = (arr, seed) => arr[Math.abs(seed) % arr.length];
      events.forEach((e) => {
        if (e.event_type === "assist") return;
        const team = e.team === "b" ? "b" : "a";
        const teamName = team === "a" ? teamAName : teamBName;
        const key = `${team}|${e.event_seconds}`;
        const min = minutesLabel(e.event_seconds);
        let text = "";
        if (isCensored()) {
          if (e.event_type === "goal") text = pick([`⚽ ${esc(teamName)} finish a flowing attack`, `⚽ ${esc(teamName)} convert from close range`, `⚽ ${esc(teamName)} break the deadlock`], e.id);
          else if (e.event_type === "own_goal") text = pick([`🥅 Defensive mix-up gifts ${esc(teamName)} a goal`, `🥅 ${esc(teamName)} benefit from an own goal`], e.id);
          else if (e.event_type === "injury") text = `🚑 Medical staff called for treatment`;
          else if (e.event_type === "yellow_card") text = `🟨 Referee shows a yellow card`;
          else if (e.event_type === "red_card") text = `🟥 Straight red shown after the challenge`;
          else if (e.event_type === "offside") text = `🚩 Attack stopped for offside`;
          else if (e.event_type === "corner") text = `🏳️ ${esc(teamName)} win a corner`;
          else if (e.event_type === "foul") text = `🤚 Foul awarded to the opposition`;
          else text = `${esc(e.event_type)}`;
        } else {
          if (e.event_type === "goal") {
            const assists = assistsByKey.get(key) || [];
            const assist = assists.shift();
            if (assist) {
              text = pick([
                `⚽ ${esc(playerName(e.user_id))} scores after a pass from ${esc(playerName(assist.user_id))}`,
                `⚽ Brilliant link-up: ${esc(playerName(assist.user_id))} sets up ${esc(playerName(e.user_id))}`,
                `⚽ ${esc(playerName(e.user_id))} finishes from ${esc(playerName(assist.user_id))}'s delivery`
              ], e.id);
            } else {
              text = pick([
                `⚽ ${esc(playerName(e.user_id))} finds the net`,
                `⚽ ${esc(playerName(e.user_id))} strikes and scores`,
                `⚽ ${esc(playerName(e.user_id))} makes it count`
              ], e.id);
            }
          } else if (e.event_type === "own_goal") {
            text = pick([
              `🥅 ${esc(playerName(e.user_id))} turns it into their own net`,
              `🥅 Unlucky touch from ${esc(playerName(e.user_id))} results in an own goal`
            ], e.id);
          } else if (e.event_type === "injury") {
            text = `🚑 ${esc(playerName(e.user_id))} goes down and needs treatment`;
          } else if (e.event_type === "yellow_card") {
            text = `🟨 ${esc(playerName(e.user_id))} is booked by the referee`;
          } else if (e.event_type === "red_card") {
            text = `🟥 ${esc(playerName(e.user_id))} is sent off`;
          } else if (e.event_type === "offside") {
            text = `🚩 ${esc(playerName(e.user_id))} is caught offside`;
          } else if (e.event_type === "corner") {
            text = `🏳️ ${esc(teamName)} earn a corner kick`;
          } else if (e.event_type === "foul") {
            text = `🤚 ${esc(playerName(e.user_id))} commits a foul`;
          } else {
            text = `${esc(e.event_type)}`;
          }
        }
        rows.push({ id: e.id, team: e.team, text, time: min, type: e.event_type, created_at: e.created_at });
      });
      return rows;
    }

    function teamAverage(ids){
      const pMap = participantsMap();
      const values = ids.map((uid) => {
        const p = pMap.get(Number(uid));
        return p ? Number(p.seasonal_rating || 0) : 0;
      }).filter((v) => Number.isFinite(v));
      if (!values.length) return "Avg: -";
      const avg = values.reduce((a, b) => a + b, 0) / values.length;
      return `Avg: ${avg.toFixed(1)}`;
    }

    function scorerSummaryByTeam(){
      const rows = (detail?.events || []).filter((e) => !e.undone && (e.event_type === "goal" || e.event_type === "own_goal"));
      const aMap = new Map();
      const bMap = new Map();
      rows.forEach((e) => {
        const benefitingTeam = e.team === "b" ? "b" : "a";
        const baseName = playerName(e.user_id);
        const name = `${baseName}${e.event_type === "own_goal" ? "*" : ""}`;
        const target = benefitingTeam === "a" ? aMap : bMap;
        const mins = target.get(name) || [];
        mins.push(minutesLabel(e.event_seconds));
        target.set(name, mins);
      });
      const fmt = (m) => Array.from(m.entries()).map(([name, mins]) => `<div>${esc(name)} - ${mins.join(", ")}</div>`).join("");
      return { a: fmt(aMap), b: fmt(bMap) };
    }

    function renderActions(){
      const m = detail.match;
      const my = m.my_registration_status;
      const hasTeams = hasGeneratedTeams(m);
      const paused = isMatchPaused();
      const btns = [];

      if (!isCensored() && m.status === "registration_open") {
        const isFull = m.registered_count >= m.max_participants;
        const hasQueue = m.waitlisted_count > 0;
        if (my === "offered") {
          btns.push('<button class="btn primary" data-act="accept-offer">Accept offer</button>');
        } else if (!my || my === "cancelled") {
          if (!isFull && !hasQueue) {
            btns.push('<button class="btn primary" data-act="register">Register</button>');
          } else {
            btns.push('<button class="btn ghost" data-act="register">Join waitlist</button>');
          }
        }
        if (my && my !== "cancelled") btns.push('<button class="btn danger" data-act="cancel-reg">Cancel registration</button>');
      }

      if (isAdmin()) {
        btns.push(`<button class="btn ghost" data-act="toggle-vis">${m.visibility === "private" ? "🌐 Public" : "🔒 Private"}</button>`);
        if (m.status === "upcoming") {
          btns.push('<button class="btn primary" data-act="open-reg">Open registration</button>');
        }
        if (m.status === "registration_closed" && !m.teams_confirmed) {
          btns.push('<button class="btn primary" data-act="open-reg">Reopen registration</button>');
        }
        if (m.status === "registration_open") btns.push('<button class="btn danger" data-act="close-reg">Close registration</button>');
        if (m.status === "registration_closed") {
          if (!m.teams_confirmed) btns.push('<button class="btn primary" data-act="generate">Generate teams</button>');
          if (!m.teams_confirmed && hasTeams) btns.push(`<button class="btn ghost" data-act="edit-teams">${editingTeams ? "Stop editing" : "Edit teams"}</button>`);
          if (!m.teams_confirmed && editingTeams && hasTeams) btns.push('<button class="btn primary" data-act="save-teams">Save draft</button>');
          if (!m.teams_confirmed && hasTeams) btns.push('<button class="btn confirm" data-act="confirm-teams">Confirm teams</button>');
          if (m.teams_confirmed) {
            btns.push('<button class="btn confirm" data-act="start">Start match</button>');
            btns.push('<button class="btn danger" data-act="cancel">Cancel match</button>');
          }
        }
        if (m.status === "live") {
          btns.push(`<button class="btn ghost" data-act="${paused ? "resume" : "pause"}">${paused ? "▶" : "⏸"}</button>`);
          btns.push('<button class="btn confirm" data-act="finish">Finish match</button>');
        }
        if (m.status === "finished") {
          btns.push(`<button class="btn ghost" data-act="edit-events">${editingEvents ? "Stop edit" : "Edit match"}</button>`);
          btns.push('<button class="btn confirm" data-act="confirm">Confirm result</button>');
        }
        if (!["completed", "cancelled"].includes(m.status) && !(m.status === "registration_closed" && m.teams_confirmed)) {
          btns.push('<button class="btn danger" data-act="cancel">Cancel match</button>');
        }
      }

      actionsEl.innerHTML = btns.join("");
    }

    function computePlayerStats(){
      const stats = new Map();
      const init = (uid) => { if (!stats.has(uid)) stats.set(uid, { goals: 0, assists: 0, own_goals: 0, yellow: 0, red: 0 }); };
      (detail?.events || []).filter((e) => !e.undone && e.user_id != null).forEach((e) => {
        const uid = Number(e.user_id);
        init(uid);
        const s = stats.get(uid);
        if (e.event_type === "goal") s.goals++;
        else if (e.event_type === "assist") s.assists++;
        else if (e.event_type === "own_goal") s.own_goals++;
        else if (e.event_type === "yellow_card") s.yellow++;
        else if (e.event_type === "red_card") s.red++;
      });
      return stats;
    }

    function renderTeams(){
      const m = detail.match;
      const pMap = participantsMap();
      const teamA = draft.teamA.length ? draft.teamA : (m.team_a || []);
      const teamB = draft.teamB.length ? draft.teamB : (m.team_b || []);
      const liveControls = isAdmin() && ((m.status === "live" && !isMatchPaused()) || (m.status === "finished" && editingEvents));
      const playerStats = computePlayerStats();

      const mkPlayers = (ids, team) => ids.map((uid) => {
        const p = pMap.get(Number(uid));
        const name = isCensored() ? "Player" : (p ? (p.display_name || p.username) : `#${uid}`);

          ? `<a href="./player.html?id=${uid}" style="color:inherit;text-decoration:none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">${esc(name)}</a>`
          : esc(name);
        const rate = (!isCensored() && p) ? ` <span class="muted small">(${Number(p.seasonal_rating || 0).toFixed(1)})</span>` : "";
              const prData = playerResults?.players?.find(r => r.user_id === Number(uid));
                const isMvp = !isCensored() && prData?.is_team_mvp;

                  }
                  return ` <span class="muted small">(${Number(p.seasonal_rating || 0).toFixed(1)})</span>`;
                })();
        const move = editingTeams && isAdmin() ? `<button class="btn ghost small" data-move="${uid}" data-move-team="${team}">${team === "a" ? "→" : "←"}</button>` : "";
        const statsHtml = (() => {
          if (isCensored()) return "";
          const s = playerStats.get(Number(uid));
          if (!s) return "";
          const parts = [];
          if (s.goals) parts.push(`⚽${s.goals}`);
          if (s.assists) parts.push(`🅰️${s.assists}`);
          if (s.own_goals) parts.push(`🥅${s.own_goals}`);

        const cardsControls = (liveControls && m.cards_enabled) ? `<button class="btn ghost icon-btn" data-live="yellow_card" data-team="${team}" data-player="${uid}" title="Yellow card">🟨</button><button class="btn danger icon-btn" data-live="red_card" data-team="${team}" data-player="${uid}" title="Red card">🟥</button>` : "";
        const injuryControl = liveControls ? `<button class="btn ghost icon-btn" data-live="injury" data-team="${team}" data-player="${uid}" title="Injury">🚑</button>` : "";
        const offsideControl = (liveControls && m.offsides_enabled) ? `<button class="btn ghost icon-btn" data-live="offside" data-team="${team}" data-player="${uid}" title="Offside">🚩</button>` : "";
        const foulControl = (liveControls && m.fouls_enabled) ? `<button class="btn ghost icon-btn" data-live="foul" data-team="${team}" data-player="${uid}" title="Foul">🤚</button>` : "";
        const controls = liveControls ? `<span class="player-actions">${injuryControl}${cardsControls}${offsideControl}${foulControl}</span>` : "";
        return `<div class="player-line"><span>${mvpBadge}${nameHtml}${rateDisplay}</span><span class="player-actions" style="align-items:center;">${statsHtml}${move}${controls}</span></div>`;
      }).join("") || '<div class="muted small">No players.</div>';

      if (isCensored() && m.visibility === "private" && m.teams_confirmed) {
        teamAPlayers.innerHTML = `<h4>${esc(m.team_a_name || "Team A")}</h4><div class="list"><div class="muted small">Teams are hidden as match is set to private.</div></div>`;
        teamBPlayers.innerHTML = `<h4>${esc(m.team_b_name || "Team B")}</h4><div class="list"><div class="muted small">Teams are hidden as match is set to private.</div></div>`;

      teamAPlayers.innerHTML = `<h4>${esc(m.team_a_name || "Team A")}</h4><div class="list">${mkPlayers(teamA, "a")}</div>`;
      teamBPlayers.innerHTML = `<h4>${esc(m.team_b_name || "Team B")}</h4><div class="list">${mkPlayers(teamB, "b")}</div>`;

      const canEditNames = isAdmin() && editingTeams && !m.teams_confirmed;
      const nameInputsWrap = document.getElementById("teamNamesWrap");
      if (nameInputsWrap) nameInputsWrap.style.display = canEditNames ? "grid" : "none";
      teamANameInput.value = editingTeams ? draftNames.teamA : (m.team_a_name || "Team A");
      teamBNameInput.value = editingTeams ? draftNames.teamB : (m.team_b_name || "Team B");
      teamANameInput.disabled = !canEditNames;
      teamBNameInput.disabled = !canEditNames;
      randAInline.style.display = canEditNames ? "inline-flex" : "none";
      randBInline.style.display = canEditNames ? "inline-flex" : "none";
    }

    function renderRegistrations(){
      if (isCensored()) {
        const regs = detail.registrations || [];
        regsEl.innerHTML = regs.map((r) => `<div class="item"><strong>Player</strong> <span class="pill">${esc(r.status)}</span></div>`).join("") || '<div class="item muted">No registrations.</div>';

    function renderEvents(){
      const rows = teamEventsMap();
      const canEdit = isAdmin() && (detail.match.status === "live" || (detail.match.status === "finished" && editingEvents));
      const isPaused = detail.match.status === "live" && isMatchPaused();
      eventLogEl.innerHTML = rows.map((row) => {
        const left = row.team === "a" ? row.text : "";
        const right = row.team === "b" ? row.text : "";
        const withinUndoWindow = detail.match.status !== "live" || ((Date.now() - new Date(row.created_at).getTime()) <= 30000);
        const undoBtn = (canEdit && withinUndoWindow) ? `<button class="btn ghost small log-undo" data-undo="${row.id}" style="white-space:nowrap;">↩</button>` : "";
        return `<div class="log-row" style="${undoBtn ? "padding-right:58px;" : ""}"><div class="log-left">${left}</div><div class="log-time">${row.time}</div><div class="log-right">${right}</div>${undoBtn}</div>`;

      goalBtnB.style.display = showGoalButtons ? "inline-flex" : "none";
      cornerBtnA.style.display = (showGoalButtons && detail.match.corners_enabled) ? "inline-flex" : "none";
      cornerBtnB.style.display = (showGoalButtons && detail.match.corners_enabled) ? "inline-flex" : "none";

    function renderReceipt(){
      const bodyEl = document.getElementById("receiptBody");
      if (!bodyEl || !playerResults) return;
      const m = detail.match;
      const teamAName = m.team_a_name || "Team A";
      const teamBName = m.team_b_name || "Team B";
      const overallMvpId = playerResults.mvp_user_id;
            const mkTeamTable = (teamLabel, teamKey) => {

                const deltaColor = r.lmmr_delta > 0 ? "var(--success,#2a9d4e)" : r.lmmr_delta < 0 ? "var(--danger,#c0392b)" : "inherit";

    function render(){
      const m = detail.match;
      titleEl.textContent = m.title;
      subEl.textContent = `${formatIso(m.scheduled_at)}${m.location ? " · " + m.location : ""}`;
      stateEl.textContent = statusLabel(m.status);
      stateEl.className = `pill ${m.status === "live" ? "state-live" : "state-" + m.status}`;
      viewTagEl.textContent = (m.visibility === "private" ? "🔒 private" : "🌐 public");
      scoreEl.textContent = `${m.score_a} - ${m.score_b}`;
      teamAHeader.textContent = m.team_a_name || "Team A";
      teamBHeader.textContent = m.team_b_name || "Team B";
      const teamAIds = draft.teamA.length ? draft.teamA : (m.team_a || []);
      const teamBIds = draft.teamB.length ? draft.teamB : (m.team_b || []);
      teamAAvg.textContent = teamAverage(teamAIds);
      teamBAvg.textContent = teamAverage(teamBIds);
      const scorers = scorerSummaryByTeam();
      if (isCensored()) {
        teamAScorers.innerHTML = "";
        teamBScorers.innerHTML = "";
      } else {
        teamAScorers.innerHTML = scorers.a;
        teamBScorers.innerHTML = scorers.b;
      }
      eventsATitle.textContent = m.team_a_name || "Team A";
      eventsBTitle.textContent = m.team_b_name || "Team B";
      // Meta line: registered counts / LIVE / Paused / duration
      if (["live", "finished", "completed", "cancelled"].includes(m.status)) {
        if (m.status === "live") {
          const paused = isMatchPaused();
          if (paused) {
            const pauseMarker = [...(detail.events || [])].filter(e => !e.undone && e.event_type === "pause").slice(-1)[0];
            const pausedAt = pauseMarker ? Number(pauseMarker.event_seconds) : 0;
            const pausedSecs = Math.max(0, Math.floor((Date.now() - new Date(m.started_at).getTime()) / 1000) - pausedAt);
            const pm = String(Math.floor(pausedSecs / 60)).padStart(2, "0");
            const ps = String(pausedSecs % 60).padStart(2, "0");
            metaEl.textContent = `⏸ Paused – ${pm}:${ps}`;
          } else {
            metaEl.textContent = "🔴 LIVE";
          }
        } else if ((m.status === "finished" || m.status === "completed") && m.started_at && m.ended_at) {
          const dur = Math.round((new Date(m.ended_at).getTime() - new Date(m.started_at).getTime()) / 1000);
          const hh = Math.floor(dur / 3600);
          const mm = Math.floor((dur % 3600) / 60);
          const ss = dur % 60;
          const durStr = hh ? `${hh}h ${mm}m` : `${mm}m ${ss}s`;
          metaEl.textContent = `Duration: ${durStr}`;
        } else {
          metaEl.textContent = "";
        }
      } else {
        metaEl.textContent = `Registered ${m.registered_count}/${m.max_participants} · Waitlist ${m.waitlisted_count}`;
      }
      if (m.status === "live" && m.started_at) {
        const sec = activeLiveSeconds(m.started_at);
        const mm = String(Math.floor(sec / 60)).padStart(2, "0");
        const ss = String(sec % 60).padStart(2, "0");
        const paused = isMatchPaused();
        clockEl.textContent = `${paused ? "⏸ " : ""}${mm}:${ss}`;
      } else if (m.status === "upcoming") {
        clockEl.textContent = m.registration_opens_at
          ? `Registration opens ${formatIso(m.registration_opens_at)}`
          : (m.scheduled_at ? `Starts ${formatIso(m.scheduled_at)}` : "—");
      } else if (m.status === "registration_open") {
        if (m.scheduled_at) {
          const closeAt = new Date(new Date(m.scheduled_at).getTime() - (15 * 60 * 1000));
          clockEl.textContent = `Registration ends ${formatIso(closeAt.toISOString())}`;
        } else {
          clockEl.textContent = "Registration open";
        }
      } else if (m.status === "registration_closed" && m.scheduled_at) {
        clockEl.textContent = `Starts ${formatIso(m.scheduled_at)}`;
      } else {
        clockEl.textContent = "Full Time";
      }
      leagueLink.href = m.league_id ? `./league.html?id=${m.league_id}` : "./index.html";

      const hasTeams = hasGeneratedTeams(m);
      const privateRestricted = m.visibility === "private" && !isAdmin();
      const showRegistrations = !privateRestricted && ((m.status === "registration_open") || (m.status === "registration_closed" && !m.teams_confirmed));
      const showTeams = !privateRestricted && ["registration_closed", "live", "finished", "completed", "cancelled"].includes(m.status) && hasTeams;
      const showEvents = ["live", "finished", "completed", "cancelled"].includes(m.status) && hasTeams;
      teamsCard.style.display = (showRegistrations || showTeams) ? "block" : "none";
      registrationsSection.style.display = showRegistrations ? "block" : "none";
      teamsSection.style.display = showTeams ? "block" : "none";
      eventsCard.style.display = showEvents ? "block" : "none";

      renderActions();
        const receiptCard = document.getElementById("receiptCard");
        if (receiptCard) receiptCard.style.display = (m.status === "completed" && playerResults) ? "block" : "none";

      if (showRegistrations) {
        renderRegistrations();
      }
      if (showTeams) {
        renderTeams();
      }
      if (showEvents) {
        renderEvents();
        renderReceipt();
      }
      // Balance warning - shown/cleared based on current draft state
      if (editingTeams && Math.abs(draft.teamA.length - draft.teamB.length) > 1) {
        show("Warning: team size difference is more than 1 player.", "error");
      } else if (statusEl.textContent.startsWith("Warning:")) {
        show("");
      }
    }

    async function load(silent){
      try {
        if (previewToken) {
          detail = await publicFetch(`/preview/matches/${encodeURIComponent(previewToken)}`);
          viewMode = "censored";
          leagueRole = null;
          editingTeams = false;
          draft = { teamA: [], teamB: [] };
          render();
          return;
        }

        if (!matchId) { show("Missing match id.", "error"); return; }

        // Try authenticated fetch first; fall back to public (outsider) view
        if (getToken()) {
          try {
            detail = await apiFetch(`/matches/${matchId}`, { method: "GET" });
            try {
              const leagueDetail = await apiFetch(`/leagues/${detail.match.league_id}`, { method: "GET" });
              leagueRole = leagueDetail.league.member_role;
              viewMode = (leagueRole === "owner" || leagueRole === "admin") ? "admin" : "normal";
            } catch {
              leagueRole = null;
              viewMode = detail.match.visibility === "public" ? "normal" : "censored";
            }
          } catch (authErr) {
            // User is logged in but not a member - try as public
            detail = await publicFetch(`/matches/${matchId}`);
            leagueRole = null;
            viewMode = detail.match.visibility === "public" ? "normal" : "censored";
          }
        } else {
          // Not logged in - outsider view
          detail = await publicFetch(`/matches/${matchId}`);
          leagueRole = null;
          viewMode = detail.match.visibility === "public" ? "normal" : "censored";
        }

        if (!editingTeams) {
          draft.teamA = [...(detail.match.team_a || [])];
          draft.teamB = [...(detail.match.team_b || [])];
          draftNames.teamA = detail.match.team_a_name || "Team A";
          draftNames.teamB = detail.match.team_b_name || "Team B";
        }
        if (detail.match.status !== "registration_closed" || detail.match.teams_confirmed) editingTeams = false;
        if (detail.match.status !== "finished") editingEvents = false;

        if (detail.match.status === "completed" && getToken()) {
          try {
            playerResults = await apiFetch(`/matches/${matchId}/player-results`, { method: "GET" });
          } catch {
            playerResults = null;
          }
        } else {
          playerResults = null;
        }

        render();
      } catch (err) {
        const message = err && err.message ? err.message : "Failed loading match.";
        if (silent && /failed to fetch/i.test(message) && detail) return;
        show(message, "error");
      }
    }

    document.body.addEventListener("click", async (e) => {
      const m = detail?.match;
      const actBtn = e.target.closest("[data-act]");
      if (actBtn && m) {
        const act = actBtn.dataset.act;
        try {
          if (act === "register") await apiFetch(`/matches/${m.id}/register`, { method: "POST" });
          if (act === "accept-offer") await apiFetch(`/matches/${m.id}/register`, { method: "POST" });
          if (act === "cancel-reg") await apiFetch(`/matches/${m.id}/register`, { method: "DELETE" });
          if (act === "open-reg") await apiFetch(`/matches/${m.id}/open-registration`, { method: "POST" });
          if (act === "close-reg") await apiFetch(`/matches/${m.id}/close-registration`, { method: "POST" });
          if (act === "generate") await apiFetch(`/matches/${m.id}/generate-teams`, { method: "POST" });
          if (act === "edit-teams") {
            editingTeams = !editingTeams;
            draft.teamA = [...(m.team_a || [])];
            draft.teamB = [...(m.team_b || [])];
            draftNames.teamA = m.team_a_name || "Team A";
            draftNames.teamB = m.team_b_name || "Team B";
            render();
            return;
          }
          if (act === "edit-events") {
            editingEvents = !editingEvents;
            render();
            return;
          }
          if (act === "save-teams") {
            await apiFetch(`/matches/${m.id}/teams`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                team_a: draft.teamA,
                team_b: draft.teamB,
                team_a_name: (draftNames.teamA || "").trim() || "Team A",
                team_b_name: (draftNames.teamB || "").trim() || "Team B",
              }),
            });
          }
          if (act === "confirm-teams") {
            const ok = window.confirm("Confirm teams? This will lock team rosters before match start.");
            if (!ok) return;
            await apiFetch(`/matches/${m.id}/confirm-teams`, { method: "POST" });
          }
          if (act === "start") await apiFetch(`/matches/${m.id}/start`, { method: "POST" });
          if (act === "pause") await apiFetch(`/matches/${m.id}/pause`, { method: "POST" });
          if (act === "resume") await apiFetch(`/matches/${m.id}/resume`, { method: "POST" });
          if (act === "finish") {
            const ok = window.confirm("Finish match now? You can still review events before confirming the final result.");
            if (!ok) return;
            await apiFetch(`/matches/${m.id}/finish`, { method: "POST" });
          }
          if (act === "confirm") await apiFetch(`/matches/${m.id}/confirm`, { method: "POST" });
          if (act === "cancel") {
            const ok = window.confirm("Cancel this match? This action cannot be undone.");
            if (!ok) return;
            await apiFetch(`/matches/${m.id}/cancel`, { method: "POST" });
          }
          if (act === "toggle-vis") {
            const next = m.visibility === "private" ? "public" : "private";
            await apiFetch(`/matches/${m.id}/visibility`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ visibility: next }),
            });
          }
          await load();
        } catch (err) {
          show(err.message || "Action failed.", "error");
        }
      }

      const moveBtn = e.target.closest("[data-move]");
      if (moveBtn && editingTeams && isAdmin() && detail) {
        const uid = Number(moveBtn.dataset.move);
        const from = moveBtn.dataset.moveTeam;
        draft.teamA = draft.teamA.filter((x) => x !== uid);
        draft.teamB = draft.teamB.filter((x) => x !== uid);
        if (from === "a") draft.teamB.push(uid);
        else draft.teamA.push(uid);
        // Balance warning is computed in render via current draft sizes
        render();
      }

      const undoBtn = e.target.closest("[data-undo]");
      if (undoBtn && detail && isAdmin()) {
        try {
          await apiFetch(`/matches/${detail.match.id}/events/${Number(undoBtn.dataset.undo)}`, { method: "DELETE" });
          await load();
        } catch (err) {
          show(err.message || "Undo failed.", "error");
        }
      }

      const liveBtn = e.target.closest("[data-live]");
      if (liveBtn && detail) {
        if (detail.match.status === "live" && isMatchPaused()) {
          show("Match is paused. Resume before logging events.", "error");
          return;
        }
        const eventType = liveBtn.dataset.live;
        const team = liveBtn.dataset.team;
        const player = Number(liveBtn.dataset.player || 0);
        if (player && ["injury", "yellow_card", "red_card", "offside", "foul"].includes(eventType)) {
          try {
            const payload = { event_type: eventType, team, player_user_id: player };
            if (editingEvents && detail.match.status === "finished") {
              const mins = prompt("Timestamp in minutes:", "0");
              if (mins == null) return;
              payload.event_seconds = Math.max(0, Number(mins) || 0) * 60;
            }
            await apiFetch(`/matches/${detail.match.id}/events`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            await load();
          } catch (err) {
            show(err.message || "Failed to add event.", "error");
          }
          return;
        }
        pendingEvent.eventType = eventType;
        pendingEvent.team = team;
        pendingEvent.playerUserId = player || null;
        openEventModal();
      }
    });

    function openEventModal(){
      if (!detail) return;
      const team = pendingEvent.team;
      const isGoal = pendingEvent.eventType === "goal";
      const teamIds = team === "a" ? (detail.match.team_a || []) : (detail.match.team_b || []);
      const oppIds = team === "a" ? (detail.match.team_b || []) : (detail.match.team_a || []);

      const eventPlayer = document.getElementById("eventPlayer");
      const assistPlayer = document.getElementById("assistPlayer");
      const ownGoalPlayer = document.getElementById("ownGoalPlayer");
      const title = document.getElementById("eventModalTitle");
      const assistToggle = document.getElementById("assistToggle");
      const goalTypeStep = document.getElementById("goalTypeStep");
      const normalGoalStep = document.getElementById("normalGoalStep");
      const ownGoalStep = document.getElementById("ownGoalStep");
      const assistRow = document.getElementById("assistRow");
      const eventPlayerLabel = document.getElementById("eventPlayerLabel");
      const eventSeconds = document.getElementById("eventSeconds");
      const eventSecondsLabel = document.getElementById("eventSecondsLabel");

      title.textContent = `Add ${pendingEvent.eventType.replace(/_/g, " ")} – Team ${team === "a" ? (detail.match.team_a_name || "A") : (detail.match.team_b_name || "B")}`;
      const options = (ids) => ids.map((uid) => `<option value="${uid}">${esc(playerName(uid))}</option>`).join("");
      eventPlayer.innerHTML = options(teamIds);
      ownGoalPlayer.innerHTML = '<option value="">Select player</option>' + options(oppIds);

      // Default goal type to normal
      document.getElementById("goalTypeNormal").checked = true;
      goalTypeStep.style.display = isGoal ? "block" : "none";
      normalGoalStep.style.display = pendingEvent.eventType === "corner" ? "none" : "block";
      ownGoalStep.style.display = "none";
      assistRow.style.display = isGoal ? "block" : "none";
      eventPlayerLabel.textContent = pendingEvent.eventType === "foul" ? "Player committing foul" : "Player";
      assistToggle.checked = false;
      assistPlayer.style.display = "none";
      // Build assist list (excludes scorer - updated on scorer change)
      const updateAssistList = () => {
        const scorerId = eventPlayer.value;
        assistPlayer.innerHTML = '<option value="">No assist</option>' + options(teamIds.filter(uid => String(uid) !== scorerId));
      };
      updateAssistList();
      eventPlayer.onchange = updateAssistList;

      if (pendingEvent.playerUserId) {
        eventPlayer.value = String(pendingEvent.playerUserId);
        updateAssistList();
      }

      const customTime = detail.match.status === "finished" && editingEvents;
      eventSecondsLabel.style.display = customTime ? "block" : "none";
      eventSeconds.style.display = customTime ? "block" : "none";
      eventSeconds.value = customTime ? "0" : "";

      document.getElementById("eventModal").style.display = "flex";
    }

    document.querySelectorAll("input[name='goalType']").forEach(radio => {
      radio.addEventListener("change", () => {
        const isOwn = document.getElementById("goalTypeOwn").checked;
        document.getElementById("normalGoalStep").style.display = isOwn ? "none" : "block";
        document.getElementById("ownGoalStep").style.display = isOwn ? "block" : "none";
      });
    });

    document.getElementById("assistToggle").addEventListener("change", (e) => {
      document.getElementById("assistPlayer").style.display = e.target.checked ? "block" : "none";
    });
    document.getElementById("eventCancelBtn").addEventListener("click", () => {
      document.getElementById("eventModal").style.display = "none";
    });
    document.getElementById("eventSaveBtn").addEventListener("click", async () => {
      if (!detail) return;
      try {
        const isGoal = pendingEvent.eventType === "goal";
        const isOwnGoal = isGoal && document.getElementById("goalTypeOwn").checked;
        const eventPlayer = Number(document.getElementById("eventPlayer").value);
        const assistChecked = !isOwnGoal && document.getElementById("assistToggle").checked;
        const assist = assistChecked ? Number(document.getElementById("assistPlayer").value || 0) : null;
        const ownGoalPlayerVal = isOwnGoal ? Number(document.getElementById("ownGoalPlayer").value || 0) : null;
        const customMinutesRaw = document.getElementById("eventSeconds").value;
        const customSeconds = customMinutesRaw === "" ? null : (Math.max(0, Number(customMinutesRaw) || 0) * 60);

        const payload = {
          event_type: isOwnGoal ? "own_goal" : pendingEvent.eventType,
          team: pendingEvent.team,
          scorer_user_id: (!isOwnGoal && isGoal) ? eventPlayer : null,
          assist_user_id: assist || null,
          own_goal_user_id: ownGoalPlayerVal || null,
          player_user_id: (!isGoal && pendingEvent.eventType !== "corner") ? eventPlayer : null,
          event_seconds: (detail.match.status === "finished" && editingEvents) ? customSeconds : null,
        };

        await apiFetch(`/matches/${detail.match.id}/events`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        document.getElementById("eventModal").style.display = "none";
        await load();
      } catch (err) {
        show(err.message || "Failed to add event.", "error");
      }
    });

    load();
    // 1-second tick for smooth timer; full data reload every 5 seconds
        document.getElementById("receiptToggle")?.addEventListener("click", () => {
          const body = document.getElementById("receiptBody");
          const chevron = document.getElementById("receiptChevron");
          if (!body) return;
          const collapsed = body.style.display === "none";
          body.style.display = collapsed ? "block" : "none";
          if (chevron) chevron.textContent = collapsed ? "▼" : "▶";
        });

    let _tickCount = 0;
    setInterval(() => {
      _tickCount++;
      if (detail?.match?.status === "live" && detail.match.started_at) {
        // Update clock and meta every second without full reload
        const m = detail.match;
        const sec = activeLiveSeconds(m.started_at);
        const mm = String(Math.floor(sec / 60)).padStart(2, "0");
        const ss = String(sec % 60).padStart(2, "0");
        const paused = isMatchPaused();
        if (clockEl) clockEl.textContent = `${paused ? "\u23F8 " : ""}${mm}:${ss}`;
        if (metaEl) {
          if (paused) {
            const pauseMarker = [...(detail.events || [])].filter(e => !e.undone && e.event_type === "pause").slice(-1)[0];
            const pausedAt = pauseMarker ? Number(pauseMarker.event_seconds) : 0;
            const pausedSecs = Math.max(0, Math.floor((Date.now() - new Date(m.started_at).getTime()) / 1000) - pausedAt);
            const pm = String(Math.floor(pausedSecs / 60)).padStart(2, "0");
            const ps = String(pausedSecs % 60).padStart(2, "0");
            metaEl.textContent = `\u23F8 Paused \u2013 ${pm}:${ps}`;
          } else {
            metaEl.textContent = "\uD83D\uDD34 LIVE";
          }
        }
      }
      if (_tickCount % 5 === 0) load(true);
    }, 1000);

    teamANameInput.addEventListener("input", () => { draftNames.teamA = teamANameInput.value; });
    teamBNameInput.addEventListener("input", () => { draftNames.teamB = teamBNameInput.value; });
    randAInline.addEventListener("click", () => { draftNames.teamA = randomTeamName(); teamANameInput.value = draftNames.teamA; });
    randBInline.addEventListener("click", () => { draftNames.teamB = randomTeamName(); teamBNameInput.value = draftNames.teamB; });
  </script>
</body>
</html>
