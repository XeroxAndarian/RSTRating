<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match | RSTRating</title>
  <style>
    :root { --bg:#e9f7ef; --panel:#fff; --text:#0e2c1d; --muted:#4d6f60; --accent:#1f8a4c; --success:#15803d; --danger:#b42318; --line:rgba(14,44,29,.16); }
    body { margin:0; font-family:Georgia, "Times New Roman", serif; background:linear-gradient(135deg,#f3fbf6,#def0e6); color:var(--text); }
    .wrap { max-width:980px; margin:24px auto; padding:0 16px; }
    .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:16px; margin-bottom:12px; }
    h1,h2,h3 { margin:0; }
    .muted { color:var(--muted); }
    .btn { border:none; border-radius:9px; padding:8px 14px; font:inherit; font-weight:700; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; }
    .btn.primary{ background:var(--accent); color:#fff; }
    .btn.confirm{ background:var(--success); color:#fff; }
    .btn.danger{ background:var(--danger); color:#fff; }
    .btn.ghost{ background:#f3faf6; border:1px solid var(--line); color:var(--text); }
    .pill { display:inline-flex; padding:3px 9px; border-radius:8px; background:#ebf7ef; border:1px solid var(--line); font-size:.82rem; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width:860px){ .grid { grid-template-columns:1fr; } }
    .list { display:flex; flex-direction:column; gap:8px; }
    .item { border:1px solid var(--line); border-radius:10px; padding:10px; }
    input, select { padding:8px 10px; border:1px solid var(--line); border-radius:8px; font:inherit; }
    .score { font-size:2rem; font-weight:700; }
    .status { min-height:20px; color:var(--muted); margin-top:8px; }
    .status.error { color:var(--danger); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="row" style="justify-content:space-between; margin-bottom:8px;">
      <div>
        <h1 id="title">Match</h1>
        <div id="sub" class="muted">Loading...</div>
      </div>
      <div class="row">
        <a class="btn ghost" id="leagueLink" href="./index.html">Back to league</a>
        <a class="btn ghost" id="previewLink" href="#">Open preview page</a>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <div class="score" id="score">0 - 0</div>
        <span class="pill" id="state">upcoming</span>
      </div>
      <div class="muted" id="meta" style="margin-top:6px;"></div>
      <div class="row" id="actions" style="margin-top:10px;"></div>
    </div>

    <div class="grid">
      <div class="card">
        <h3 style="margin-bottom:8px;">Registrations</h3>
        <div id="regs" class="list"></div>
      </div>
      <div class="card">
        <h3 style="margin-bottom:8px;">Events</h3>
        <div id="events" class="list"></div>
      </div>
    </div>

    <div class="card" id="goalCard" style="display:none;">
      <h3 style="margin-bottom:8px;">Add goal event</h3>
      <div class="row">
        <select id="teamSel"><option value="a">Team A</option><option value="b">Team B</option></select>
        <select id="scorerSel"></select>
        <select id="assistSel"><option value="">No assist</option></select>
        <button class="btn primary" id="addGoalBtn" type="button">Add goal</button>
      </div>
    </div>

    <div id="status" class="status"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const matchId = Number(params.get("id") || 0);
    const TOKEN_KEY = "rs_access_token";
    const API_BASE_KEY = "rs_api_base_override";
    const DEFAULT_API_BASE = "https://rstrating-accounts-api.onrender.com";

    const statusEl = document.getElementById("status");
    const titleEl = document.getElementById("title");
    const subEl = document.getElementById("sub");
    const scoreEl = document.getElementById("score");
    const stateEl = document.getElementById("state");
    const metaEl = document.getElementById("meta");
    const actionsEl = document.getElementById("actions");
    const regsEl = document.getElementById("regs");
    const eventsEl = document.getElementById("events");
    const leagueLink = document.getElementById("leagueLink");
    const previewLink = document.getElementById("previewLink");

    let detail = null;
    let leagueRole = null;
    let poll = null;

    function esc(v){ return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;"); }
    function getToken(){ return localStorage.getItem(TOKEN_KEY) || ""; }
    function getApiBase(){ return (localStorage.getItem(API_BASE_KEY) || DEFAULT_API_BASE).trim(); }
    function show(msg, kind){ statusEl.textContent = msg; statusEl.className = kind ? `status ${kind}` : "status"; }
    function canManage(){ return leagueRole === "owner" || leagueRole === "admin"; }

    async function apiFetch(path, options){
      const headers = Object.assign({}, options?.headers || {});
      const token = getToken();
      if (token) headers.Authorization = "Bearer " + token;
      const res = await fetch(getApiBase() + path, Object.assign({}, options || {}, { headers }));
      let body = null; try { body = await res.json(); } catch {}
      if (!res.ok) throw new Error(body?.detail || "Request failed");
      return body;
    }

    function formatIso(iso){
      const d = new Date(iso);
      return Number.isNaN(d.getTime()) ? iso : d.toLocaleString();
    }

    async function load(){
      if (!matchId) { show("Missing match id.", "error"); return; }
      if (!getToken()) { show("Please log in from lobby first.", "error"); return; }
      try {
        detail = await apiFetch(`/matches/${matchId}`, { method: "GET" });
        const leagueDetail = await apiFetch(`/leagues/${detail.match.league_id}`, { method: "GET" });
        leagueRole = leagueDetail.league.member_role;
        render();
      } catch (err) {
        show(err.message || "Failed loading match.", "error");
      }
    }

    function render(){
      const m = detail.match;
      titleEl.textContent = m.title;
      subEl.textContent = `${formatIso(m.scheduled_at)}${m.location ? " · " + m.location : ""}`;
      scoreEl.textContent = `${m.score_a} - ${m.score_b}`;
      stateEl.textContent = m.status;
      metaEl.textContent = `Registered ${m.registered_count}/${m.max_participants} · Waitlist ${m.waitlisted_count}`;
      leagueLink.href = `./league.html?id=${m.league_id}`;
      previewLink.href = `./preview.html?token=${encodeURIComponent(m.preview_token)}`;

      regsEl.innerHTML = (detail.registrations || []).map(r => `
        <div class="item"><strong>${esc(r.display_name || r.username)}</strong> <span class="pill">${esc(r.status)}</span></div>
      `).join("") || '<div class="item muted">No registrations.</div>';

      eventsEl.innerHTML = (detail.events || []).filter(e => !e.undone).map(e => `
        <div class="item">${e.event_type === "goal" ? "⚽" : "🅰️"} ${esc(e.username || "Unknown")} ${e.team ? "(Team " + e.team.toUpperCase() + ")" : ""} · ${Math.floor(e.event_seconds/60)}'</div>
      `).join("") || '<div class="item muted">No events yet.</div>';

      const my = m.my_registration_status;
      const btns = [];
      if (m.status === "registration_open") {
        if (!my || my === "cancelled") btns.push(`<button class="btn primary" data-act="register">Register</button>`);
        if (my && my !== "cancelled") btns.push(`<button class="btn danger" data-act="cancel-reg">Cancel registration</button>`);
      }
      if (canManage()) {
        if (m.status === "upcoming") btns.push(`<button class="btn primary" data-act="open-reg">Open registration</button>`);
        if (m.status === "upcoming" || m.status === "registration_open") btns.push(`<button class="btn primary" data-act="generate">Generate teams</button>`);
        if (m.status === "upcoming" || m.status === "registration_open") btns.push(`<button class="btn confirm" data-act="start">Start match</button>`);
        if (m.status === "live") btns.push(`<button class="btn confirm" data-act="finish">Finish match</button>`);
        if (m.status === "finished") btns.push(`<button class="btn confirm" data-act="confirm">Confirm result</button>`);
        if (m.status !== "completed" && m.status !== "cancelled") btns.push(`<button class="btn danger" data-act="cancel">Cancel match</button>`);
      }
      actionsEl.innerHTML = btns.join("");

      const goalCard = document.getElementById("goalCard");
      goalCard.style.display = canManage() && m.status === "live" ? "block" : "none";
      if (goalCard.style.display === "block") {
        const teamA = m.team_a || [];
        const teamB = m.team_b || [];
        const regs = detail.registrations || [];
        const scorerSel = document.getElementById("scorerSel");
        const assistSel = document.getElementById("assistSel");
        const teamSel = document.getElementById("teamSel");
        const fill = () => {
          const team = teamSel.value;
          const ids = team === "a" ? teamA : teamB;
          const opts = ids.map(uid => {
            const r = regs.find(x => x.user_id === uid);
            const n = r ? (r.display_name || r.username) : `#${uid}`;
            return `<option value="${uid}">${esc(n)}</option>`;
          }).join("");
          scorerSel.innerHTML = opts;
          assistSel.innerHTML = '<option value="">No assist</option>' + opts;
        };
        teamSel.onchange = fill;
        fill();
      }
    }

    document.body.addEventListener("click", async (e) => {
      const btn = e.target.closest("[data-act]");
      if (!btn || !detail) return;
      const m = detail.match;
      const act = btn.dataset.act;
      try {
        if (act === "register") await apiFetch(`/matches/${m.id}/register`, { method: "POST" });
        if (act === "cancel-reg") await apiFetch(`/matches/${m.id}/register`, { method: "DELETE" });
        if (act === "open-reg") await apiFetch(`/matches/${m.id}/open-registration`, { method: "POST" });
        if (act === "generate") await apiFetch(`/matches/${m.id}/generate-teams`, { method: "POST" });
        if (act === "start") await apiFetch(`/matches/${m.id}/start`, { method: "POST" });
        if (act === "finish") await apiFetch(`/matches/${m.id}/finish`, { method: "POST" });
        if (act === "confirm") await apiFetch(`/matches/${m.id}/confirm`, { method: "POST" });
        if (act === "cancel") await apiFetch(`/matches/${m.id}/cancel`, { method: "POST" });
        await load();
      } catch (err) {
        show(err.message || "Action failed.", "error");
      }
    });

    document.getElementById("addGoalBtn").addEventListener("click", async () => {
      if (!detail) return;
      const m = detail.match;
      try {
        const team = document.getElementById("teamSel").value;
        const scorer = Number(document.getElementById("scorerSel").value);
        const assistRaw = document.getElementById("assistSel").value;
        const assist = assistRaw ? Number(assistRaw) : null;
        await apiFetch(`/matches/${m.id}/events`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ scorer_user_id: scorer, assist_user_id: assist, team }),
        });
        await load();
      } catch (err) {
        show(err.message || "Failed to add goal.", "error");
      }
    });

    load();
    poll = setInterval(load, 5000);
  </script>
</body>
</html>
