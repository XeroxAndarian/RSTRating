services:
  - type: web
    name: rstrating-accounts-api
    runtime: python
    rootDir: BrowserApp/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: starter
    healthCheckPath: /health
    disk:
      name: rstrating-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 120
      - key: FRONTEND_ORIGINS
        value: https://xeroxandarian.github.io
      - key: DB_PATH
        value: /var/data/accounts.db
